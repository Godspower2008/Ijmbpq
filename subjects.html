<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IJMB Subjects | Pro Archive</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    background:#111827;
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

.navbar a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}

.navbar a:hover{
    color:#60a5fa;
}

/* BREADCRUMB */
.breadcrumb{
    padding:10px 5%;
    font-size:14px;
    color:#94a3b8;
}

/* CONTAINER */
.container{
    padding:30px 5%;
}

/* CONTROL BAR */
.control-bar{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.control-bar input,
.control-bar select{
    padding:10px;
    border-radius:8px;
    border:none;
}

/* SUBJECT GRID */
.subject-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
}

.subject-card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
    cursor:pointer;
}

.subject-card:hover{
    transform:translateY(-5px);
    background:#334155;
}

.badge{
    display:inline-block;
    background:#2563eb;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    margin-top:10px;
}

/* SUBJECT DETAIL */
#subjectDetail{
    margin-top:50px;
    display:none;
}

.quiz-box{
    margin-top:20px;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

.quiz-box button{
    margin-top:10px;
    margin-right:10px;
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.download-btn{
    margin-top:20px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.progress{
    margin-top:10px;
    font-size:14px;
    color:#60a5fa;
}
</style>
</head>

<body>

<header class="navbar">
    <div>IJMB Portal</div>
    <nav>
        <a href="/Ijmbpq/landing.html">Home</a>
        <a href="#">CN</a>
        <a href="#">SN</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="breadcrumb">
    Home / Subjects
</div>

<div class="container">

    <div class="control-bar">
        <input type="text" id="searchInput" placeholder="Search subject...">
        <select id="sortOption">
            <option value="default">Sort By</option>
            <option value="questions">Most Questions</option>
            <option value="year">Newest Year</option>
        </select>
        <select id="difficultyFilter">
            <option value="all">All Difficulty</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
        </select>
    </div>

    <div class="subject-grid" id="subjectGrid"></div>

    <div id="subjectDetail">
        <h2 id="detailTitle"></h2>
        <p id="detailInfo"></p>
        <div class="progress">
            Progress: <span id="progressCount">0</span> Questions Solved
        </div>

        <div class="quiz-box">
            <h3>Quick Practice</h3>
            <p id="quizQuestion"></p>
            <button onclick="answerQuiz(true)">Option A</button>
            <button onclick="answerQuiz(false)">Option B</button>
        </div>

        <a href="#" download>
            <button class="download-btn">Download Past Questions PDF</button>
        </a>
    </div>

</div>

<script>

const subjects = [
  {name:"🧬 Biology", questions:245, year:2023, difficulty:"Medium", quiz:"What is the powerhouse of the cell?"},
  {name:"⚗ Chemistry", questions:210, year:2023, difficulty:"Hard", quiz:"What is the pH of neutral water?"},
  {name:"⚡ Physics", questions:198, year:2022, difficulty:"Medium", quiz:"State Newton’s First Law."},
  {name:"📐 Mathematics", questions:260, year:2023, difficulty:"Hard", quiz:"Differentiate x²."}
];

const grid = document.getElementById("subjectGrid");
const searchInput = document.getElementById("searchInput");
const sortOption = document.getElementById("sortOption");
const difficultyFilter = document.getElementById("difficultyFilter");

function renderSubjects(list){
    grid.innerHTML = "";
    list.forEach(sub=>{
        grid.innerHTML += `
        <div class="subject-card" onclick="openSubject('${sub.name}')">
            <h3>${sub.name}</h3>
            <p>${sub.questions} Questions</p>
            <span class="badge">${sub.difficulty}</span>
        </div>`;
    });
}

function filterAndSort(){
    let filtered = [...subjects];

    const search = searchInput.value.toLowerCase();
    filtered = filtered.filter(s=>s.name.toLowerCase().includes(search));

    if(difficultyFilter.value !== "all"){
        filtered = filtered.filter(s=>s.difficulty === difficultyFilter.value);
    }

    if(sortOption.value === "questions"){
        filtered.sort((a,b)=>b.questions - a.questions);
    }

    if(sortOption.value === "year"){
        filtered.sort((a,b)=>b.year - a.year);
    }

    renderSubjects(filtered);
}

function openSubject(name){
    const subject = subjects.find(s=>s.name===name);
    document.getElementById("subjectDetail").style.display="block";
    document.getElementById("detailTitle").innerText = subject.name;
    document.getElementById("detailInfo").innerText = 
        `${subject.questions} Questions | Latest Year: ${subject.year}`;
    document.getElementById("quizQuestion").innerText = subject.quiz;

    const saved = localStorage.getItem(name) || 0;
    document.getElementById("progressCount").innerText = saved;
}

function answerQuiz(correct){
    if(correct){
        alert("Correct!");
        let current = parseInt(localStorage.getItem(document.getElementById("detailTitle").innerText) || 0);
        current++;
        localStorage.setItem(document.getElementById("detailTitle").innerText, current);
        document.getElementById("progressCount").innerText = current;
    }else{
        alert("Try Again");
    }
}

searchInput.addEventListener("input", filterAndSort);
sortOption.addEventListener("change", filterAndSort);
difficultyFilter.addEventListener("change", filterAndSort);

renderSubjects(subjects);

</script>

</body>
</html>
