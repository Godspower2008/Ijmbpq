<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Physics Archive</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 20px; }
        .q-card { background: #0f172a; padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .sol { display: none; margin-top: 15px; color: #38bdf8; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>
    <h1>Physics Theory Archive</h1>
    <div id="feed">Loading...</div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({ apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com" });
        firebase.database().ref('questions/Physics').on('value', snap => {
            let html = "";
            snap.forEach(child => {
                const q = child.val();
                html += `<div class="q-card">
                    <b>(${q.marks} Marks)</b><p>${q.text}</p>
                    <button onclick="this.nextElementSibling.style.display='block'">View Marking Scheme</button>
                    <div class="sol">${q.solution}</div>
                </div>`;
            });
            document.getElementById('feed').innerHTML = html;
            if(window.MathJax) MathJax.typeset();
        });
    </script>
</body>
</html>
