<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | IJMB Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: var(--bg); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .toggle-link { margin-top: 20px; font-size: 0.85rem; color: var(--accent); cursor: pointer; display: block; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 id="title">Student Login</h2>
    <p id="subtitle" style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px;">Enter your details to access the archive.</p>
    
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleSubmit()" id="btn-text">Login</button>
    
    <span class="toggle-link" onclick="toggle()">Don't have an account? Sign Up</span>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com",
    projectId: "ijmb-portal",
    appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f"
  });

  const auth = firebase.auth();
  let mode = 'login';

  function toggle() {
    mode = (mode === 'login') ? 'signup' : 'login';
    document.getElementById('title').innerText = mode === 'login' ? 'Student Login' : 'Create Account';
    document.getElementById('btn-text').innerText = mode === 'login' ? 'Login' : 'Sign Up';
  }

  function handleSubmit() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;

    if(mode === 'login') {
        auth.signInWithEmailAndPassword(e, p)
            .then(() => window.location.href = "index.html")
            .catch(err => alert(err.message));
    } else {
        auth.createUserWithEmailAndPassword(e, p)
            .then(() => window.location.href = "index.html")
            .catch(err => alert(err.message));
    }
  }
</script>
</body>
</html>
