<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Custom Exam | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .setup-container { max-width: 650px; margin: 0 auto; padding-bottom: 50px; }
        
        .form-group { margin-bottom: 30px; }
        
        label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 12px; 
            font-size: 0.95rem; 
            color: var(--text);
        }

        /* Checkbox List Styling */
        .list-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: rgba(255,255,255,0.03); }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .list-item.selected .custom-checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }

        .list-item.selected .custom-checkbox::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: white;
            font-size: 0.75rem;
        }

        /* Search Bar */
        .search-wrapper { position: relative; margin-bottom: 12px; }
        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }
        .search-bar {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
        }

        /* Time Range Styling */
        .time-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
        }
        .time-display {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 15px;
            display: block;
            text-align: center;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .limit-notice { color: #ef4444; font-size: 0.8rem; margin-top: 8px; display: none; }

        .start-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <a href="test.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <div style="font-weight: 800;">Theory Exam Setup</div>
        <div style="width: 40px;"></div>
    </header>

    <main>
        <div class="setup-container">
            
            <div class="form-group">
                <label>Subjects (Select 1 - 3)</label>
                <div class="list-container" id="subjectList">
                    <div class="list-item" onclick="toggleSubject(this)">
                        <div class="custom-checkbox"></div>
                        <span>Mathematics</span>
                    </div>
                    <div class="list-item" onclick="toggleSubject(this)">
                        <div class="custom-checkbox"></div>
                        <span>Biology</span>
                    </div>
                    <div class="list-item" onclick="toggleSubject(this)">
                        <div class="custom-checkbox"></div>
                        <span>Chemistry</span>
                    </div>
                    <div class="list-item" onclick="toggleSubject(this)">
                        <div class="custom-checkbox"></div>
                        <span>Physics</span>
                    </div>
                </div>
                <p class="limit-notice" id="subWarn">Max 3 subjects allowed.</p>
            </div>

            <div class="form-group">
                <label>Focus Topics</label>
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-bar" id="topicSearch" placeholder="Search topics..." onkeyup="filterTopics()">
                </div>
                <div class="list-container">
                    <div class="list-item topic-item" onclick="this.classList.toggle('selected')">
                        <div class="custom-checkbox"></div>
                        <span>Algebraic Processes</span>
                    </div>
                    <div class="list-item topic-item" onclick="this.classList.toggle('selected')">
                        <div class="custom-checkbox"></div>
                        <span>Chemical Equilibrium</span>
                    </div>
                    <div class="list-item topic-item" onclick="this.classList.toggle('selected')">
                        <div class="custom-checkbox"></div>
                        <span>Newtonian Mechanics</span>
                    </div>
                    <div class="list-item topic-item" onclick="this.classList.toggle('selected')">
                        <div class="custom-checkbox"></div>
                        <span>Metabolic Pathways</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Duration (1 min to 180 min)</label>
                <div class="time-box">
                    <span class="time-display" id="timeDisplay">60 Minutes (1h 0m)</span>
                    <input type="range" id="timeRange" min="1" max="180" value="60" oninput="syncTime(this.value)">
                    <div class="range-labels">
                        <span>1m</span>
                        <span>90m</span>
                        <span>180m (3hrs)</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>No. of Questions</label>
                <input type="number" id="qCount" value="5" min="1" max="50" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: white;">
            </div>

            <button class="start-btn" onclick="startExam()">Start Custom Theory Exam</button>
        </div>
    </main>

    <script>
        function toggleSubject(el) {
            const selected = document.querySelectorAll('#subjectList .list-item.selected');
            if (!el.classList.contains('selected') && selected.length >= 3) {
                document.getElementById('subWarn').style.display = 'block';
                return;
            }
            el.classList.toggle('selected');
            document.getElementById('subWarn').style.display = 'none';
        }

        function filterTopics() {
            const query = document.getElementById('topicSearch').value.toLowerCase();
            document.querySelectorAll('.topic-item').forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        function syncTime(val) {
            const hrs = Math.floor(val / 60);
            const mins = val % 60;
            document.getElementById('timeDisplay').innerText = `${val} Minutes (${hrs}h ${mins}m)`;
        }

        function startExam() {
            const subCount = document.querySelectorAll('#subjectList .list-item.selected').length;
            if (subCount === 0) {
                alert("Please select at least 1 subject.");
                return;
            }
            location.href = 'exam_theory.html';
        }
    </script>
</body>
</html>
