<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Custom Exam | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .setup-container { max-width: 650px; margin: 0 auto; padding-bottom: 50px; }
        
        .form-group { margin-bottom: 30px; }
        
        label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 12px; 
            font-size: 0.95rem; 
            color: var(--text);
        }

        /* Checkbox List Mode */
        .list-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: rgba(255,255,255,0.02); }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .list-item.selected .custom-checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }

        .list-item.selected .custom-checkbox::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: white;
            font-size: 0.7rem;
        }

        /* Search Bar */
        .search-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .search-bar {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
        }

        .search-bar:focus { border-color: var(--accent); }

        .limit-notice {
            font-size: 0.75rem;
            color: #ef4444;
            margin-top: 8px;
            display: none;
        }

        .start-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <a href="test.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <div style="font-weight: 800;">Custom Exam Builder</div>
        <div style="width: 50px;"></div>
    </header>

    <main>
        <div class="setup-container">
            
            <div class="form-group">
                <label>Select Subjects (1 to 3)</label>
                <div class="list-container">
                    <div class="list-item" onclick="toggleSelection(this, 'subject')">
                        <div class="custom-checkbox"></div>
                        <span>Mathematics</span>
                    </div>
                    <div class="list-item" onclick="toggleSelection(this, 'subject')">
                        <div class="custom-checkbox"></div>
                        <span>Biology</span>
                    </div>
                    <div class="list-item" onclick="toggleSelection(this, 'subject')">
                        <div class="custom-checkbox"></div>
                        <span>Chemistry</span>
                    </div>
                    <div class="list-item" onclick="toggleSelection(this, 'subject')">
                        <div class="custom-checkbox"></div>
                        <span>Physics</span>
                    </div>
                </div>
                <p class="limit-notice" id="subjectLimit">Please select between 1 and 3 subjects.</p>
            </div>

            <div class="form-group">
                <label>Focus Topics</label>
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-bar" id="topicSearch" placeholder="Search topics (e.g. Calculus, Genetics...)" onkeyup="filterTopics()">
                </div>
                <div class="list-container" id="topicList">
                    <div class="list-item topic-item" onclick="toggleSelection(this, 'topic')">
                        <div class="custom-checkbox"></div>
                        <span>Differential Calculus</span>
                    </div>
                    <div class="list-item topic-item" onclick="toggleSelection(this, 'topic')">
                        <div class="custom-checkbox"></div>
                        <span>Organic Compounds</span>
                    </div>
                    <div class="list-item topic-item" onclick="toggleSelection(this, 'topic')">
                        <div class="custom-checkbox"></div>
                        <span>Cell Structure & Function</span>
                    </div>
                    <div class="list-item topic-item" onclick="toggleSelection(this, 'topic')">
                        <div class="custom-checkbox"></div>
                        <span>Electromagnetism</span>
                    </div>
                    <div class="list-item topic-item" onclick="toggleSelection(this, 'topic')">
                        <div class="custom-checkbox"></div>
                        <span>Atomic Theory</span>
                    </div>
                    <div class="list-item topic-item" onclick="toggleSelection(this, 'topic')">
                        <div class="custom-checkbox"></div>
                        <span>Genetics & Heredity</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Exam Duration (Minutes)</label>
                <input type="number" id="duration" value="60" min="1" max="180" style="width: 100%; padding: 15px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white;">
            </div>

            <button class="start-btn" onclick="startExam()">Generate Theory Exam</button>
        </div>
    </main>

    <script>
        function toggleSelection(el, type) {
            if (type === 'subject') {
                const selectedSubjects = document.querySelectorAll('.list-item.selected').length;
                const isSelected = el.classList.contains('selected');
                
                if (!isSelected && selectedSubjects >= 3) {
                    document.getElementById('subjectLimit').style.display = 'block';
                    return;
                }
                document.getElementById('subjectLimit').style.display = 'none';
            }
            
            el.classList.toggle('selected');
        }

        function filterTopics() {
            const input = document.getElementById('topicSearch').value.toLowerCase();
            const items = document.querySelectorAll('.topic-item');
            
            items.forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(input) ? 'flex' : 'none';
            });
        }

        function startExam() {
            const selectedCount = document.querySelectorAll('.list-item.selected').length;
            if (selectedCount === 0) {
                alert("Please select at least one subject and topic.");
                return;
            }
            location.href = 'exam_theory.html';
        }
    </script>
</body>
</html>
