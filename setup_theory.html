<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Custom Exam | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .setup-container { max-width: 650px; margin: 0 auto; }
        
        .form-group { margin-bottom: 30px; }
        
        label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 12px; 
            font-size: 0.95rem; 
            color: var(--text);
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 10px;
        }

        .subject-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .subject-card.selected {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .subject-card i { color: var(--text-dim); }
        .subject-card.selected i { color: var(--accent); }

        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent);
        }

        .topic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .select-all-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }

        .topic-pill-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .topic-pill {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .topic-pill.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .start-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }

        .limit-notice {
            font-size: 0.75rem;
            color: #ef4444;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <a href="test.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Back</a>
        <div style="font-weight: 800;">Custom Exam Builder</div>
        <div style="width: 50px;"></div>
    </header>

    <main>
        <div class="setup-container">
            
            <div class="form-group">
                <label>Select Subjects (Choose 1 to 3)</label>
                <div class="subject-grid">
                    <div class="subject-card" onclick="toggleSubject(this, 'Maths')">
                        <i class="fa-solid fa-calculator"></i>
                        <span class="subject-name">Mathematics</span>
                    </div>
                    <div class="subject-card" onclick="toggleSubject(this, 'Bio')">
                        <i class="fa-solid fa-dna"></i>
                        <span class="subject-name">Biology</span>
                    </div>
                    <div class="subject-card" onclick="toggleSubject(this, 'Chem')">
                        <i class="fa-solid fa-flask"></i>
                        <span class="subject-name">Chemistry</span>
                    </div>
                    <div class="subject-card" onclick="toggleSubject(this, 'Phys')">
                        <i class="fa-solid fa-bolt"></i>
                        <span class="subject-name">Physics</span>
                    </div>
                </div>
                <p class="limit-notice" id="subjectLimit">You can only select up to 3 subjects.</p>
            </div>

            <div class="form-group">
                <label>Exam Duration: <span id="timeVal" style="color: var(--accent);">30</span> mins</label>
                <div class="range-container">
                    <span style="font-size: 0.8rem;">1m</span>
                    <input type="range" id="timeRange" min="1" max="180" value="30" oninput="updateTime(this.value)">
                    <span style="font-size: 0.8rem;">180m</span>
                </div>
            </div>

            <div class="form-group">
                <label>Number of Questions</label>
                <input type="number" id="qCount" value="5" min="1" max="20" style="width: 100px;">
            </div>

            <div class="form-group">
                <div class="topic-header">
                    <label style="margin-bottom: 0;">Focus Topics</label>
                    <button class="select-all-btn" onclick="selectAllTopics()">Select All Topics</button>
                </div>
                <div class="topic-pill-container" id="topicBox">
                    <div class="topic-pill" onclick="toggleTopic(this)">Calculus</div>
                    <div class="topic-pill" onclick="toggleTopic(this)">Organic Chemistry</div>
                    <div class="topic-pill" onclick="toggleTopic(this)">Thermodynamics</div>
                    <div class="topic-pill" onclick="toggleTopic(this)">Cell Division</div>
                    <div class="topic-pill" onclick="toggleTopic(this)">Mechanics</div>
                    <div class="topic-pill" onclick="toggleTopic(this)">Genetics</div>
                </div>
            </div>

            <button class="start-btn" onclick="validateAndStart()">
                Generate Theory Exam
            </button>
        </div>
    </main>

    <script>
        let selectedSubjects = 0;

        function toggleSubject(el, name) {
            if (!el.classList.contains('selected')) {
                if (selectedSubjects < 3) {
                    el.classList.add('selected');
                    selectedSubjects++;
                    document.getElementById('subjectLimit').style.display = 'none';
                } else {
                    document.getElementById('subjectLimit').style.display = 'block';
                }
            } else {
                el.classList.remove('selected');
                selectedSubjects--;
                document.getElementById('subjectLimit').style.display = 'none';
            }
        }

        function updateTime(val) {
            document.getElementById('timeVal').innerText = val;
        }

        function toggleTopic(el) {
            el.classList.toggle('selected');
        }

        function selectAllTopics() {
            const pills = document.querySelectorAll('.topic-pill');
            pills.forEach(p => p.classList.add('selected'));
        }

        function validateAndStart() {
            if (selectedSubjects === 0) {
                alert("Please select at least one subject.");
                return;
            }
            location.href = 'exam_theory.html';
        }
    </script>
</body>
</html>
