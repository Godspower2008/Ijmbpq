<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tracker-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
        }

        /* Stats Overview */
        .stats-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-mini-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            width: 45px; height: 45px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        /* Progress Bars */
        .subject-progress { margin-bottom: 25px; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; }
        .bar-bg { width: 100%; height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); border-radius: 10px; }

        /* Weekly Planner */
        .planner-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; }
        .day-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .day-name { width: 50px; font-weight: 800; font-size: 0.8rem; color: var(--text-dim); }
        .day-task { flex-grow: 1; font-size: 0.9rem; font-weight: 600; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 10px; }

        @media (max-width: 1000px) {
            .tracker-grid { grid-template-columns: 1fr; }
            .stats-header { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        <nav class="nav-links" id="navLinks">
            <a href="ijmbpq.html" class="nav-item">Home</a>
            <a href="study.html" class="nav-item">Study</a>
            <a href="test.html" class="nav-item">Test</a>
            <a href="more.html" class="nav-item active">More</a>
        </nav>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </header>

    <main>
        <div class="tracker-grid">
            <div class="analytics-section">
                <div class="stats-header">
                    <div class="stat-mini-card">
                        <div class="stat-icon" style="background: rgba(251, 191, 36, 0.1); color: #fbbf24;"><i class="fa-solid fa-fire"></i></div>
                        <div>
                            <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 700;">STREAK</div>
                            <div style="font-weight: 800;">12 Days</div>
                        </div>
                    </div>
                    <div class="stat-mini-card">
                        <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: var(--accent);"><i class="fa-solid fa-clock"></i></div>
                        <div>
                            <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 700;">STUDY TIME</div>
                            <div style="font-weight: 800;">24.5 Hours</div>
                        </div>
                    </div>
                    <div class="stat-mini-card">
                        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;"><i class="fa-solid fa-bullseye"></i></div>
                        <div>
                            <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 700;">AVG SCORE</div>
                            <div style="font-weight: 800;">72%</div>
                        </div>
                    </div>
                </div>

                <div class="card" style="padding: 30px;">
                    <h2 style="margin-bottom: 25px; font-size: 1.2rem;">Syllabus Completion</h2>
                    
                    <div class="subject-progress">
                        <div class="progress-label"><span>Biology</span><span>65%</span></div>
                        <div class="bar-bg"><div class="bar-fill" style="width: 65%;"></div></div>
                    </div>

                    <div class="subject-progress">
                        <div class="progress-label"><span>Physics</span><span>40%</span></div>
                        <div class="bar-bg"><div class="bar-fill" style="width: 40%; background: #fbbf24;"></div></div>
                    </div>

                    <div class="subject-progress">
                        <div class="progress-label"><span>Chemistry</span><span>82%</span></div>
                        <div class="bar-bg"><div class="bar-fill" style="width: 82%; background: #10b981;"></div></div>
                    </div>
                </div>
            </div>

            <div class="planner-section">
                <div class="planner-card">
                    <h3 style="margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;">
                        <i class="fa-solid fa-calendar-day" style="color: var(--accent);"></i> Study Planner
                    </h3>
                    
                    <div class="day-row">
                        <span class="day-name">MON</span>
                        <span class="day-task">Calculus Review</span>
                        <div class="status-dot" style="background: #10b981;"></div>
                    </div>
                    <div class="day-row">
                        <span class="day-name">TUE</span>
                        <span class="day-task">Organic Chem</span>
                        <div class="status-dot" style="background: #10b981;"></div>
                    </div>
                    <div class="day-row">
                        <span class="day-name">WED</span>
                        <span class="day-task">Atomic Physics</span>
                        <div class="status-dot" style="background: #fbbf24;"></div>
                    </div>
                    <div class="day-row" style="opacity: 0.5;">
                        <span class="day-name">THU</span>
                        <span class="day-task">Genetics II</span>
                        <div class="status-dot" style="background: var(--border);"></div>
                    </div>
                    
                    <button class="card" style="width: 100%; margin-top: 20px; padding: 12px; font-weight: 800; border-style: dashed; font-size: 0.8rem;">
                        + Add Task
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            hamburger.classList.toggle('active');
        });
    </script>
</body>
</html>
