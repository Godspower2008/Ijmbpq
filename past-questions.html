<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Questions | IJMB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --bg:#020617;
    --card:#0f172a;
    --glass:rgba(30,41,59,0.8);
    --border:rgba(99,102,241,0.2);
    --accent:#6366f1;
    --text:#f8fafc;
    --text-dim:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:var(--bg);color:var(--text);}

/* HEADER */
header{
    display:flex;justify-content:space-between;align-items:center;
    padding:15px 5%;background:var(--glass);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;
}
.logo{font-weight:800;font-size:1.2rem;color:var(--text);text-decoration:none;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:20px;}
.nav-links a{color:var(--text-dim);text-decoration:none;font-weight:600;}
.nav-links a:hover{color:var(--accent);}
.hamburger{display:none;flex-direction:column;width:28px;cursor:pointer;}
.hamburger div{height:3px;background:var(--text);margin:4px 0;transition:0.3s;}

/* MAIN */
main{max-width:1200px;margin:40px auto;padding:0 5%;}
.back-btn{display:inline-block;margin-bottom:25px;background:var(--glass);color:var(--accent);padding:10px 18px;border-radius:8px;text-decoration:none;font-weight:700;}
.subject-title{font-size:1.8rem;margin-bottom:20px;}
.questions-list{display:flex;flex-direction:column;gap:15px;}
.question-card{background:var(--card);padding:20px;border-radius:15px;transition:0.3s;cursor:pointer;}
.question-card:hover{background:#1e293b;}
.question-card h3{margin-bottom:10px;}
.question-card small{color:var(--text-dim);}
@media(max-width:768px){
    .nav-links{display:none;}
    .hamburger{display:flex;}
}
</style>
</head>

<body>
<header>
<a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
<nav class="nav-links">
    <a href="ijmbpq.html">Dashboard</a>
    <a href="study.html">Study</a>
    <a href="exam.html">Exam Mode</a>
    <a href="pricing.html">Upgrade</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>
<div class="hamburger" id="hamburger">
    <div></div>
    <div></div>
    <div></div>
</div>
</header>

<main>
<a href="study.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Study</a>

<h1 id="subjectTitle" class="subject-title">Loading Subject...</h1>

<div class="questions-list" id="questionsList">
    <!-- Questions will be loaded here dynamically -->
</div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="common.js"></script>
<script src="past-questions.js"></script>
</body>
</html>
