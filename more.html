<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Styles for the More/Settings Page */
        .profile-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            text-align: center;
        }
        .avatar-circle {
            width: 70px;
            height: 70px;
            background: rgba(99, 102, 241, 0.1);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 15px;
        }
        .settings-group {
            margin-bottom: 25px;
        }
        .group-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 12px 10px;
        }
        .settings-list {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            text-decoration: none;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }
        .settings-item:last-child { border-bottom: none; }
        .settings-item:hover { background: rgba(255,255,255,0.03); }
        .item-left { display: flex; align-items: center; gap: 15px; }
        .item-left i { color: var(--accent); width: 20px; text-align: center; }
        .logout-text { color: #ef4444 !important; }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        <nav class="nav-links" id="navLinks">
            <a href="ijmbpq.html" class="nav-item">Home</a>
            <a href="study.html" class="nav-item">Study</a>
            <a href="test.html" class="nav-item">Test</a>
            <a href="more.html" class="nav-item active">More</a>
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <main style="max-width: 700px;">
        <div class="profile-box">
            <div class="avatar-circle"><i class="fa-solid fa-user"></i></div>
            <h2 style="font-size: 1.4rem;">Student Account</h2>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 15px;">student@ijmbpro.com</p>
            <button class="card" style="padding: 8px 20px; font-size: 0.8rem; font-weight: 700;">Edit Profile</button>
        </div>

        <div class="settings-group">
            <p class="group-label">General</p>
            <div class="settings-list">
                <a href="#" class="settings-item">
                    <div class="item-left"><i class="fa-solid fa-crown"></i> <span>Upgrade to PRO</span></div>
                    <i class="fa-solid fa-chevron-right" style="font-size: 0.7rem; opacity: 0.5;"></i>
                </a>
                <a href="#" class="settings-item">
                    <div class="item-left"><i class="fa-solid fa-bell"></i> <span>Notifications</span></div>
                    <i class="fa-solid fa-chevron-right" style="font-size: 0.7rem; opacity: 0.5;"></i>
                </a>
            </div>
        </div>

        <div class="settings-group">
            <p class="group-label">Support</p>
            <div class="settings-list">
                <a href="#" class="settings-item">
                    <div class="item-left"><i class="fa-solid fa-circle-question"></i> <span>Help & FAQ</span></div>
                    <i class="fa-solid fa-chevron-right" style="font-size: 0.7rem; opacity: 0.5;"></i>
                </a>
                <a href="#" class="settings-item" onclick="handleLogout()">
                    <div class="item-left"><i class="fa-solid fa-right-from-bracket logout-text"></i> <span class="logout-text">Logout</span></div>
                </a>
            </div>
        </div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            hamburger.classList.toggle('active');
        });

        function handleLogout() {
            if(confirm("Are you sure you want to logout?")) {
                location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
