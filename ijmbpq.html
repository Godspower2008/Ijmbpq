<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB Pro-Archive | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #020617; border-right: 1px solid #1e293b; display: flex; flex-direction: column; padding: 30px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 40px; }
        .nav-link { padding: 12px; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #1e293b; color: white; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .subject-card { background: var(--panel); padding: 30px; border-radius: 20px; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .subject-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        /* Auth UI */
        #user-info { font-size: 0.9rem; color: #94a3b8; }
        .auth-btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        .login-btn { background: var(--accent); color: var(--bg); }
        .logout-btn { background: #ef4444; color: white; display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">IJMB PRO</div>
    <a href="index.html" class="nav-link active">Dashboard</a>
    <a href="subject-physics.html" class="nav-link">Physics</a>
    <a href="#" class="nav-link">Chemistry</a>
    <a href="#" class="nav-link">Biology</a>
    <a href="admin.html" class="nav-link" style="margin-top: auto; color: #fbbf24;">Admin Panel</a>
</div>

<div class="main-content">
    <div class="user-header">
        <div>
            <h1 style="margin:0;">Welcome Back</h1>
            <p id="user-info">Guest Access</p>
        </div>
        <button id="login-redirect" class="auth-btn login-btn" onclick="window.location.href='auth.html'">Login</button>
        <button id="logout-btn" class="auth-btn logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>

    <div class="subject-grid">
        <a href="subject-physics.html" class="subject-card">
            <h3 style="color: var(--accent);">Physics</h3>
            <p style="font-size: 0.8rem; color: #94a3b8;">Theory solutions & formulas</p>
        </a>
        <a href="#" class="subject-card">
            <h3 style="color: #10b981;">Chemistry</h3>
            <p style="font-size: 0.8rem; color: #94a3b8;">Reaction mechanisms & labs</p>
        </a>
        <a href="#" class="subject-card">
            <h3 style="color: #f59e0b;">Biology</h3>
            <p style="font-size: 0.8rem; color: #94a3b8;">Anatomy & Genetic diagrams</p>
        </a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com",
    databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com",
    projectId: "ijmb-portal",
    storageBucket: "ijmb-portal.firebasestorage.app",
    messagingSenderId: "521270251438",
    appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  auth.onAuthStateChanged((user) => {
    const info = document.getElementById('user-info');
    const loginBtn = document.getElementById('login-redirect');
    const logoutBtn = document.getElementById('logout-btn');

    if (user) {
        info.innerText = "Logged in as: " + user.email;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
    } else {
        info.innerText = "Guest Mode (Progress not synced)";
        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";
    }
  });

  function handleLogout() {
    auth.signOut().then(() => alert("Signed out!"));
  }
</script>
</body>
</html>
