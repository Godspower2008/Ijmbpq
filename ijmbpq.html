<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        
        /* Card Styling */
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        h2 { font-size: 1.3rem; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        /* Subject Cards */
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 25px; }
        .sub-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 25px; border-radius: 20px; text-decoration: none; color: white; transition: 0.3s; }
        .sub-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(99,102,241,0.1); }
        .sub-card i { font-size: 2rem; color: var(--accent); margin-bottom: 15px; display: block; }
        .sub-card h3 { margin: 0 0 8px; font-size: 1.1rem; }
        .sub-card p { margin: 0; font-size: 0.85rem; color: #94a3b8; }

        /* Real Leaderboard Items */
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-item:last-child { border: none; }
        .user { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.7rem; }
        
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <main class="panel">
            <h2><i class="fa-solid fa-graduation-cap"></i> Academic Archives</h2>
            <div class="subject-grid">
                <a href="physics.html" class="sub-card">
                    <i class="fa-solid fa-atom"></i>
                    <h3>Physics</h3>
                    <p>Theory questions + full step-by-step marking schemes.</p>
                </a>
                <a href="chemistry.html" class="sub-card">
                    <i class="fa-solid fa-flask"></i>
                    <h3>Chemistry</h3>
                    <p>Comprehensive solutions for 2020-2025 past papers.</p>
                </a>
                <a href="biology.html" class="sub-card">
                    <i class="fa-solid fa-dna"></i>
                    <h3>Biology</h3>
                    <p>Visual diagrams and explanatory theory notes.</p>
                </a>
            </div>
        </main>

        <aside class="panel">
            <h2><i class="fa-solid fa-trophy"></i> Top Scholars</h2>
            <div id="leaderboard">
                <div class="rank-item">
                    <div class="user"><div class="avatar">AM</div> <span>Adebayo M.</span></div>
                    <span style="color:var(--accent); font-weight:800;">15.0</span>
                </div>
                <div class="rank-item">
                    <div class="user"><div class="avatar">CO</div> <span>Chinelo O.</span></div>
                    <span style="color:var(--accent); font-weight:800;">14.5</span>
                </div>
            </div>
        </aside>
    </div>
</body>
</html>
