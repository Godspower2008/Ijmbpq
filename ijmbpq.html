<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --glass: rgba(17, 24, 39, 0.7); --border: rgba(255, 255, 255, 0.1); --accent: #6366f1; --gold: #f59e0b; --text: #f9fafb; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 30px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .subject-card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-decoration: none; color: white; transition: 0.3s; }
        .subject-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .leaderboard { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--border); height: fit-content; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal { background: #0f172a; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .modal input, .modal select { width: 100%; padding: 14px; margin-bottom: 12px; background: #020617; border: 1px solid var(--border); color: white; border-radius: 10px; outline: none; }
        .btn-auth { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <h2 id="mTitle" style="margin-bottom:20px;">Student Login</h2>
            <input type="text" id="regName" class="reg-only" placeholder="Full Name" style="display:none;">
            <input type="email" id="email" placeholder="Email Address">
            <select id="regCombo" class="reg-only" style="display:none;">
                <option value="">Select Combination</option>
                <option value="PCM">PCM</option><option value="PCB">PCB</option><option value="EGB">EGB</option>
            </select>
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-auth" onclick="handleAuth()" id="mBtn">Sign In</button>
            <p onclick="toggleAuth()" id="mToggle" style="text-align:center; font-size:0.8rem; margin-top:15px; cursor:pointer; color:var(--accent);">New student? Register</p>
            <p onclick="resetPass()" style="text-align:center; font-size:0.8rem; margin-top:10px; cursor:pointer; color:var(--text-dim);">Forgot Password?</p>
        </div>
    </div>

    <div class="container">
        <nav>
            <div style="font-weight:800;">IJMB<span>PRO</span></div>
            <button id="loginBtn" onclick="openAuth()" style="padding:8px 20px; border-radius:10px; border:none; background:var(--accent); color:white; font-weight:700;">Login</button>
            <button id="logoutBtn" onclick="logout()" style="display:none; padding:8px 20px; border-radius:10px; border:1px solid var(--border); background:transparent; color:white;">Sign Out</button>
        </nav>

        <div class="dashboard-grid">
            <main>
                <h1 id="greet" style="margin-bottom:30px;">Hi, Guest</h1>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
                    <div class="stat-card"><span>Mastered</span><h2 id="sSolved">0</h2></div>
                    <div class="stat-card"><span>Rank</span><h2 style="color:var(--gold);">Scholar</h2></div>
                </div>
                <div class="subject-grid">
                    <a href="subject-physics.html" class="subject-card"><h3>Physics</h3><p>Mechanics & Theory</p></a>
                    <a href="subject-chemistry.html" class="subject-card"><h3>Chemistry</h3><p>Organic & Physical</p></a>
                    <a href="subject-biology.html" class="subject-card"><h3>Biology</h3><p>Anatomy & Physiology</p></a>
                </div>
            </main>
            <aside class="leaderboard">
                <h3 style="margin-bottom:20px;">🏆 Top Scholars</h3>
                <div id="lList" style="font-size:0.9rem; color:var(--text-dim);">Loading...</div>
            </aside>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", authDomain: "ijmb-portal.firebaseapp.com", databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com", projectId: "ijmb-portal", appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        let isLogin = true;

        function openAuth() { document.getElementById('authModal').style.display='flex'; }
        function toggleAuth() {
            isLogin = !isLogin;
            document.querySelectorAll('.reg-only').forEach(el => el.style.display = isLogin ? 'none' : 'block');
            document.getElementById('mTitle').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('mBtn').innerText = isLogin ? 'Sign In' : 'Create Account';
        }

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(isLogin) { auth.signInWithEmailAndPassword(e,p).then(()=>location.reload()); }
            else {
                const n = document.getElementById('regName').value, c = document.getElementById('regCombo').value;
                const res = await auth.createUserWithEmailAndPassword(e,p);
                await db.ref(`users/${res.user.uid}/profile`).set({ fullName: n, combo: c, score: 0 });
                location.reload();
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginBtn').style.display='none';
                document.getElementById('logoutBtn').style.display='block';
                db.ref(`users/${user.uid}/profile`).on('value', snap => {
                    if(snap.val()) document.getElementById('greet').innerText = "Hi, " + snap.val().fullName.split(' ')[0];
                });
                db.ref(`users/${user.uid}/progress`).on('value', snap => {
                    let count = 0; if(snap.val()) Object.values(snap.val()).forEach(s => count += Object.keys(s).length);
                    document.getElementById('sSolved').innerText = count;
                    db.ref(`users/${user.uid}/profile/score`).set(count);
                });
            }
        });

        db.ref('users').on('value', snap => {
            let data = snap.val(), list = [];
            for(let id in data) if(data[id].profile) list.push(data[id].profile);
            list.sort((a,b)=>b.score - a.score);
            document.getElementById('lList').innerHTML = list.slice(0,5).map((u,i)=>`<div style="margin-bottom:10px;">#${i+1} ${u.fullName} - <b>${u.score}pts</b></div>`).join('');
        });

        function resetPass() { const e = document.getElementById('email').value; if(e) auth.sendPasswordResetEmail(e).then(()=>alert("Sent!")); }
        function logout() { auth.signOut().then(()=>location.reload()); }
    </script>
</body>
</html>
