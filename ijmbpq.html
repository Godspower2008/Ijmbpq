<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --glass: rgba(17, 24, 39, 0.7); --accent: #6366f1; --text: #f9fafb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .subject-link { display: block; padding: 15px; background: #1e293b; color: white; text-decoration: none; border-radius: 12px; margin-bottom: 10px; font-weight: 700; }
        .subject-link:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="grid">
        <main>
            <div class="card">
                <h1 id="userGreet">Loading Profile...</h1>
                <p>Select a subject archive below to begin your theoretical mastery.</p>
            </div>
            <div class="card">
                <h3>Theoretical Archives</h3>
                <a href="subject-physics.html" class="subject-link">Physics Archive</a>
                <a href="chemistry-2024-theory.html" class="subject-link">Chemistry Archive</a>
                <a href="economics-2024-theory.html" class="subject-link">Economics Archive</a>
            </div>
        </main>
        <aside>
            <div class="card">
                <h3>Leaderboard</h3>
                <div id="leaderboardList">Loading...</div>
            </div>
        </aside>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", authDomain: "ijmb-portal.firebaseapp.com", databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com", projectId: "ijmb-portal", appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        auth.onAuthStateChanged(user => {
            if(!user || !user.emailVerified) location.href="landing.html";
            db.ref(`users/${user.uid}/profile`).on('value', snap => {
                if(snap.val()) document.getElementById('userGreet').innerText = "Welcome, " + snap.val().fullName;
            });
        });

        db.ref('users').on('value', snap => {
            let html = "";
            const users = snap.val();
            for(let id in users) {
                if(users[id].profile) {
                    html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #333;">
                        <span>${users[id].profile.fullName}</span>
                        <span style="color:var(--accent); font-weight:800;">${users[id].profile.score || 0} pts</span>
                    </div>`;
                }
            }
            document.getElementById('leaderboardList').innerHTML = html;
        });
    </script>
</body>
</html>
