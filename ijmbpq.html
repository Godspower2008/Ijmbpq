<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--card); border-bottom: 1px solid var(--border); }
        
        /* The Layout Fix */
        .container { 
            max-width: 1300px; 
            margin: 20px auto; 
            padding: 0 15px; 
            display: grid; 
            grid-template-columns: 260px 1fr 280px; 
            gap: 20px; 
        }

        .welcome-panel { background: linear-gradient(135deg, #1e1b4b, #0f172a); border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .sub-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; text-decoration: none; color: white; }

        /* RESPONSIVE DASHBOARD */
        @media (max-width: 1100px) {
            .container { grid-template-columns: 1fr; } /* Stack everything into one column */
            aside { display: none; } /* Hide sidebars on smaller tablets/phones */
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800;">IJMB<span style="color:var(--accent)">PRO</span></div>
        <div id="uDisplay" style="font-size: 0.8rem; font-weight: 700;">Scholar</div>
    </nav>
    <div class="container">
        <aside>
            <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <h4>Progress</h4>
                <p style="font-size:0.8rem; color:#94a3b8;">65% Completed</p>
            </div>
        </aside>
        <main>
            <div class="welcome-panel">
                <h2 id="greet">Welcome!</h2>
                <a href="physics.html" style="background:var(--cta); color:black; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:800; display:inline-block; margin-top:15px;">PRACTICE PHYSICS</a>
            </div>
            <div class="grid">
                <a href="physics.html" class="sub-card"><h3>Physics</h3></a>
                <a href="#" class="sub-card"><h3>Chemistry</h3></a>
                <a href="#" class="sub-card"><h3>Biology</h3></a>
            </div>
        </main>
    </div>
    <script>
        const name = localStorage.getItem('ijmb_user') || "Scholar";
        document.getElementById('greet').innerText = `Welcome Back, ${name.split(' ')[0]}!`;
        document.getElementById('uDisplay').innerText = name;
    </script>
</body>
</html>
