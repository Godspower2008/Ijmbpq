<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | IJMB Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --glass: rgba(15, 23, 42, 0.7); --accent: #6366f1; --border: rgba(99, 102, 241, 0.2); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Live Status Indicator */
        .live-status { display: flex; align-items: center; gap: 8px; background: rgba(16, 185, 129, 0.1); padding: 8px 16px; border-radius: 50px; border: 1px solid #10b981; width: fit-content; margin-bottom: 20px; }
        .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Grid Layout */
        .portal-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        @media (max-width: 900px) { .portal-grid { grid-template-columns: 1fr; } }

        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px; padding: 25px; transition: 0.4s; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.2rem; }

        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .subject-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 18px; padding: 20px; text-align: center; text-decoration: none; color: white; transition: 0.3s; }
        .subject-box:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(99,102,241,0.1); }
        .subject-box i { font-size: 1.8rem; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

    <header id="global-header"></header>

    <div class="container">
        <div class="live-status">
            <span class="dot"></span>
            <span style="color: #10b981; font-weight: 800; font-size: 0.8rem;">
                <span id="active-count">...</span> SCHOLARS ONLINE NOW
            </span>
        </div>

        <div class="portal-grid">
            <main class="card" id="archive-section">
                <div class="card-header">
                    <h2 style="font-size: 1.2rem;"><i class="fa-solid fa-graduation-cap"></i> Academic Archives</h2>
                    <button class="close-btn" onclick="closeSection('archive-section')"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="subject-grid">
                    <a href="subject-physics.html" class="subject-box"><i class="fa-solid fa-atom"></i><h3>Physics</h3></a>
                    <a href="subject-chemistry.html" class="subject-box"><i class="fa-solid fa-flask"></i><h3>Chemistry</h3></a>
                    <a href="subject-biology.html" class="subject-box"><i class="fa-solid fa-dna"></i><h3>Biology</h3></a>
                </div>
            </main>

            <aside class="card" id="leaderboard-section">
                <div class="card-header">
                    <h2 style="font-size: 1.2rem;"><i class="fa-solid fa-trophy"></i> Top Scholars</h2>
                    <button class="close-btn" onclick="closeSection('leaderboard-section')"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="leaderboardList">Loading rankings...</div>
            </aside>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- REAL-TIME ONLINE TRACKING ---
        const statusRef = db.ref(".info/connected");
        const presenceRef = db.ref("online_status");

        statusRef.on("value", (snap) => {
            if (snap.val() === true) {
                const myStatusRef = presenceRef.push();
                myStatusRef.set(true);
                myStatusRef.onDisconnect().remove();
            }
        });

        presenceRef.on("value", (snap) => {
            document.getElementById('active-count').innerText = snap.numChildren();
        });

        // --- CLOSE SECTION LOGIC ---
        function closeSection(id) {
            const el = document.getElementById(id);
            el.style.opacity = "0";
            el.style.transform = "scale(0.95)";
            setTimeout(() => { el.style.display = "none"; }, 400);
        }
    </script>
</body>
</html>
