<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Mode | IJMB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --glass:rgba(30,41,59,0.8);
  --border:rgba(99,102,241,0.2);
  --accent:#6366f1;
  --text:#f8fafc;
  --text-dim:#94a3b8;
  --success:#10b981;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Plus Jakarta Sans',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 5%;
  background:var(--glass);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-weight:800;
  font-size:1.2rem;
  color:var(--text);
  text-decoration:none;
}
.logo span{ color:var(--accent); }

.nav-links{
  display:flex;
  gap:20px;
}
.nav-links a{
  color:var(--text-dim);
  text-decoration:none;
  font-weight:600;
}
.nav-links a:hover{ color:var(--accent); }

.hamburger{
  display:none;
  flex-direction:column;
  justify-content:space-around;
  width:28px;
  height:22px;
  cursor:pointer;
}
.hamburger div{
  height:3px;
  background:white;
  border-radius:2px;
  transition:0.4s;
}

/* MOBILE NAV */
@media(max-width:768px){
  .nav-links{
    display:none;
    flex-direction:column;
    position:absolute;
    top:60px;
    right:5%;
    background:var(--bg);
    padding:20px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
    gap:15px;
  }
  .nav-links.active{ display:flex; animation:fadeIn 0.3s ease forwards; }
  .hamburger{ display:flex; }
  .hamburger.open div:nth-child(1){ transform:rotate(45deg) translate(5px,5px); }
  .hamburger.open div:nth-child(2){ opacity:0; }
  .hamburger.open div:nth-child(3){ transform:rotate(-45deg) translate(5px,-5px); }
}
@keyframes fadeIn{ from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);} }

/* SETUP */
.setup{ max-width:800px; margin:60px auto; padding:0 5%; }
.card{ background:var(--card); padding:30px; border-radius:20px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:20px; }
select,input{ width:100%; padding:12px; background:#1e293b; border:1px solid var(--border); color:white; border-radius:10px; }
button{ padding:15px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:700; cursor:pointer; width:100%; }

/* EXAM */
.exam{ display:none; max-width:1200px; margin:30px auto; padding:0 5%; gap:20px; }
.exam.active{ display:grid; grid-template-columns:1fr 320px; }
@media(max-width:900px){ .exam.active{ grid-template-columns:1fr; } }

.question-panel{ background:var(--card); padding:30px; border-radius:20px; position:relative; }
.backbtn{ position:absolute; top:15px; left:15px; background:#334155; border:none; border-radius:8px; padding:10px 15px; cursor:pointer; }
#qtitle{ margin-top:50px; color:var(--accent); font-size:1.1rem; }
#questionBox{ margin-top:15px; font-size:1.2rem; line-height:1.6; min-height:200px; }
.navbtns{ display:flex; gap:10px; margin-top:20px; }
.navbtns button{ flex:1; padding:10px; border-radius:8px; cursor:pointer; border:none; background:var(--accent); font-weight:700; color:white; }

.sidebar{ background:var(--glass); padding:20px; border-radius:20px; margin-top:20px; }
.timer{ font-size:2rem; font-weight:800; text-align:center; margin-bottom:15px; }
.qmap{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:15px; }
.dot{ background:#1e293b; padding:10px; border-radius:8px; text-align:center; cursor:pointer; }
.dot.active{ background:var(--accent); }
.dot.flagged{ border:2px solid #f59e0b; }

</style>
</head>
<body>

<header>
  <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>

  <nav class="nav-links" id="navLinks">
    <a href="ijmbpq.html">Dashboard</a>
    <a href="study.html">Study</a>
    <a href="exam.html">Exam</a>
  </nav>

  <div class="hamburger" id="hamburger">
    <div></div><div></div><div></div>
  </div>
</header>

<!-- SETUP -->
<div class="setup" id="setup">
  <div class="card">
    <div class="grid">
      <select id="subject">
        <option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Economics">Economics</option>
      </select>
      <select id="year"></select>
      <select id="paper">
        <option value="I">Paper I</option>
        <option value="II">Paper II</option>
      </select>
      <select id="section">
        <option value="A">Section A</option>
        <option value="B">Section B</option>
      </select>
    </div>
    <div class="grid">
      <input id="qAmount" type="number" min="1" value="10">
      <input id="examTime" type="number" min="1" value="45">
    </div>
    <button onclick="startExam()">Start Exam</button>
  </div>
</div>

<!-- EXAM -->
<div class="exam" id="exam">
  <div class="question-panel">
    <button class="backbtn" onclick="goBack()">← Back</button>
    <h3 id="qtitle"></h3>
    <div id="questionBox"></div>
    <div class="navbtns">
      <button onclick="prevQ()">Previous</button>
      <button onclick="nextQ()">Next</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="timer" id="timer">00:00</div>
    <div class="qmap" id="qmap"></div>
    <button style="background:var(--success)" onclick="submitExam()">Submit</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
  databaseURL:"https://ijmb-portal-default-rtdb.firebaseio.com"
});

const db=firebase.database();
const yearSelect=document.getElementById("year");
for(let y=2026;y>=2009;y--){
  let o=document.createElement("option"); o.value=y; o.innerText=y; yearSelect.appendChild(o);
}

let questions=[]; let index=0; let timerInterval;
const hamburger=document.getElementById("hamburger");
const navLinks=document.getElementById("navLinks");
hamburger.onclick=()=>{ hamburger.classList.toggle("open"); navLinks.classList.toggle("active"); };

async function startExam(){
  const sub=document.getElementById("subject").value;
  const yr=document.getElementById("year").value;
  const paper=document.getElementById("paper").value;
  const sec=document.getElementById("section").value;
  const limit=parseInt(document.getElementById("qAmount").value);

  const snap=await db.ref(`questions/${sub}/${yr}/${paper}/${sec}`).once("value");
  if(!snap.exists()){ alert("No questions found"); return; }

  questions=[]; snap.forEach(c=>questions.push(c.val()));
  questions=questions.slice(0,limit);

  document.getElementById("setup").style.display="none";
  document.getElementById("exam").classList.add("active");

  buildMap(); render(); startTimer(parseInt(document.getElementById("examTime").value));
}

function buildMap(){
  const map=document.getElementById("qmap"); map.innerHTML="";
  questions.forEach((q,i)=>{ map.innerHTML+=`<div class="dot" id="dot${i}" onclick="jump(${i})">${i+1}</div>`; });
}

function render(){
  const q=questions[index];
  document.getElementById("qtitle").innerText=`Question ${index+1}`;
  document.getElementById("questionBox").innerHTML=q.text;
  document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"));
  document.getElementById("dot"+index).classList.add("active");
  MathJax.typesetPromise();
}

function nextQ(){ if(index<questions.length-1){ index++; render(); } }
function prevQ(){ if(index>0){ index--; render(); } }
function jump(i){ index=i; render(); }

function startTimer(min){
  let sec=min*60;
  timerInterval=setInterval(()=>{
    let m=Math.floor(sec/60), s=sec%60;
    document.getElementById("timer").innerText=`${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
    sec--; if(sec<0){ clearInterval(timerInterval); submitExam(); }
  },1000);
}

function goBack(){ location.reload(); }

function submitExam(){ clearInterval(timerInterval); alert("Exam submitted"); location.href="ijmbpq.html"; }

</script>

</body>
</html>
