<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --sidebar: #1e293b; --accent: #38bdf8; --text-main: #f1f5f9; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }
        aside { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 2rem; position: fixed; height: 100vh; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 3rem; }
        .nav-item { padding: 12px; color: var(--text-muted); text-decoration: none; display: block; margin-bottom: 10px; border-radius: 8px; }
        .nav-item.active { background: rgba(56, 189, 248, 0.1); color: var(--accent); }
        main { margin-left: 260px; flex: 1; padding: 3rem; }
        .header { margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--sidebar); padding: 25px; border-radius: 16px; border: 1px solid var(--border); transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .btn { color: var(--accent); text-decoration: none; font-weight: 700; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">IJMB.PRO</div>
        <a href="index.html" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Syllabus</a>
        <a href="#" class="nav-item">CBT Mode</a>
    </aside>
    <main>
        <div class="header">
            <h1>Welcome, Candidate</h1>
            <p style="color: var(--text-muted)">Select a subject to begin your revision.</p>
        </div>
        <div class="grid">
            <div class="card">
                <h3 style="margin-bottom: 10px;">Physics</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">15 Years of Solved Theory & Objectives.</p>
                <a href="subject-physics.html" class="btn">Open Archive →</a>
            </div>
            <div class="card">
                <h3>Chemistry</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Organic, Inorganic, and Physical Chemistry.</p>
                <a href="#" class="btn">Coming Soon</a>
            </div>
        </div>
    </main>
<script src="app.js"></script>
</body>
</html>
