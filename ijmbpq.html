<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ijmbpq.css">
</head>
<body>

    <header>
        <a href="#" class="logo">IJMB<span>PRO</span></a>
        <div class="header-icons">
            <div class="header-icon-circle"><img src="icons/cart.svg" alt="Store"></div>
            <div class="header-icon-circle">
                <img src="icons/bell.svg" alt="Notifications">
                <div class="notification-badge">1</div>
            </div>
        </div>
    </header>

    <main>
        <div class="ad-banner"></div>

        <div class="section-header">
            <h2 class="section-title">CBT Simulators</h2>
        </div>
        <div class="cbt-simulators">
            <div class="simulator-card" onclick="location.href='exam.html'">
                <div class="simulator-content">
                    <h3>CBT Simulator</h3>
                    <p>Practice for any CBT exam environment.</p>
                </div>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Quick Links</h2>
        </div>
        <div class="quick-links">
            <div class="quick-link-card" onclick="location.href='study.html'">
                <h3>Study Past Questions</h3>
            </div>
            <div class="quick-link-card">
                <h3>IJMB PRO Store</h3>
            </div>
            <div class="quick-link-card">
                <h3>Video Lessons</h3>
            </div>
            <div class="quick-link-card">
                <h3>Novels</h3>
            </div>
        </div>
    </main>

    <nav class="mobile-nav">
        <a href="#" class="mobile-nav-item active"><span>Home</span></a>
        <a href="study.html" class="mobile-nav-item"><span>Study</span></a>
        <a href="exam.html" class="mobile-nav-item"><span>Test</span></a>
        <a href="#" class="mobile-nav-item"><span>More</span></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
