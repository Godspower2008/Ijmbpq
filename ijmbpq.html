<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --cta: #f59e0b; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 280px 1fr 300px; gap: 30px; }
        .sidebar-box { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        .progress-bar { height: 8px; background: #1e293b; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 68%; }
        .welcome-hero { background: linear-gradient(135deg, #1e1b4b, #0f172a); border-radius: 30px; padding: 40px; border: 1px solid var(--border); position: relative; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .sub-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; text-decoration: none; color: white; transition: 0.3s; }
        .sub-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } .sidebar-box, .leaderboard { display: none; } }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800; font-size: 1.3rem;">IJMB<span style="color:var(--accent)">PRO</span></div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="navName" style="font-size: 0.9rem; font-weight: 800;">Scholar</div>
            <div style="width:35px; height:35px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:800;">S</div>
        </div>
    </nav>
    <div class="container">
        <aside>
            <div class="sidebar-box">
                <h4>Mastery</h4>
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:0.75rem;"><span>Syllabus Covered</span><span>68%</span></div>
            </div>
        </aside>
        <main>
            <div class="welcome-hero">
                <h1 id="greeting">Welcome Back! 👑</h1>
                <p style="color:#94a3b8; margin-bottom: 20px;">Continue your Physics practice to reach the Top 5%.</p>
                <a href="physics.html" style="background:var(--cta); color:black; padding:12px 25px; border-radius:12px; text-decoration:none; font-weight:800;">CONTINUE PRACTICE</a>
            </div>
            <div class="card-grid">
                <a href="physics.html" class="sub-card">
                    <i class="fa-solid fa-atom" style="font-size:2rem; color:var(--accent); margin-bottom:15px;"></i>
                    <h3>Physics Vault</h3>
                    <p style="font-size:0.8rem; color:#94a3b8; margin-top:10px;">120+ Solved marking schemes.</p>
                </a>
                </div>
        </main>
        <aside class="leaderboard">
            <div class="sidebar-box">
                <h4 style="margin-bottom:15px;">Top Scholars</h4>
                <div class="rank-item"><span>🥇 John D.</span><span>94%</span></div>
                <div class="rank-item"><span>🥈 Mary S.</span><span>89%</span></div>
                <div class="rank-item" style="border:none;"><span>🥉 Daniel O.</span><span>82%</span></div>
            </div>
        </aside>
    </div>
    <script>
        const userName = localStorage.getItem('ijmb_user') || "Scholar";
        document.getElementById('greeting').innerText = `Welcome Back, ${userName.split(' ')[0]}! 👑`;
        document.getElementById('navName').innerText = userName;
    </script>
</body>
</html>
