<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans'; background: #020617; color: white; margin: 0; }
        nav { padding: 20px 5%; background: #0f172a; display: flex; justify-content: space-between; align-items: center; }
        .welcome-box { padding: 60px 5%; background: linear-gradient(to right, #1e1b4b, #020617); border-radius: 20px; margin: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-exam { background: #6366f1; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: 800; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:800; font-size:1.2rem;">IJMB<span style="color:#6366f1">PRO</span></div>
        <div id="navName" style="font-weight:700; color:#94a3b8;">Scholar</div>
    </nav>

    <div class="welcome-box">
        <h1 id="displayName">Welcome, Scholar! 👑</h1>
        <p>Your 2026 Science Archive is ready for study.</p>
        <a href="physics.html" class="btn-exam">START PHYSICS PRACTICE</a>
    </div>

    <script>
        // STEP 1: Extract the name from memory
        const savedName = localStorage.getItem('scholarName');

        // STEP 2: Check if name exists, then update the page
        if (savedName) {
            // Get just the first name (e.g. "John" from "John Doe")
            const firstName = savedName.split(' ')[0];
            
            document.getElementById('displayName').innerText = `Welcome Back, ${firstName}! 👑`;
            document.getElementById('navName').innerText = savedName;
        }
    </script>
</body>
</html>
