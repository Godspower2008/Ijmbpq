<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        
        .container { max-width: 1300px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 260px 1fr 280px; gap: 20px; }
        
        .panel { background: linear-gradient(135deg, #1e1b4b, #0f172a); border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 25px; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .mobile-toggle { display: none; font-size: 1.5rem; cursor: pointer; }

        @media (max-width: 1100px) {
            .container { grid-template-columns: 1fr; }
            aside { display: none; }
            .mobile-toggle { display: block; }
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800; font-size: 1.2rem;">IJMB<span style="color:var(--accent)">PRO</span></div>
        <div id="uNameNav" style="font-size: 0.8rem; font-weight: 700;">Scholar</div>
        <div class="mobile-toggle"><i class="fa-solid fa-bars"></i></div>
    </nav>
    <div class="container">
        <aside>
            <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <h4>Mastery</h4>
                <div style="height:8px; background:#1e293b; border-radius:10px; margin:10px 0;"><div style="width:65%; background:var(--accent); height:100%;"></div></div>
                <p style="font-size:0.7rem; color:#94a3b8;">65% Completed</p>
            </div>
        </aside>
        <main>
            <div class="panel">
                <h2 id="greet">Welcome!</h2>
                <p style="color:#94a3b8; margin: 10px 0 20px;">Your 2026 Archive is active.</p>
                <a href="physics.html" style="background:var(--cta); color:black; padding:12px 24px; border-radius:10px; text-decoration:none; font-weight:800; font-size:0.9rem;">CONTINUE PHYSICS</a>
            </div>
            <div class="grid">
                <a href="physics.html" class="card"><i class="fa-solid fa-atom"></i><h3 style="margin-top:10px;">Physics Archive</h3></a>
                <a href="#" class="card"><i class="fa-solid fa-flask"></i><h3 style="margin-top:10px;">Chemistry Hub</h3></a>
                <a href="#" class="card"><i class="fa-solid fa-dna"></i><h3 style="margin-top:10px;">Biology Vault</h3></a>
            </div>
        </main>
        <aside>
            <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <h4>Top Rank</h4>
                <p style="font-size:0.8rem; padding-top:10px;">1. John Doe (98%)</p>
                <p style="font-size:0.8rem; padding-top:10px; color:var(--accent);">You (65%)</p>
            </div>
        </aside>
    </div>
    <script>
        const name = localStorage.getItem('ijmb_user') || "Scholar";
        document.getElementById('greet').innerText = `Welcome Back, ${name.split(' ')[0]}!`;
        document.getElementById('uNameNav').innerText = name;
    </script>
</body>
</html>
