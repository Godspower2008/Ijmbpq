<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        
        <nav class="nav-links" id="navLinks">
            <a href="ijmbpq.html" class="nav-item active">Home</a>
            <a href="study.html" class="nav-item">Study</a>
            <a href="test.html" class="nav-item">Test</a>
            <a href="more.html" class="nav-item">More</a>
        </nav>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <main>
        <div class="ad-banner"></div>

        <div class="section-header">
            <h2 class="section-title">CBT Simulators</h2>
        </div>
        <div class="grid">
            <div class="card" onclick="location.href='test.html'">
                <h3>JAMB/UTME Simulator</h3>
                <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 8px;">Practice with over 20,000 past questions.</p>
            </div>
            <div class="card" onclick="location.href='test.html'">
                <h3>IJMB Special Mode</h3>
                <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 8px;">Tailored for points-based examination entry.</p>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Quick Links</h2>
        </div>
        <div class="grid quick-links-grid">
            <div class="card" onclick="location.href='study.html'">
                <h3 style="font-size: 0.9rem;">Past Questions</h3>
            </div>
            <div class="card" onclick="location.href='study.html'">
                <h3 style="font-size: 0.9rem;">Novels</h3>
            </div>
            <div class="card">
                <h3 style="font-size: 0.9rem;">Video Lessons</h3>
            </div>
            <div class="card">
                <h3 style="font-size: 0.9rem;">Pro Store</h3>
            </div>
        </div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            hamburger.classList.toggle('active');
        });

        // Close menu if clicking outside
        document.addEventListener('click', (e) => {
            if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
                navLinks.classList.remove('open');
                hamburger.classList.remove('active');
            }
        });
    </script>
</body>
</html>
