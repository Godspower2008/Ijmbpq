<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        
        <nav class="nav-links" id="navLinks">
            <a href="ijmbpq.html" class="nav-item active">Home</a>
            <a href="study.html" class="nav-item">Study</a>
            <a href="test.html" class="nav-item">Test</a>
            <a href="more.html" class="nav-item">More</a>

        <div class="hamburger" id="hamburger">

    <main>
        <div class="ad-banner"></div>

        <div class="section-header">
            <h2 class="section-title">CBT Simulators</h2>
        </div>
        
        <div class="grid-container">
            <div class="card" onclick="location.href='test.html'">
                <h3>CBT Simulator</h3>
                <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 5px;">Practice in a real exam environment.</p>

            <div class="card" onclick="location.href='test.html'">

            </div>

            </div>
        </div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            // Animate hamburger to X (optional)
            hamburger.classList.toggle('active');
        });
    </script>
