<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IJMB Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --glass: rgba(15, 23, 42, 0.7); --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
        
        .card { background: var(--glass); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .sub-box { background: #0f172a; padding: 20px; border-radius: 16px; text-decoration: none; color: white; border: 1px solid rgba(99, 102, 241, 0.1); transition: 0.3s; text-align: center; }
        .sub-box:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        .rank-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <header id="global-header"></header>

    <div class="container">
        <main>
            <div class="card">
                <h1 id="userGreet">Loading...</h1>
                <p style="color: #94a3b8;">You are currently in the 2026 Premium Theoretical Archive.</p>
                <div class="subject-grid">
                    <a href="subject-physics.html" class="sub-box"><b>Physics</b></a>
                    <a href="chemistry-2024-theory.html" class="sub-box"><b>Chemistry</b></a>
                    <a href="biology-2024-theory.html" class="sub-box"><b>Biology</b></a>
                </div>
            </div>
        </main>

        <aside>
            <div class="card">
                <h3 style="margin-bottom: 20px;">Leaderboard</h3>
                <div id="leaderboardList"></div>
            </div>
        </aside>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", authDomain: "ijmb-portal.firebaseapp.com", databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com", projectId: "ijmb-portal", appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        auth.onAuthStateChanged(user => {
            if(!user || !user.emailVerified) location.href="landing.html";
            db.ref(`users/${user.uid}/profile`).on('value', snap => {
                if(snap.val()) document.getElementById('userGreet').innerText = "Hello, " + snap.val().fullName;
            });
        });

        db.ref('users').limitToFirst(10).on('value', snap => {
            let html = "";
            snap.forEach(child => {
                const u = child.val().profile;
                if(u) html += `<div class="rank-item"><span>${u.fullName}</span><b style="color:#6366f1;">${u.score || 0}</b></div>`;
            });
            document.getElementById('leaderboardList').innerHTML = html;
        });
    </script>
</body>
</html>
