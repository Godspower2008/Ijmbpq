<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB PRO | Join 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #6366f1; --cta: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: #0f172a; padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #1e293b; background: #020617; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; background: var(--cta); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="margin-bottom:20px;">Create Account</h2>
        <input type="text" id="uName" placeholder="Enter Your Full Name">
        <input type="email" placeholder="Email Address">
        <button class="btn" onclick="createAccount()">JOIN THE ARCHIVE</button>
    </div>

    <script>
        function createAccount() {
            const fullName = document.getElementById('uName').value;
            
            if(fullName.length > 2) {
                // STEP 1: Save the name to browser memory
                localStorage.setItem('scholarName', fullName);
                
                // STEP 2: Move to the dashboard
                window.location.href = 'ijmbpq.html';
            } else {
                alert("Please enter your real name to register.");
            }
        }
    </script>
</body>
</html>
