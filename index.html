<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB PRO | Secure Your 15 Points</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --accent: #6366f1; --cta: #f59e0b; --glass: rgba(15, 23, 42, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .glow { position: absolute; width: 400px; height: 400px; background: var(--accent); filter: blur(150px); opacity: 0.15; z-index: -1; top: 10%; left: 10%; }
        
        .auth-container { width: 100%; max-width: 450px; padding: 20px; z-index: 1; }
        .logo { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 30px; letter-spacing: -1px; }
        
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }
        
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #1e293b; background: #020617; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
        
        .btn-cta { width: 100%; padding: 18px; background: var(--cta); color: #000; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-cta:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(245, 158, 11, 0.4); }
        
        .footer-link { text-align: center; margin-top: 25px; font-size: 0.85rem; color: #64748b; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="auth-container">
        <div class="logo">IJMB<span style="color:var(--accent)">PRO</span></div>
        <div class="auth-card">
            <h1>Scholar Access</h1>
            <p>Enter your details to access the 2026 Archive</p>
            
            <input type="text" id="userName" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Create Password">
            
            <button class="btn-cta" onclick="handleLogin()">Enter Archive</button>
            
            <div class="footer-link">
                Already a member? <a href="#">Sign In instead</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const name = document.getElementById('userName').value;
            if (name.length > 2) {
                // Save name to browser memory
                localStorage.setItem('ijmb_user', name);
                // Redirect to the Dashboard
                window.location.href = 'ijmbpq.html';
            } else {
                alert("Please enter your full name to proceed.");
            }
        }
    </script>
</body>
</html>
