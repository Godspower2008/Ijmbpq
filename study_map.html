<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Map | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .map-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
        }

        /* The central path line */
        .path-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--border);
            transform: translateX(-50%);
            z-index: 0;
        }

        .milestone {
            position: relative;
            z-index: 1;
            margin-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .node {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--card);
            border: 4px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Active/Completed Node */
        .milestone.completed .node {
            background: var(--accent);
            border-color: #4f46e5;
            color: white;
        }

        .milestone.current .node {
            background: #fbbf24;
            border-color: #d97706;
            color: white;
            animation: pulse 2s infinite;
        }

        .milestone-label {
            font-weight: 800;
            font-size: 0.9rem;
            text-align: center;
            background: var(--card);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .badge-pop {
            position: absolute;
            right: -60px;
            top: 0;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 800;
            border: 1px solid #10b981;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .exam-destination {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-top: 50px;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Home</a>
        <div style="font-weight: 800;">My Study Path</div>
        <div style="width: 40px;"></div>
    </header>

    <main class="map-container">
        <div class="path-line"></div>

        <div class="milestone completed">
            <div class="node"><i class="fa-solid fa-flag-checkered"></i></div>
            <div class="milestone-label">Platform Onboarding</div>
            <div class="badge-pop"><i class="fa-solid fa-medal"></i> Rookie</div>
        </div>

        <div class="milestone completed">
            <div class="node"><i class="fa-solid fa-book-open"></i></div>
            <div class="milestone-label">25% Syllabus Covered</div>
            <div class="badge-pop"><i class="fa-solid fa-medal"></i> Reader</div>
        </div>

        <div class="milestone current">
            <div class="node"><i class="fa-solid fa-pen-nib"></i></div>
            <div class="milestone-label">First Theory Simulation</div>
        </div>

        <div class="milestone">
            <div class="node"><i class="fa-solid fa-users"></i></div>
            <div class="milestone-label">Weekly Challenge Pro</div>
        </div>

        <div class="milestone">
            <div class="node"><i class="fa-solid fa-chart-line"></i></div>
            <div class="milestone-label">75% Syllabus Mastery</div>
        </div>

        <div class="exam-destination">
            <i class="fa-solid fa-graduation-cap" style="font-size: 3rem; margin-bottom: 15px;"></i>
            <h2 style="font-weight: 800;">The IJMB Main Exam</h2>
            <p style="font-size: 0.8rem; opacity: 0.9; margin-top: 5px;">Scheduled for June 2026</p>
        </div>
    </main>

</body>
</html>
