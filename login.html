<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans'; background: #020617; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #0f172a; padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); width: 350px; text-align: center; }

        .btn { width: 100%; padding: 14px; background: #6366f1; border: none; border-radius: 10px; color: white; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>

<body>
    <div class="login-card">
        <h2>Welcome Back</h2>
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <button class="btn" onclick="window.location.href='ijmbpq.html'">LOGIN</button>
        <p style="font-size: 0.8rem; margin-top: 20px; color: #64748b;">Don't have an account? <a href="index.html" style="color:#6366f1;">Register</a></p>

</html>
