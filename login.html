<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IJMB PRO</title>
    <style>
        body { font-family: sans-serif; background: #020617; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; }
        .card { background: #0f172a; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #1e293b; background: #020617; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #6366f1; border: none; border-radius: 10px; color: white; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome Back</h2>
        <input type="text" id="lName" placeholder="Full Name">
        <input type="password" placeholder="Password">
        <button class="btn" onclick="l()">LOG IN</button>
    </div>
    <script>
        function l() {
            const n = document.getElementById('lName').value;
            if(n) { localStorage.setItem('ijmb_user', n); window.location.href='ijmbpq.html'; }
        }
    </script>
</body>
</html>
