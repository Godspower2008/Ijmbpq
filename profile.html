<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .avatar-edit-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--card);
            border: 3px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--accent);
            overflow: hidden;
            position: relative;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-badge {
            position: absolute;
            bottom: 0;
            right: 5px;
            background: var(--accent);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--bg);
            transition: 0.3s;
        }

        .upload-badge:hover { transform: scale(1.1); }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .save-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        <nav class="nav-links" id="navLinks">
            <a href="ijmbpq.html" class="nav-item">Home</a>
            <a href="study.html" class="nav-item">Study</a>
            <a href="test.html" class="nav-item">Test</a>
            <a href="more.html" class="nav-item active">More</a>
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <main>
        <div class="profile-container">
            <div class="section-header">
                <h1 class="section-title" style="font-size: 1.8rem;">Edit Profile</h1>
            </div>

            <div class="card" style="padding: 30px;">
                <form id="profileForm">
                    <div class="avatar-edit-section">
                        <div class="avatar-preview" id="avatarPreview">
                            <i class="fa-solid fa-user" id="userIcon"></i>
                            <img src="" alt="Profile" id="previewImg">
                        </div>
                        <label for="fileInput" class="upload-badge">
                            <i class="fa-solid fa-camera"></i>
                        </label>
                        <input type="file" id="fileInput" accept="image/*">
                        <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-dim);">Tap camera to change photo</p>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-input" value="Student Account" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-input" value="student@ijmbpro.com" placeholder="Email cannot be changed" disabled>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" class="form-input" placeholder="+234 ...">
                    </div>

                    <div class="form-group">
                        <label>Target Institution</label>
                        <input type="text" class="form-input" placeholder="e.g. University of Ilorin">
                    </div>

                    <button type="submit" class="save-btn">Save Changes</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Header logic
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            hamburger.classList.toggle('active');
        });

        // Image Preview logic
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const userIcon = document.getElementById('userIcon');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    userIcon.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Form Submit
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Profile updated successfully!');
            location.href = 'more.html';
        });
    </script>
</body>
</html>
