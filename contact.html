<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | IJMB Pro-Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --whatsapp: #25d366;
            --text: #f9fafb;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #0f172a, transparent);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 5% 40px 5%;
        }

        .contact-container {
            max-width: 600px;
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            text-align: center;
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        p { color: var(--text-dim); margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); }
        
        input, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--accent); }

        .btn-send {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        /* --- WHATSAPP SECTION --- */
        .wa-divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        .wa-divider::before, .wa-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 15px; }

        .wa-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--whatsapp);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .wa-button:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }

        .back-link { margin-top: 30px; display: block; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--text); }

        @media (max-width: 480px) {
            .contact-container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h1>Need Help?</h1>
        <p>Whether it's payment issues or subject questions, we're here for you.</p>

        <form id="contactForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea id="message" rows="4" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" class="btn-send">Send Message</button>
        </form>

        <div class="wa-divider">OR CHAT INSTANTLY</div>

        <a href="https://wa.me/2348000000000?text=Hello%20IJMB%20Pro%20Support,%20I%20need%20help%20with..." class="wa-button" target="_blank">
            Chat on WhatsApp
        </a>

        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Thank you! Your message has been sent. Our team will contact you via email shortly.");
            this.reset();
        });
    </script>

</body>
</html>
