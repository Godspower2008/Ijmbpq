<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theory Simulators | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles to match your screenshot exactly */
        .simulator-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 25px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .simulator-card:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .info-box h2 { font-size: 1.2rem; margin-bottom: 5px; }
        .info-box p { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; }

        /* Highlight border for the special card */
        .highlight-card {
            border: 2px solid var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </header>

    <main>
        <h1 class="section-title" style="margin-top: 20px; font-size: 2rem;">Theory Simulators</h1>

        <div class="card simulator-card" onclick="location.href='exam_theory.html?type=standard'">
            <div class="icon-box" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                <i class="fa-solid fa-file-invoice"></i>
            </div>
            <div class="info-box">
                <h2>Standard Exam</h2>
                <p>Full-length theory paper following the official IJMB syllabus and timing.</p>
            </div>
        </div>

        <div class="card simulator-card" onclick="location.href='setup_theory.html'">
            <div class="icon-box" style="background: rgba(99, 102, 241, 0.1); color: var(--accent);">
                <i class="fa-solid fa-sliders"></i>
            </div>
            <div class="info-box">
                <h2>Customized Exam</h2>
                <p>Pick specific topics and set your own number of theory questions to practice.</p>
            </div>
        </div>

        <div class="card simulator-card highlight-card" onclick="location.href='leaderboard.html'">
            <div class="icon-box" style="background: var(--accent); color: white;">
                <i class="fa-solid fa-trophy"></i>
            </div>
            <div class="info-box">
                <h2>Weekly Challenge</h2>
                <p>Compete with others and top the leaderboard with your essay scores.</p>
            </div>
        </div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        hamburger.addEventListener('click', () => {
            // Simple toggle logic for your existing menu
            document.querySelector('.nav-links')?.classList.toggle('open');
            hamburger.classList.toggle('active');
        });
    </script>
</body>
</html>
