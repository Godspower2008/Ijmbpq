<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .sim-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }
        .sim-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        <nav class="nav-links" id="navLinks">
            <a href="ijmbpq.html" class="nav-item">Home</a>
            <a href="study.html" class="nav-item">Study</a>
            <a href="test.html" class="nav-item active">Test</a>
            <a href="more.html" class="nav-item">More</a>
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <main>
        <div class="section-header">
            <h1 class="section-title" style="font-size: 1.8rem;">CBT Simulators</h1>
        </div>

        <div class="grid" style="grid-template-columns: 1fr;">
            <div class="card sim-card" onclick="location.href='exam.html'">
                <div class="sim-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div>
                    <h3>JAMB CBT Simulator</h3>
                    <p style="color: var(--text-dim); font-size: 0.8rem;">Full UTME past questions and timed environment.</p>
                </div>
            </div>

            <div class="card sim-card" onclick="location.href='exam.html'">
                <div class="sim-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
                    <i class="fa-solid fa-award"></i>
                </div>
                <div>
                    <h3>WAEC CBT Simulator</h3>
                    <p style="color: var(--text-dim); font-size: 0.8rem;">Practice Objective questions for SSCE.</p>
                </div>
            </div>

            <div class="card sim-card" style="border-color: var(--accent); background: rgba(99, 102, 241, 0.05);">
                <div class="sim-icon" style="background: var(--accent); color: white;">
                    <i class="fa-solid fa-trophy"></i>
                </div>
                <div>
                    <h3>Weekly Challenge</h3>
                    <p style="color: var(--text-dim); font-size: 0.8rem;">Compete with others and top the leaderboard.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            hamburger.classList.toggle('active');
        });
    </script>
</body>
</html>
