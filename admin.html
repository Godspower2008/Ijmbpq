<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | IJMB Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; padding: 40px; }
        .box { max-width: 500px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div class="box">
    <h2>Add Question</h2>
    <select id="subject">
        <option>Physics</option><option>Chemistry</option><option>Biology</option><option>Economics</option>
    </select>
    <textarea id="q" placeholder="Question"></textarea>
    <textarea id="s" placeholder="Solution (Use HTML for diagrams)"></textarea>
    <input type="text" id="m" placeholder="Marks (e.g. 8 Marks)">
    <button onclick="save()">Upload to Cloud</button>
    <p id="stat" style="text-align:center; color:#10b981; margin-top:10px;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
  const config = {
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com",
    databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com",
    projectId: "ijmb-portal",
    storageBucket: "ijmb-portal.firebasestorage.app",
    messagingSenderId: "521270251438",
    appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f"
  };
  firebase.initializeApp(config);
  const db = firebase.database();
  const auth = firebase.auth();

  function login() {
    auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
      .then(() => document.getElementById('login-screen').style.display='none')
      .catch(e => alert(e.message));
  }

  function save() {
    const sub = document.getElementById('subject').value;
    const ref = db.ref('questions/' + sub).push();
    ref.set({
      text: document.getElementById('q').value,
      solution: document.getElementById('s').value,
      marks: document.getElementById('m').value
    }).then(() => {
        document.getElementById('stat').innerText = "Saved!";
        document.getElementById('q').value = "";
        document.getElementById('s').value = "";
    });
  }
</script>
</body>
</html>
