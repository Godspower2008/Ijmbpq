<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | IJMB Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#020617;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
}

/* background glow */
body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:#6366f1;
filter:blur(200px);
opacity:.4;
animation:moveGlow 8s infinite alternate;
}

@keyframes moveGlow{
0%{transform:translate(-200px,-200px);}
100%{transform:translate(200px,200px);}
}

.login-box{
background:#0f172a;
padding:40px;
border-radius:20px;
width:320px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
animation:fadeIn .8s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
text-align:center;
margin-top:0;
margin-bottom:20px;
}

.input-group{
position:relative;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #6366f1;
background:#020617;
color:white;
outline:none;
}

input:focus{
box-shadow:0 0 10px rgba(99,102,241,.5);
}

/* password eye */
.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
opacity:.7;
}

.eye:hover{
opacity:1;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-weight:800;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
background:#4f46e5;
}

.status{
text-align:center;
margin-top:10px;
font-size:0.9rem;
color:#94a3b8;
}

</style>
</head>
<body>

<div class="login-box">

<h2>Admin Login</h2>

<div class="input-group">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<button onclick="login()">Login</button>

<div class="status" id="status"></div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
authDomain:"ijmb-portal.firebaseapp.com",
databaseURL:"https://ijmb-portal-default-rtdb.firebaseio.com"
});

const auth = firebase.auth();
const db = firebase.database();

function togglePassword(){
const p = document.getElementById("password");

if(p.type === "password"){
p.type = "text";
}else{
p.type = "password";
}
}

function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const status = document.getElementById("status");

if(!email || !password){
status.innerText="Fill all fields";
return;
}

status.innerText="Signing in...";

auth.signInWithEmailAndPassword(email,password)

.then(userCredential=>{

const uid = userCredential.user.uid;

db.ref("admins/"+uid).get().then(snapshot=>{

if(snapshot.exists()){

status.innerText="Access granted";
window.location.href="admin-dashboard.html";

}else{

status.innerText="Not an admin";
auth.signOut();

}

});

})

.catch(err=>{
status.innerText=err.message;
});

}

</script>

</body>
</html>
