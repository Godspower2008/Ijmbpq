<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | IJMB Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#020617; --card:#0f172a; --accent:#6366f1; --border: rgba(255,255,255,0.1); }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:white; margin:0; }
.admin-box { max-width:600px; margin:50px auto; background:var(--card); padding:40px; border-radius:24px; border:1px solid var(--border); box-shadow:0 20px 50px rgba(0,0,0,0.3); }
label { display:block; margin-bottom:8px; font-size:0.8rem; color:#94a3b8; font-weight:800; text-transform:uppercase; }
input, select, textarea { width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:1px solid var(--border); background:#020617; color:white; font-family:inherit; }
textarea { height:150px; resize:none; }
button { width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:800; cursor:pointer; font-size:1rem; }
</style>
</head>
<body>

<div class="admin-box">
<h2 style="text-align:center; margin-top:0;">Theory Question Uploader</h2>

<label>Subject</label>
<select id="sub">
  <option value="Physics">Physics</option>
  <option value="Chemistry">Chemistry</option>
  <option value="Biology">Biology</option>
  <option value="Economics">Economics</option>
</select>

<label>Year</label>
<select id="year">
  <!-- Years 2009 to 2026 -->
  <script>
    const yearSelect = document.getElementById('year');
    for(let y=2026; y>=2009; y--){
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      yearSelect.appendChild(opt);
    }
  </script>
</select>

<label>Paper</label>
<select id="paper">
  <option value="I">Paper I</option>
  <option value="II">Paper II</option>
  <option value="III">Paper III</option>
</select>

<label>Section</label>
<select id="section">
  <option value="A">Section A</option>
  <option value="B">Section B</option>
  <option value="C">Section C</option>
  <option value="D">Section D</option>
</select>

<label>Total Marks</label>
<input type="number" id="m" placeholder="e.g., 15">

<label>Question (HTML & LaTeX supported)</label>
<textarea id="q" placeholder="Enter the question text..."></textarea>

<label>Marking Scheme</label>
<textarea id="sol" placeholder="Enter the step-by-step solution..."></textarea>

<button onclick="upload()">Push to Database</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<!-- MathJax for formula preview -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com"
});
const db = firebase.database();

function upload() {
    const s = document.getElementById('sub').value;
    const y = document.getElementById('year').value;
    const p = document.getElementById('paper').value;
    const sec = document.getElementById('section').value;
    const marks = document.getElementById('m').value;
    const qText = document.getElementById('q').value;
    const solution = document.getElementById('sol').value;

    // All fields except solution are compulsory
    if(!s || !y || !p || !sec || !marks || !qText) {
        alert("Please fill all required fields (Marking Scheme optional)");
        return;
    }

    // Structure: questions/subject/year/paper/section
    db.ref(`questions/${s}/${y}/${p}/${sec}`).push({
        marks: marks,
        text: qText,
        solution: solution || ""  // allow empty solution
    }).then(() => {
        alert("Question Uploaded Successfully!");
        document.getElementById('q').value = "";
        document.getElementById('sol').value = "";
        MathJax.typeset(); // render formulas if any
    }).catch(err => alert("Error: " + err));
}

    // Structure: questions/subject/year/paper/section
    db.ref(`questions/${s}/${y}/${p}/${sec}`).push({
        marks: marks,
        text: qText,
        solution: solution
    }).then(() => {
        alert("Question Uploaded Successfully!");
        document.getElementById('q').value = "";
        document.getElementById('sol').value = "";
        MathJax.typeset(); // Render formulas if needed
    }).catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
