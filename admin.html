<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | IJMB Pro-Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .admin-container { max-width: 600px; margin: 40px auto; background: var(--panel); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--accent); }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .logout-btn { width: auto; padding: 8px 15px; background: var(--danger); color: white; font-size: 0.8rem; margin: 0; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .status-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="background: var(--panel); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center;">
        <h2 style="color: var(--accent); margin-bottom: 20px;">Admin Access</h2>
        <input type="email" id="adminEmail" placeholder="Email" style="margin-bottom: 15px;">
        <input type="password" id="adminPass" placeholder="Password" style="margin-bottom: 20px;">
        <button onclick="loginAdmin()">Authorize Session</button>
    </div>
</div>

<div class="admin-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">
        <h2 style="margin: 0;">Add Question</h2>
        <button class="logout-btn" onclick="logoutAdmin()">Sign Out</button>
    </div>

    <div class="form-group">
        <label>Select Subject</label>
        <select id="subject">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="Economics">Economics</option>
            <option value="Government">Government</option>
        </select>
    </div>

    <div class="form-group">
        <label>Question Text</label>
        <textarea id="qText" rows="4" placeholder="Enter the theory question here..."></textarea>
    </div>

    <div class="form-group">
        <label>Solution / Marking Scheme</label>
        <textarea id="sText" rows="6" placeholder="Enter full solution. Use HTML <img> tags for diagrams."></textarea>
    </div>

    <div class="form-group">
        <label>Marks Awarded</label>
        <input type="text" id="marks" placeholder="e.g., 12 Marks">
    </div>

    <button onclick="saveQuestion()">Upload to Database</button>

    <div id="status" class="status-msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
  // Your Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com",
    databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com",
    projectId: "ijmb-portal",
    storageBucket: "ijmb-portal.firebasestorage.app",
    messagingSenderId: "521270251438",
    appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  // Monitor Auth State (Keep user logged in if they haven't signed out)
  auth.onAuthStateChanged((user) => {
    const loginScreen = document.getElementById('login-screen');
    if (user) {
      loginScreen.style.display = 'none';
    } else {
      loginScreen.style.display = 'flex';
    }
  });

  // Login Function
  function loginAdmin() {
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPass').value;
    
    auth.signInWithEmailAndPassword(email, pass)
      .catch((error) => {
        alert("Access Denied: " + error.message);
      });
  }

  // Logout Function
  function logoutAdmin() {
    if(confirm("Are you sure you want to sign out?")) {
        auth.signOut();
    }
  }

  // Save to Firebase Function
  function saveQuestion() {
    const subject = document.getElementById('subject').value;
    const qText = document.getElementById('qText').value;
    const sText = document.getElementById('sText').value;
    const marks = document.getElementById('marks').value;
    const statusDiv = document.getElementById('status');

    if(!qText || !sText) {
        statusDiv.style.color = "#ef4444";
        statusDiv.innerText = "⚠️ Please fill in the question and solution.";
        return;
    }

    const newRef = database.ref('questions/' + subject).push();
    
    newRef.set({
      text: qText,
      solution: sText,
      marks: marks,
      timestamp: Date.now()
    }).then(() => {
      statusDiv.style.color = "#10b981";
      statusDiv.innerText = "✅ Successfully saved to " + subject;
      // Clear fields for next entry
      document.getElementById('qText').value = "";
      document.getElementById('sText').value = "";
    }).catch((error) => {
      statusDiv.style.color = "#ef4444";
      statusDiv.innerText = "❌ Error: " + error.message;
    });
  }
</script>

</body>
</html>
