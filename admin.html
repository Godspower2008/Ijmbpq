<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | IJMB Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet"><style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#020617;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
}

/* Animated gradient background */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#6366f1,transparent 70%);
top:-150px;
left:-150px;
filter:blur(120px);
animation:floatGlow 8s infinite alternate ease-in-out;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#22c55e,transparent 70%);
bottom:-150px;
right:-150px;
filter:blur(120px);
animation:floatGlow 10s infinite alternate ease-in-out;
}

@keyframes floatGlow{
0%{ transform:translateY(0px) }
100%{ transform:translateY(80px) }
}

/* Login Card */

.login-box{
background:#0f172a;
padding:40px;
border-radius:20px;
width:320px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
animation:fadeUp 0.8s ease;
position:relative;
z-index:2;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.login-box h2{
margin-top:0;
text-align:center;
font-weight:800;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:12px 0;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
transition:all 0.3s ease;
}

input:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 10px rgba(99,102,241,0.5);
transform:scale(1.02);
}

/* Button animation */

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-weight:800;
cursor:pointer;
transition:all 0.25s ease;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(99,102,241,0.5);
}

button:active{
transform:scale(0.96);
}

</style></head><body><div class="login-box">
<h2>Admin Login</h2><input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password"><button onclick="login()">Login</button>

</div><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script><script>

firebase.initializeApp({
apiKey:"AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
authDomain:"ijmb-portal.firebaseapp.com",
databaseURL:"https://ijmb-portal-default-rtdb.firebaseio.com"
});

const auth = firebase.auth();
const db = firebase.database();

function login(){

const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

if(!email || !password){
alert("Please fill in both fields");
return;
}

auth.signInWithEmailAndPassword(email,password)
.then(userCredential=>{

const uid=userCredential.user.uid;

db.ref('admins/'+uid).get().then(snapshot=>{

if(snapshot.exists()){
window.location.href='admin-dashboard.html';
}else{
alert("Access denied: Not an admin");
auth.signOut();
}

});

})
.catch(err=>alert("Login failed: "+err.message));

}

</script></body>
</html>
