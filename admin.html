<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | IJMB Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
<style>
body { font-family:'Plus Jakarta Sans',sans-serif; background:#020617; color:white; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
.login-box { background:#0f172a; padding:40px; border-radius:20px; width:300px; }
input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #6366f1; background:#020617; color:white; }
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#6366f1; color:white; font-weight:800; cursor:pointer; }
</style>
</head>
<body>

<div class="login-box">
<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com"
});
const auth = firebase.auth();

function login(){
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if(!email || !password){
        alert("Please fill in both fields");
        return;
    }

    auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
            const uid = userCredential.user.uid;
            // Check if user is admin
            firebase.database().ref('admins/' + uid).get().then(snapshot => {
                if(snapshot.exists()){
                    window.location.href = 'admin-dashboard.html';
                } else {
                    alert("Access denied: Not an admin");
                    auth.signOut();
                }
            });
        })
        .catch(err => alert("Login failed: " + err.message));
}
</script>
</body>
</html>
