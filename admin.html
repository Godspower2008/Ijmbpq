<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin | IJMB Pro</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 50px; }
        .box { max-width: 500px; margin: 0 auto; background: #0f172a; padding: 30px; border-radius: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #020617; color: white; }
        button { width: 100%; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Add Theory Question</h2>
        <select id="sub"><option value="Physics">Physics</option><option value="Chemistry">Chemistry</option></select>
        <input type="number" id="marks" placeholder="Marks (e.g. 15)">
        <textarea id="q" placeholder="Question Text..."></textarea>
        <textarea id="sol" placeholder="Marking Scheme..."></textarea>
        <button onclick="add()">Upload Question</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({ apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com" });
        function add() {
            const s = document.getElementById('sub').value;
            firebase.database().ref('questions/' + s).push({
                marks: document.getElementById('marks').value,
                text: document.getElementById('q').value,
                solution: document.getElementById('sol').value
            }).then(() => alert("Success!"));
        }
    </script>
</body>
</html>
