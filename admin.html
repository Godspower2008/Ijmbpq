<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | IJMB Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; padding: 40px 5%; margin: 0; }
        .admin-container { max-width: 600px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        h1 { font-size: 1.5rem; margin-bottom: 25px; text-align: center; color: var(--accent); }
        
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; opacity: 0.8; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; 
            border: 1px solid var(--border); background: #020617; color: white; outline: none;
        }
        textarea { height: 120px; font-family: inherit; }
        
        .btn-upload { 
            width: 100%; padding: 15px; background: var(--accent); border: none; 
            color: white; border-radius: 12px; font-weight: 800; cursor: pointer; 
        }
        .whatsapp-link { 
            display: block; text-align: center; margin-top: 25px; color: #25d366; 
            text-decoration: none; font-size: 0.9rem; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>Archive Manager</h1>
        
        <label>Select Target Subject</label>
        <select id="qSubject">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="Economics">Economics</option>
            <option value="Government">Government</option>
        </select>

        <label>Question Marks</label>
        <input type="number" id="qMarks" placeholder="e.g. 15">

        <label>Question Text (HTML/MathJax allowed)</label>
        <textarea id="qText" placeholder="Enter the theoretical question here..."></textarea>

        <label>Full Marking Scheme / Solution</label>
        <textarea id="qSol" placeholder="Enter the step-by-step solution..."></textarea>

        <button class="btn-upload" onclick="uploadQuestion()">Upload to Archive</button>

        <a href="https://wa.me/2348000000000" class="whatsapp-link">Need Tech Support? Chat Admin</a>
        <a href="ijmbpq.html" style="display:block; text-align:center; color:#94a3b8; margin-top:15px; text-decoration:none; font-size:0.8rem;">Return to Dashboard</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", 
            databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function uploadQuestion() {
            const subject = document.getElementById('qSubject').value;
            const marks = document.getElementById('qMarks').value;
            const text = document.getElementById('qText').value;
            const sol = document.getElementById('qSol').value;

            if(!marks || !text || !sol) return alert("Please fill all fields");

            // Generate a unique ID for the question
            const qRef = db.ref('questions/' + subject).push();
            
            qRef.set({
                marks: marks,
                text: text,
                solution: sol,
                timestamp: Date.now()
            }).then(() => {
                alert("Question added to " + subject + " archive successfully!");
                // Clear form
                document.getElementById('qMarks').value = "";
                document.getElementById('qText').value = "";
                document.getElementById('qSol').value = "";
            }).catch(err => alert("Error: " + err.message));
        }
    </script>
</body>
</html>
