<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB Admin | Add Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .admin-container { max-width: 600px; margin: 0 auto; background: var(--panel); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--accent); }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { width: 100%; padding: 15px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .preview { margin-top: 30px; padding: 20px; border: 1px dashed #444; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Add New Theory Question</h2>
    <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px;">Use this to populate your database.</p>

    <div class="form-group">
        <label>Subject</label>
        <select id="subject">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Economics">Economics</option>
            <option value="Government">Government</option>
        </select>
    </div>

    <div class="form-group">
        <label>Question Text</label>
        <textarea id="qText" rows="4" placeholder="e.g. State the three laws of thermodynamics..."></textarea>
    </div>

    <div class="form-group">
        <label>Solution / Marking Scheme</label>
        <textarea id="sText" rows="6" placeholder="Break it down into steps..."></textarea>
    </div>

    <div class="form-group">
        <label>Marks Awarded</label>
        <input type="text" id="marks" placeholder="e.g. 10 Marks">
    </div>

    <button onclick="saveQuestion()">Save to Database</button>
    
    <div id="status" style="margin-top: 15px; text-align: center; color: #10b981;"></div>
</div>
<div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="color:var(--accent);">Admin Portal Secure Access</h2>
    <input type="email" id="adminEmail" placeholder="Email" style="width:300px; margin-bottom:10px;">
    <input type="password" id="adminPass" placeholder="Password" style="width:300px; margin-bottom:10px;">
    <button onclick="loginAdmin()" style="width:300px;">Authorize Session</button>
</div>
 <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
  // Your specific configuration
  const firebaseConfig = {
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com",
    databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com",
    projectId: "ijmb-portal",
    storageBucket: "ijmb-portal.firebasestorage.app",
    messagingSenderId: "521270251438",
    appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f",
    measurementId: "G-7PPD26XKQ9"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const auth = firebase.auth();

  // 2. THE MISSING LOGIN FUNCTION
  function loginAdmin() {
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPass').value;
    const btn = document.querySelector('#login-screen button');

    btn.innerText = "Checking Credentials...";

    auth.signInWithEmailAndPassword(email, pass)
      .then((userCredential) => {
        // Success! Hide the login screen
        document.getElementById('login-screen').style.display = 'none';
        console.log("Logged in as:", userCredential.user.email);
      })
      .catch((error) => {
        // Failure! Show error
        alert("Login Failed: " + error.message);
        btn.innerText = "Authorize Session";
      });
  }

  // 3. THE CLEAN FIREBASE SAVE FUNCTION
  function saveQuestion() {
    const subject = document.getElementById('subject').value;
    const qText = document.getElementById('qText').value;
    const sText = document.getElementById('sText').value;
    const marks = document.getElementById('marks').value;

    if(!qText || !sText) {
        alert("Please fill in the question and solution!");
        return;
    }

    const newRef = database.ref('questions/' + subject).push();

    newRef.set({
      text: qText,
      solution: sText,
      marks: marks,
      timestamp: Date.now()
    }).then(() => {
      document.getElementById('status').innerText = "✅ Saved to " + subject + " Successfully!";
      document.getElementById('qText').value = "";
      document.getElementById('sText').value = "";
    }).catch((error) => {
      document.getElementById('status').innerText = "❌ Error: " + error.message;
    });
  }
</script>
</body>
</html>
