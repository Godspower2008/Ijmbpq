<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | IJMB Pro</title>
<style>
body{background:#020617;color:white;font-family:sans-serif;margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;}
.admin-box{background:#0f172a;padding:30px;border-radius:20px;width:400px;}
input,select,textarea,button{width:100%;margin:10px 0;padding:10px;border-radius:8px;border:none;}
button{background:#6366f1;color:white;font-weight:800;cursor:pointer;}
</style>
</head>
<body>

<div class="admin-box">
<h2>Upload Question</h2>

<label>Subject</label>
<select id="sub">
  <option value="Physics">Physics</option>
  <option value="Chemistry">Chemistry</option>
  <option value="Biology">Biology</option>
  <option value="Economics">Economics</option>
</select>

<label>Year</label>
<select id="year"></select>

<label>Paper</label>
<select id="paper">
  <option value="I">Paper I</option>
  <option value="II">Paper II</option>
  <option value="III">Paper III</option>
</select>

<label>Section</label>
<select id="section">
  <option value="A">Section A</option>
  <option value="B">Section B</option>
  <option value="C">Section C</option>
  <option value="D">Section D</option>
</select>

<label>Total Marks (Optional)</label>
<input type="number" id="m">

<label>Question (HTML & LaTeX supported)</label>
<textarea id="q"></textarea>

<label>Marking Scheme (Optional)</label>
<textarea id="sol"></textarea>

<button onclick="upload()">Push to Database</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com",
    databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com"
});
const db = firebase.database();
const auth = firebase.auth();

// Populate years
const yearSelect = document.getElementById('year');
for(let y=2026; y>=2009; y--){
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
}

// Sign in automatically as your admin UID
auth.signInWithCustomToken("YOUR_CUSTOM_TOKEN_HERE").catch(err=>console.error(err));

function upload(){
    const s = document.getElementById('sub').value;
    const y = document.getElementById('year').value;
    const p = document.getElementById('paper').value;
    const sec = document.getElementById('section').value;
    const marks = document.getElementById('m').value;
    const qText = document.getElementById('q').value;
    const solution = document.getElementById('sol').value;

    if(!s || !y || !p || !sec || !qText){
        alert("Please fill all required fields (Marks & solution optional)");
        return;
    }

    db.ref(`questions/${s}/${y}/${p}/${sec}`).push({
        marks: marks || "",
        text: qText,
        solution: solution || ""
    }).then(()=>{ 
        alert("Uploaded!"); 
        document.getElementById('q').value="";
        document.getElementById('sol').value="";
        MathJax.typeset(); 
    }).catch(err=>alert("Error: "+err));
}
</script>
</body>
</html>
