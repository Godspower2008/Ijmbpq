<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Questions | IJMB PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #6366f1;
    --text: #f8fafc;
    --text-dim: #94a3b8;
    --glass: rgba(30,41,59,0.8);
}
body { background: var(--bg); color: var(--text); font-family:'Plus Jakarta Sans', sans-serif; margin:0; padding:0; }
header { display:flex; justify-content:space-between; align-items:center; padding:15px 5%; background: var(--glass); backdrop-filter: blur(10px); border-bottom:1px solid rgba(99,102,241,0.2); position:sticky; top:0; z-index:1000; }
.logo { font-weight:800; font-size:1.2rem; color:var(--text); text-decoration:none; }
.logo span { color: var(--accent); }
.nav-links { display:flex; gap:20px; }
.nav-links a { color:var(--text-dim); text-decoration:none; font-weight:600; }
.nav-links a:hover { color: var(--accent); }
.hamburger { display:none; flex-direction: column; justify-content: space-around; width:28px; height:22px; cursor:pointer; z-index:1100; }
.hamburger div { height:3px; background:var(--text); border-radius:2px; transition:0.4s; }
.hamburger.open div:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.open div:nth-child(2) { opacity:0; transform: translateX(-20px); }
.hamburger.open div:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
.nav-links.active { display:flex; position:absolute; top:60px; right:5%; background: var(--bg); padding:20px; border-radius:10px; flex-direction: column; box-shadow:0 8px 20px rgba(0,0,0,0.4); }

main { max-width:1000px; margin:40px auto; padding:0 5%; }
.back-btn { display:inline-block; margin-bottom:20px; background:var(--glass); color:var(--accent); padding:10px 20px; border-radius:10px; text-decoration:none; font-weight:700; }

#timer { font-weight:800; font-size:1.1rem; margin-bottom:20px; color:var(--accent); }
.question-card { background: var(--card); padding:25px; border-radius:20px; margin-bottom:25px; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
.options { margin-top:15px; display:flex; flex-direction: column; gap:12px; }
.options label { background: var(--glass); padding:10px; border-radius:12px; cursor:pointer; transition:0.3s; }
.options input { display:none; }
.options label:hover { background:#1e293b; }
.options input:checked + label { background: var(--accent); color:white; }
button.submit-btn { background: var(--accent); color:white; border:none; padding:12px 20px; border-radius:10px; cursor:pointer; font-weight:700; margin-top:15px; }
@media(max-width:768px){ .nav-links { display:none; } .hamburger { display:flex; } }
</style>
</head>
<body>

<header>
    <a href="dashboard.html" class="logo">IJMB<span>PRO</span></a>
    <nav class="nav-links">
        <a href="ijmbpq.html">Home</a>
        <a href="study.html">Study</a>
        <a href="exam.html">Exam Mode</a>
        <a href="pricing.html">Upgrade</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>
</header>

<main>
<a href="#" class="back-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

<div id="timer">Time: 00:00</div>
<div id="examContainer"></div>
<button class="submit-btn" onclick="submitExam()">Submit Exam</button>
</main>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com",
    projectId: "ijmb-portal"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Hamburger
document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.querySelector('.nav-links');
    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('open');
    });
});

// Auth redirect
auth.onAuthStateChanged(user => { if(!user) window.location.href="landing.html"; });

// Load Exam Questions
let examSubjects = JSON.parse(localStorage.getItem('examSubjects') || "[]");
let examTime = parseInt(localStorage.getItem('examTime') || "180"); // in minutes
let numQuestions = parseInt(localStorage.getItem('numQuestions') || "30");
let questions = [];
let answers = [];

async function loadExamQuestions() {
    const allQuestions = [];
    for (const subject of examSubjects) {
        const snapshot = await db.collection('questions')
                                 .where('subject','==',subject)
                                 .get();
        snapshot.forEach(doc => allQuestions.push({id: doc.id, ...doc.data()}));
    }
    // Randomize and slice
    questions = allQuestions.sort(() => Math.random() - 0.5).slice(0, numQuestions);
    renderQuestions();
    startTimer(examTime*60); // seconds
}

function renderQuestions() {
    const container = document.getElementById('examContainer');
    container.innerHTML = "";
    questions.forEach((q,i) => {
        const card = document.createElement('div');
        card.className = "question-card";
        card.innerHTML = `<strong>Q${i+1}:</strong> ${q.question}
            <div class="options">
                ${q.options.map((opt,j)=>`<input type="radio" name="q${i}" id="q${i}o${j}" value="${opt}"><label for="q${i}o${j}">${opt}</label>`).join('')}
            </div>`;
        container.appendChild(card);
    });
}

// Timer
let timerInterval;
function startTimer(duration) {
    let time = duration;
    const timerEl = document.getElementById('timer');
    timerInterval = setInterval(()=>{
        const mins = Math.floor(time/60).toString().padStart(2,'0');
        const secs = (time%60).toString().padStart(2,'0');
        timerEl.textContent = `Time: ${mins}:${secs}`;
        if(time-- <=0) { clearInterval(timerInterval); submitExam(); }
    },1000);
}

// Submit Exam
function submitExam() {
    clearInterval(timerInterval);
    // Collect answers
    answers = questions.map((q,i)=>{
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        return selected ? selected.value : null;
    });
    // For demo, show results
    alert(`Exam finished! You answered ${answers.filter(a=>a!=null).length} of ${questions.length}`);
    // Could save results to Firestore here
    window.location.href="dashboard.html";
}

loadExamQuestions();
</script>
</body>
</html>
