<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .leaderboard-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Podium Section */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 40px 0;
            text-align: center;
        }

        .podium-item { width: 100px; }
        .podium-rank {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 4px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .rank-1 .podium-rank { width: 100px; height: 100px; border-color: #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .rank-2 .podium-rank { border-color: #94a3b8; }
        .rank-3 .podium-rank { border-color: #b45309; }

        .crown { position: absolute; top: -15px; font-size: 1.5rem; color: #fbbf24; }

        /* List Section */
        .leader-list { background: var(--card); border: 1px solid var(--border); border-radius: 25px; overflow: hidden; }
        
        .leader-row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            transition: 0.3s;
        }
        
        .leader-row:last-child { border-bottom: none; }
        .leader-row.me { background: rgba(99, 102, 241, 0.1); border-left: 4px solid var(--accent); }

        .rank-num { width: 30px; font-weight: 800; color: var(--text-dim); }
        .leader-info { flex-grow: 1; display: flex; align-items: center; gap: 15px; }
        .leader-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--border); }
        .points { font-weight: 800; color: var(--accent); }

        .tab-switcher {
            display: flex;
            gap: 10px;
            background: var(--card);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }

        .tab-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Home</a>
        <div style="font-weight: 800;">Top Scholars</div>
        <div style="width: 40px;"></div>
    </header>

    <main class="leaderboard-container">
        <div class="tab-switcher">
            <button class="tab-btn active">Overall</button>
            <button class="tab-btn">Weekly</button>
        </div>

        <div class="podium">
            <div class="podium-item rank-2">
                <div class="podium-rank"><img src="https://via.placeholder.com/80" class="podium-rank" alt="2nd"></div>
                <div style="font-weight: 800; font-size: 0.8rem;">Ahmed O.</div>
                <div class="points" style="font-size: 0.75rem;">12.4k</div>
            </div>
            <div class="podium-item rank-1">
                <i class="fa-solid fa-crown crown"></i>
                <div class="podium-rank"><img src="https://via.placeholder.com/100" class="podium-rank" alt="1st"></div>
                <div style="font-weight: 800; font-size: 0.9rem;">Sarah E.</div>
                <div class="points">15.2k</div>
            </div>
            <div class="podium-item rank-3">
                <div class="podium-rank"><img src="https://via.placeholder.com/80" class="podium-rank" alt="3rd"></div>
                <div style="font-weight: 800; font-size: 0.8rem;">John D.</div>
                <div class="points" style="font-size: 0.75rem;">10.1k</div>
            </div>
        </div>

        <div class="leader-list">
            <div class="leader-row">
                <span class="rank-num">4</span>
                <div class="leader-info">
                    <div class="leader-avatar"></div>
                    <span style="font-weight: 700;">Emeka Eze</span>
                </div>
                <span class="points">9,840</span>
            </div>

            <div class="leader-row me">
                <span class="rank-num">5</span>
                <div class="leader-info">
                    <div class="leader-avatar"></div>
                    <span style="font-weight: 700;">You (Student)</span>
                </div>
                <span class="points">8,200</span>
            </div>

            <div class="leader-row">
                <span class="rank-num">6</span>
                <div class="leader-info">
                    <div class="leader-avatar"></div>
                    <span style="font-weight: 700;">Tunde R.</span>
                </div>
                <span class="points">7,900</span>
            </div>
        </div>
    </main>

</body>
</html>
