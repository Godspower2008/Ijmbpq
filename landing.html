<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB PRO | Master Your Exams</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --accent: #6366f1; --cta: #f59e0b; --glass: rgba(15, 23, 42, 0.9); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; line-height: 1.6; }
        
        /* Navigation Bar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .nav-links a { color: #94a3b8; text-decoration: none; margin-left: 25px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* Hero Section */
        .hero { padding: 120px 5% 80px; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 40px; }
        
        /* Buttons */
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 16px 32px; border-radius: 12px; font-weight: 800; text-decoration: none; transition: 0.3s; display: inline-block; }
        .btn-main { background: var(--cta); color: #000; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .btn-main:hover { transform: translateY(-3px); }
        .btn-outline { border: 1px solid rgba(255,255,255,0.1); color: #fff; background: rgba(255,255,255,0.05); }

        /* Social Proof */
        .social-proof { margin-top: 60px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">IJMB<span style="color:var(--accent)">PRO</span></div>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#subjects">Subjects</a>
            <a href="login.html" style="background:var(--accent); color:white; padding:8px 20px; border-radius:8px;">Login</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Practice Past Papers. <span style="color:var(--accent)">Master Theory.</span> Track Your Rank.</h1>
        <p>The all-in-one portal for IJMB candidates to access verified marking schemes, science solutions, and national leaderboards.</p>
        
        <div class="btn-group">
            <a href="register.html" class="btn btn-main">GET STARTED NOW</a>
            <a href="#subjects" class="btn btn-outline">EXPLORE SUBJECTS</a>
        </div>

        <div class="social-proof">
            <i class="fa-solid fa-users" style="margin-right: 8px;"></i> Trusted by 500+ IJMB Scholars Nationwide
        </div>
    </section>
</body>
</html>
