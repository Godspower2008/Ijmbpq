<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB PRO | Master Your Exams</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --accent: #6366f1; --cta: #f59e0b; --glass: rgba(15, 23, 42, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; line-height: 1.6; }

        /* Background Glows */
        .glow-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 80%); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -1px; }

        /* Hero Section */
        .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; padding: 100px 0; align-items: center; }
        .hero-text h1 { font-size: clamp(2.5rem, 5vw, 4.2rem); font-weight: 800; line-height: 1.1; margin-bottom: 25px; background: linear-gradient(to bottom, #fff 50%, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-text p { font-size: 1.25rem; color: #94a3b8; margin-bottom: 40px; max-width: 550px; }

        /* Social Proof Strip */
        .proof-strip { display: flex; gap: 30px; margin-top: 40px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); }
        .proof-item { display: flex; flex-direction: column; }
        .proof-item span:first-child { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .proof-item span:last-child { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        /* Registration Card (Above the Fold) */
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(99, 102, 241, 0.3); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .auth-card h3 { font-size: 1.5rem; margin-bottom: 25px; text-align: center; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #1e293b; background: #020617; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
        
        .btn-cta { width: 100%; padding: 18px; background: var(--cta); color: #000; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-cta:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(245, 158, 11, 0.4); }

        @media (max-width: 900px) { .hero { grid-template-columns: 1fr; text-align: center; padding: 60px 0; } .hero-text p { margin: 0 auto 40px; } .proof-strip { justify-content: center; } }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <nav>
            <div class="logo">IJMB<span style="color:var(--accent)">PRO</span></div>
            <div class="nav-links">
                <a href="login.html" style="color:#94a3b8; text-decoration:none; font-weight:700; font-size:0.9rem;">SIGN IN</a>
            </div>
        </nav>

        <section class="hero">
            <div class="hero-text">
                <div style="display:inline-block; padding:8px 16px; border-radius:100px; background:rgba(99,102,241,0.1); border:1px solid var(--accent); color:var(--accent); font-size:0.8rem; font-weight:700; margin-bottom:20px;">
                    🎓 OFFICIAL 2026 ARCHIVE
                </div>
                <h1>Practice Papers. <br>Master <span style="color:var(--accent)">Solutions</span>.</h1>
                <p>Access verified IJMB marking schemes and step-by-step science solutions designed to secure your 15 points.</p>
                
                <div class="proof-strip">
                    <div class="proof-item"><span>500+</span><span>Scholars</span></div>
                    <div class="proof-item"><span>12k+</span><span>Questions</span></div>
                    <div class="proof-item"><span>98%</span><span>Pass Rate</span></div>
                </div>
            </div>

            <div class="auth-card">
                <h3>Start Preparing Now</h3>
                <input type="text" id="userName" placeholder="Full Name">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Create Password">
                <button class="btn-cta" onclick="startApp()">Join 2026 Test Prep</button>
                <p style="text-align:center; font-size:0.75rem; color:#64748b; margin-top:20px;">Free access to basic archives. No card required.</p>
            </div>
        </section>
    </div>

    <script>
        function startApp() {
            const name = document.getElementById('userName').value;
            if(name) {
                localStorage.setItem('ijmb_user', name);
                window.location.href = 'ijmbpq.html';
            } else {
                alert("Please enter your name to continue!");
            }
        }
    </script>
</body>
</html>
