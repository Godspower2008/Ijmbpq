<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IJMB Pro-Archive | Master the Theory</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { 
    --bg: #020617; 
    --glass: rgba(15, 23, 42, 0.95); 
    --border: rgba(99, 102, 241, 0.2); 
    --accent: #6366f1; 
    --text: #f8fafc; 
    --text-dim: #94a3b8; 
}

body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    margin: 0; 
    padding: 0; 
}

/* NAVIGATION */
nav { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 15px 5%; 
    position: fixed; width: 100%; top: 0; z-index: 1000; 
    backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
    background: rgba(2, 6, 23, 0.85);
}
.logo { font-weight: 800; font-size: 1.4rem; color: var(--text); }
.logo span { color: var(--accent); }
.btn-main { 
    padding: 12px 25px; background: var(--accent); color: white; 
    border-radius: 14px; font-weight: 800; border:none; cursor:pointer;
}
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99,102,241,0.3); }

/* AUTH MODAL */
#authModal {
    display:none;
    position: fixed; inset:0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    z-index: 2000;
    align-items:center; justify-content:center;
}

.auth-box {
    background: var(--glass);
    padding: 40px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    text-align:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.auth-box h2 { margin-bottom: 20px; }
.auth-box input {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.1);
    color: var(--text);
    font-size: 1rem;
}

.auth-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border:none;
    font-weight:700;
    cursor:pointer;
    margin-bottom: 15px;
    font-size:1rem;
    transition:0.3s;
}

#authButton { background: var(--accent); color:white; }
#authButton:hover { transform:translateY(-2px); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }

#googleSignIn { background:#DB4437; color:white; display:flex; align-items:center; justify-content:center; gap:10px; }
#googleSignIn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(219,68,55,0.4); }

#toggleAuth { color: var(--accent); cursor:pointer; font-size:0.9rem; }

#authMessage { color:#f87171; font-size:0.85rem; margin-top:10px; }

.closeModal {
    position:absolute; top:10px; right:15px; cursor:pointer; font-size:1.2rem;
    color: var(--text-dim);
}

/* RESPONSIVE */
@media(max-width:500px){
    .auth-box { padding: 30px; }
}
</style>
</head>
<body>

<nav>
    <div class="logo">IJMB<span>PRO</span></div>
    <button class="btn-main" onclick="document.getElementById('authModal').style.display='flex'">Sign In</button>
</nav>

<!-- AUTH MODAL -->
<div id="authModal">
  <div class="auth-box">
    <span class="closeModal" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle">Sign In</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="authButton" class="auth-btn">Sign In</button>

    <button id="googleSignIn" class="auth-btn"><i class="fa-brands fa-google"></i> Sign In with Google</button>

    <p><span id="toggleAuth">Create a New Account</span></p>

    <div id="authMessage"></div>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
  // FIREBASE CONFIG
  const firebaseConfig = { 
      apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
      authDomain: "ijmb-portal.firebaseapp.com"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // MODAL CONTROLS
  const modalTitle = document.getElementById('modalTitle');
  const authButton = document.getElementById('authButton');
  const toggleAuth = document.getElementById('toggleAuth');
  let isSignIn = true;

  function closeModal() {
      document.getElementById('authModal').style.display = 'none';
      document.getElementById('authMessage').innerText = '';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
  }

  toggleAuth.addEventListener('click', () => {
      isSignIn = !isSignIn;
      modalTitle.innerText = isSignIn ? 'Sign In' : 'Create Account';
      authButton.innerText = isSignIn ? 'Sign In' : 'Create Account';
      toggleAuth.innerText = isSignIn ? 'Create a New Account' : 'Already have an account? Sign In';
  });

  // EMAIL/PASSWORD AUTH
  authButton.addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('authMessage');

      if(!email || !password){ msg.innerText = 'Please enter both email and password.'; return; }

      if(isSignIn){
          auth.signInWithEmailAndPassword(email,password)
              .then(()=> { closeModal(); window.location.href='dashboard.html'; })
              .catch(err=>msg.innerText=err.message);
      } else {
          auth.createUserWithEmailAndPassword(email,password)
              .then(()=> { closeModal(); window.location.href='dashboard.html'; })
              .catch(err=>msg.innerText=err.message);
      }
  });

  // GOOGLE AUTH
  const googleSignInBtn = document.getElementById('googleSignIn');
  const provider = new firebase.auth.GoogleAuthProvider();

  googleSignInBtn.addEventListener('click', () => {
      auth.signInWithPopup(provider)
          .then(()=> { closeModal(); window.location.href='dashboard.html'; })
          .catch(err=>document.getElementById('authMessage').innerText = err.message);
  });

  // AUTO REDIRECT IF LOGGED IN
  auth.onAuthStateChanged(user => {
      if(user && !window.location.href.includes('dashboard.html')){
          window.location.href='dashboard.html';
      }
  });
</script>
</body>
</html>
