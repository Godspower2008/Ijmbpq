<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB Pro-Archive | Secure Your A</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --glass: rgba(15, 23, 42, 0.8); --border: rgba(99, 102, 241, 0.2); --accent: #6366f1; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%); }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 1.4rem; }
        .logo span { color: var(--accent); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(20px); }
        .modal { background: var(--glass); padding: 40px; border-radius: 32px; width: 95%; max-width: 420px; border: 1px solid var(--border); }
        
        input, select { width: 100%; padding: 16px; margin-bottom: 15px; background: rgba(2, 6, 23, 0.6); border: 1px solid var(--border); color: white; border-radius: 14px; outline: none; }
        .btn-auth { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
        
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <nav><div class="logo">IJMB<span>PRO</span></div><button onclick="openAuth()" style="background:none; border:none; color:white; font-weight:700; cursor:pointer;">Login</button></nav>

    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <h2 id="mTitle" style="text-align:center; margin-bottom:20px;">Student Login</h2>
            <input type="text" id="regName" class="reg-only" style="display:none;" placeholder="Full Name *">
            <input type="email" id="email" placeholder="Email Address">
            <select id="regCombo" class="reg-only" style="display:none;">
                <option value="">Select Combination *</option>
                <option value="PCM">PCM</option><option value="PCB">PCB</option><option value="EGB">EGB</option>
            </select>
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-auth" onclick="handleAuth()" id="mBtn">Sign In</button>
            <p id="mToggle" onclick="toggleAuth()" style="text-align:center; margin-top:20px; cursor:pointer; font-size:0.9rem;">New? <b>Register</b></p>
        </div>
    </div>

    <section class="hero">
        <h1>Master Theory.<br><span>Secure Your A.</span></h1>
        <button onclick="openAuth()" class="btn-auth" style="width:auto; padding:18px 40px; margin-top:30px;">Get Started</button>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", authDomain: "ijmb-portal.firebaseapp.com", databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com", projectId: "ijmb-portal", appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let isLogin = true;
        function openAuth() { document.getElementById('authModal').style.display='flex'; }
        function toggleAuth() { 
            isLogin = !isLogin;
            document.querySelectorAll('.reg-only').forEach(el => el.style.display = isLogin ? 'none' : 'block');
            document.getElementById('mTitle').innerText = isLogin ? 'Student Login' : 'Create Account';
        }

        async function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(isLogin) {
                try {
                    const res = await auth.signInWithEmailAndPassword(e,p);
                    if(res.user.emailVerified) window.location.href="ijmbpq.html";
                    else alert("Please verify your email first!");
                } catch(err) { alert(err.message); }
            } else {
                const n = document.getElementById('regName').value, c = document.getElementById('regCombo').value;
                if(!n || !c) return alert("Fill all compulsory fields!");
                try {
                    const res = await auth.createUserWithEmailAndPassword(e,p);
                    await db.ref(`users/${res.user.uid}/profile`).set({ fullName: n, combo: c, score: 0 });
                    await res.user.sendEmailVerification();
                    alert("Verification email sent!");
                    auth.signOut(); location.reload();
                } catch(err) { alert(err.message); }
            }
        }
    </script>
</body>
</html>
