<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB Pro-Archive | Secure Your A</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.8); 
            --border: rgba(99, 102, 241, 0.2); 
            --accent: #6366f1; 
            --gold: #f59e0b; 
            --text: #f8fafc; 
            --text-dim: #94a3b8; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }

        /* --- NAVIGATION --- */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; 
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* --- HERO --- */
        .hero { 
            min-height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            padding: 20px; animation: fadeIn 1s ease-out;
        }

        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin-bottom: 20px; }
        .hero h1 span { color: var(--accent); text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }

        /* --- AUTH MODAL --- */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; justify-content: center; align-items: center; 
            z-index: 2000; backdrop-filter: blur(20px);
        }

        .modal { 
            background: var(--glass); padding: 40px; border-radius: 32px; 
            width: 95%; max-width: 420px; border: 1px solid var(--border); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal h2 { margin-bottom: 25px; font-weight: 800; text-align: center; }

        .input-group { position: relative; margin-bottom: 16px; }
        .modal input, .modal select { 
            width: 100%; padding: 16px; background: rgba(2, 6, 23, 0.6); 
            border: 1px solid var(--border); color: white; border-radius: 14px; 
            outline: none; transition: 0.3s; font-size: 1rem;
        }

        .modal input:focus, .modal select:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); 
        }

        /* Compulsory indicator */
        .required::after { content: " *"; color: var(--accent); }

        .btn-auth { 
            width: 100%; padding: 16px; background: var(--accent); 
            color: white; border: none; border-radius: 14px; 
            font-weight: 800; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .btn-auth:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-auth:active { transform: translateY(0); }

        .loading-spinner { 
            width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); 
            border-top-color: white; border-radius: 50%; display: none;
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #mToggle { 
            text-align: center; margin-top: 24px; font-size: 0.9rem; 
            color: var(--text-dim); cursor: pointer; 
        }
        #mToggle b { color: var(--accent); }

        .error-msg { color: #f87171; font-size: 0.8rem; margin-top: -10px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">IJMB<span>PRO</span></div>
        <button onclick="openAuth()" style="background:none; border:none; color:white; font-weight:700; cursor:pointer;">Sign In</button>
    </nav>

    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <h2 id="mTitle">Welcome Back</h2>
            
            <div class="input-group reg-only" style="display:none;">
                <input type="text" id="regName" placeholder="Full Name (Compulsory)">
            </div>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address">
            </div>

            <div class="input-group reg-only" style="display:none;">
                <select id="regCombo">
                    <option value="">Select Your Combination *</option>
                    <option value="PCM">PCM (Phy/Chm/Mth)</option>
                    <option value="PCB">PCB (Phy/Chm/Bio)</option>
                    <option value="EGB">EGB (Eco/Gov/Bus)</option>
                </select>
            </div>

            <div class="input-group">
                <input type="password" id="pass" placeholder="Password">
            </div>

            <button class="btn-auth" onclick="handleAuth()" id="mBtn">
                <span id="btnText">Sign In</span>
                <div class="loading-spinner" id="spinner"></div>
            </button>

            <p id="mToggle" onclick="toggleAuth()">New scholar? <b>Create Account</b></p>
        </div>
    </div>

    <section class="hero">
        <h1>Master the Archive.<br><span>Earn Your 15 Points.</span></h1>
        <p style="color: var(--text-dim); margin-bottom: 30px; max-width: 600px;">The most authentic collection of IJMB theoretical marking schemes and solved diagrams.</p>
        <button onclick="openAuth()" class="btn-auth" style="width: auto; padding: 18px 40px; animation: pulse 2s infinite;">Start Studying Now</button>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU", 
            authDomain: "ijmb-portal.firebaseapp.com", 
            databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com", 
            projectId: "ijmb-portal", 
            appId: "1:521270251438:web:3fdfd1ede0b0687c1bc23f" 
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isLogin = true;

        function openAuth() { document.getElementById('authModal').style.display='flex'; }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('authModal')) {
                document.getElementById('authModal').style.display = "none";
            }
        }

        function toggleAuth() { 
            isLogin = !isLogin; 
            document.querySelectorAll('.reg-only').forEach(el => el.style.display = isLogin ? 'none' : 'block'); 
            document.getElementById('mTitle').innerText = isLogin ? 'Welcome Back' : 'Create Account'; 
            document.getElementById('btnText').innerText = isLogin ? 'Sign In' : 'Register Now';
            document.getElementById('mToggle').innerHTML = isLogin ? 'New scholar? <b>Create Account</b>' : 'Already registered? <b>Sign In</b>';
        }

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('mBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            // Basic Validation
            if(!e || !p) return alert("Email and Password are required.");

            // Start Loading Animation
            btnText.style.opacity = "0.5";
            spinner.style.display = "block";
            btn.disabled = true;

            if(isLogin) {
                try {
                    const res = await auth.signInWithEmailAndPassword(e, p);
                    if (res.user.emailVerified) {
                        window.location.href = "index.html";
                    } else {
                        alert("Please verify your email! Check your inbox.");
                        btn.disabled = false; spinner.style.display = "none"; btnText.style.opacity = "1";
                    }
                } catch (err) {
                    alert(err.message);
                    btn.disabled = false; spinner.style.display = "none"; btnText.style.opacity = "1";
                }
            } else {
                const n = document.getElementById('regName').value;
                const c = document.getElementById('regCombo').value;

                // Compulsory Field Check
                if (!n || !c) {
                    alert("Name and Combination are compulsory!");
                    btn.disabled = false; spinner.style.display = "none"; btnText.style.opacity = "1";
                    return;
                }

                try {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.ref(`users/${res.user.uid}/profile`).set({
                        fullName: n, combo: c, score: 0, isVerified: false
                    });
                    await res.user.sendEmailVerification();
                    alert("Verification link sent to " + e);
                    auth.signOut();
                    location.reload();
                } catch (err) {
                    alert(err.message);
                    btn.disabled = false; spinner.style.display = "none"; btnText.style.opacity = "1";
                }
            }
        }
    </script>
</body>
</html>
