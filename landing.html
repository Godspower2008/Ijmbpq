<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJMB PRO | Secure Your 15 Points</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --accent: #6366f1; --cta: #f59e0b; --glass: rgba(15, 23, 42, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -1px; }

        .hero-split { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 50px; padding: 80px 0; align-items: center; }
        .hero-text h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; line-height: 1.1; margin-bottom: 25px; }
        
        /* Front-Loaded Form */
        .auth-card { background: #0f172a; padding: 35px; border-radius: 28px; border: 1px solid var(--accent); box-shadow: 0 25px 50px rgba(99, 102, 241, 0.2); }
        .auth-card h3 { margin-bottom: 20px; text-align: center; }
        .auth-card input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #1e293b; background: #020617; color: white; outline: none; }
        .btn-cta { width: 100%; padding: 18px; background: var(--cta); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-cta:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }

        .benefits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; text-align: center; }
        .benefit-item i { color: var(--accent); font-size: 1.5rem; margin-bottom: 10px; }
        .benefit-item p { font-size: 0.85rem; color: #94a3b8; }

        @media (max-width: 900px) { .hero-split { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">IJMB<span style="color:var(--accent)">PRO</span></div>
            <a href="login.html" style="color:#94a3b8; text-decoration:none; font-weight:700;">Sign In</a>
        </nav>

        <section class="hero-split">
            <div class="hero-text">
                <span style="color:var(--cta); font-weight:800; text-transform:uppercase; font-size:0.8rem; letter-spacing:2px;">Official 2026 Study Portal</span>
                <h1>Secure Your 15 Points with <span style="color:var(--accent)">Pro Archives</span>.</h1>
                <p style="color:#94a3b8; font-size:1.2rem; margin-bottom:40px;">Get instant feedback on past papers and master theory questions with verified marking schemes.</p>
                
                <div class="benefits">
                    <div class="benefit-item"><i class="fa-solid fa-bolt"></i><p>Instant Access</p></div>
                    <div class="benefit-item"><i class="fa-solid fa-shield-check"></i><p>Verified Content</p></div>
                    <div class="benefit-item"><i class="fa-solid fa-globe"></i><p>National Rank</p></div>
                </div>
            </div>

            <div class="auth-card">
                <h3>Join 500+ Scholars</h3>
                <input type="text" placeholder="Your Full Name">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Choose Password">
                <button class="btn-cta">CREATE FREE ACCOUNT</button>
                <p style="text-align:center; font-size:0.8rem; color:#64748b; margin-top:15px;">No subscription required for basic access.</p>
            </div>
        </section>
    </div>
</body>
</html>
