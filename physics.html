<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Exam</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans'; background: #020617; color: white; margin: 0; }
        .header { display: flex; justify-content: space-between; padding: 15px 5%; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 60px); }
        .q-part { padding: 40px; border-right: 1px solid rgba(255,255,255,0.1); }
        .e-part { padding: 40px; background: #020617; }
        @media (max-width: 800px) { .exam-grid { grid-template-columns: 1fr; height: auto; } }
    </style>
</head>
<body>
    <div class="header">
        <div id="studentID" style="font-weight:800; color:#6366f1;">CANDIDATE: LOADING...</div>
        <div style="font-weight:800; color:#f59e0b;">TIME: 59:59</div>
    </div>

    <div class="exam-grid">
        <div class="q-part">
            <h3>Question 1</h3>
            <p>What is the SI unit of Force?</p>
            <div style="background:#0f172a; padding:15px; border-radius:10px; margin-bottom:10px;">A. Joule</div>
            <div style="background:#0f172a; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid #6366f1;">B. Newton</div>
        </div>
        <div class="e-part">
            <h4 style="color:#10b981;">Marking Scheme Solution</h4>
            <p>Force = Mass x Acceleration. Unit is kg·m/s² which is named after Sir Isaac Newton.</p>
        </div>
    </div>

    <script>
        // Extract name and display in the candidate header
        const name = localStorage.getItem('scholarName') || "Guest";
        document.getElementById('studentID').innerText = `CANDIDATE: ${name.toUpperCase()}`;
    </script>
</body>
</html>
