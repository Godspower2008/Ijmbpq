<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --border: rgba(255,255,255,0.08); --success: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: var(--card); height: 60px; border-bottom: 1px solid var(--border); }
        
        /* FLEX WORKSPACE FOR RESPONSIVENESS */
        .workspace { 
            display: flex; 
            flex-direction: row; 
            height: calc(100vh - 60px); 
        }

        .q-area { flex: 1; padding: 30px; overflow-y: auto; border-right: 1px solid var(--border); }
        .e-area { flex: 1; padding: 30px; background: #0f172a; overflow-y: auto; position: relative; }
        
        .option { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }

        /* RESPONSIVE PHYSICS PAGE */
        @media (max-width: 850px) {
            .workspace { flex-direction: column; height: auto; } /* Change from Split to Stack */
            .q-area, .e-area { border-right: none; border-bottom: 1px solid var(--border); flex: none; width: 100%; }
            body { overflow-y: auto; } /* Allow scrolling the whole page on mobile */
        }
    </style>
</head>
<body>
    <nav>
        <a href="ijmbpq.html" style="color:#94a3b8; text-decoration:none; font-size:0.8rem;">BACK</a>
        <div id="timer" style="color:var(--cta); font-weight:800;">59:59</div>
    </nav>
    <div class="workspace">
        <section class="q-area">
            <h3>Question 01</h3>
            <p style="margin: 20px 0;">Calculate the force required to move a 5kg block at 2m/s².</p>
            <div class="option">A. 5N</div>
            <div class="option">B. 10N</div>
        </section>
        <section class="e-area">
            <div id="lock" style="text-align:center; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 10px;">
                <button onclick="this.parentElement.style.display='none'" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:800;">REVEAL SCHEME</button>
            </div>
            <div style="margin-top:20px; border:1px solid var(--success); padding:15px; border-radius:10px;">
                <h4 style="color:var(--success);">Solution</h4>
                <p>F = m × a = 5 × 2 = 10N</p>
            </div>
        </section>
    </div>
</body>
</html>
