<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Practice | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --border: rgba(255,255,255,0.08); --success: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; overflow: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: var(--card); height: 70px; border-bottom: 1px solid var(--border); }
        .workspace { display: flex; height: calc(100vh - 70px); }
        .q-side { flex: 1; padding: 50px; overflow-y: auto; border-right: 1px solid var(--border); }
        .e-side { flex: 1; padding: 50px; background: #0f172a; overflow-y: auto; position: relative; }
        .option { background: var(--card); border: 1px solid var(--border); padding: 22px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: var(--accent); }
        .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.99); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 10; flex-direction: column; }
        .btn-reveal { background: var(--success); color: white; border: none; padding: 16px 35px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        @media (max-width: 900px) { .workspace { flex-direction: column; overflow-y: auto; height: auto; } .q-side, .e-side { flex: none; width: 100%; border: none; padding: 30px; } body { overflow-y: auto; } }
    </style>
</head>
<body>
    <nav>
        <a href="ijmbpq.html" style="color:#94a3b8; text-decoration:none; font-weight:700; font-size:0.9rem;">EXIT</a>
        <div id="uCandidate" style="font-weight:800; color:var(--accent); font-size:0.85rem;">CANDIDATE: LOADING...</div>
        <div id="timer" style="color:#f59e0b; font-weight:800; font-family: monospace;">59:59</div>
    </nav>
    <div class="workspace">
        <section class="q-side">
            <h3 style="color:var(--accent)">Question 01</h3>
            <p style="font-size:1.3rem; margin: 30px 0; line-height:1.6;">A $10\mu F$ capacitor is charged to 100V. Calculate the energy stored.</p>
            <div class="option" onclick="this.style.borderColor='var(--accent)'">A. 0.05 J</div>
            <div class="option" onclick="this.style.borderColor='var(--accent)'">B. 0.50 J</div>
        </section>
        <section class="e-side">
            <div id="lock" class="overlay">
                <button onclick="document.getElementById('lock').style.display='none'" class="btn-reveal">REVEAL MARKING SCHEME</button>
            </div>
            <div style="border:1px solid var(--success); padding:35px; border-radius:20px; background:rgba(16,185,129,0.03);">
                <h4 style="color:var(--success); margin-bottom:20px;">Solution Guide</h4>
                <p>Energy ($E$) = $\frac{1}{2}CV^2$</p>
                <p>$E = 0.5 \times (10 \times 10^{-6}) \times (100^2)$</p>
                <p style="font-size:1.5rem; font-weight:800; color:var(--success); margin-top:20px;">$E = 0.05 \, \text{Joules}$</p>
            </div>
        </section>
    </div>
    <script>
        const name = localStorage.getItem('scholarName');
        if(!name) { window.location.href = 'index.html'; }
        document.getElementById('uCandidate').innerText = `CANDIDATE: ${name.toUpperCase()}`;
        
        let time = 3599;
        setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            time--;
        }, 1000);
    </script>
</body>
</html>
