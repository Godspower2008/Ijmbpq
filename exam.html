<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Mode | IJMB PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { 
    --bg: #020617; 
    --card: #0f172a; 
    --glass: rgba(30, 41, 59, 0.8); 
    --border: rgba(99, 102, 241, 0.2); 
    --accent: #6366f1; 
    --text: #f8fafc; 
    --text-dim: #94a3b8; 
    --success: #10b981;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }

body { background: var(--bg); color: var(--text); }

header {
    display:flex; justify-content:space-between; align-items:center;
    padding:15px 5%; background: var(--glass); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); position: sticky; top:0; z-index:1000;
}

.logo { font-weight:800; font-size:1.2rem; color:var(--text); text-decoration:none; }
.logo span { color: var(--accent); }

.nav-links { display:flex; gap:20px; }
.nav-links a { color:var(--text-dim); text-decoration:none; font-weight:600; transition:0.3s; }
.nav-links a:hover { color:var(--accent); }

.hamburger { display:none; flex-direction: column; justify-content: space-around; width:25px; height:22px; cursor:pointer; }
.hamburger div { height:3px; background:var(--text); border-radius:2px; transition:0.3s; }

.nav-links.active { display:flex; position:absolute; top:60px; right:5%; background: var(--bg); padding:20px; border-radius:10px; flex-direction: column; }

main { max-width:1200px; margin:40px auto; padding:0 5%; }

h1 { margin-bottom:25px; }

.exam-section { background: var(--card); padding:30px; border-radius:20px; margin-bottom:30px; }
.exam-section h2 { margin-bottom:15px; color: var(--accent); }
.subject-combos button, .custom-options button { background: var(--accent); color:white; border:none; padding:12px 20px; margin:5px 5px 0 0; border-radius:10px; cursor:pointer; transition:0.3s; }
.subject-combos button:hover, .custom-options button:hover { transform:translateY(-2px); }

.back-btn { margin-bottom:20px; display:inline-block; background:var(--glass); color:var(--accent); padding:10px 20px; border-radius:10px; text-decoration:none; font-weight:700; }

.custom-options { margin-top:20px; }
.custom-options select { margin-right:15px; padding:10px; border-radius:8px; border:none; background:var(--glass); color:var(--text); }

@media(max-width:768px){
    .nav-links { display:none; }
    .hamburger { display:flex; }
    .exam-section { padding:20px; }
}
</style>
</head>
<body>

<header>
    <a href="dashboard.html" class="logo">IJMB<span>PRO</span></a>
    <nav class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="subjects.html">Study</a>
        <a href="exam.html">Exam Mode</a>
        <a href="upgrade.html">Upgrade</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
    <div class="hamburger" onclick="toggleHamburger(this)">
        <div></div>
        <div></div>
        <div></div>
    </div>
</header>

<main>
    <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

    <!-- Standard Exam Mode -->
    <section class="exam-section">
        <h2>Standard Exam Mode</h2>
        <p>Select your approved subject combination:</p>
        <div class="subject-combos">
            <button onclick="startStandardExam(['Economics','Mathematics','Physics'])">
                Economics + Mathematics + Physics
            </button>
            <button onclick="startStandardExam(['Biology','Chemistry','Economics'])">
                Biology + Chemistry + Economics
            </button>
            <button onclick="startStandardExam(['Physics','Chemistry','Mathematics'])">
                Physics + Chemistry + Mathematics
            </button>
        </div>
    </section>

    <!-- Custom Exam Mode -->
    <section class="exam-section">
        <h2>Custom Exam Mode</h2>
        <p>Select subjects (max 3) and set exam duration:</p>
        <div class="custom-options">
            <select id="subject1">
                <option value="">--Subject 1--</option>
                <option>Economics</option>
                <option>Mathematics</option>
                <option>Physics</option>
                <option>Biology</option>
                <option>Chemistry</option>
            </select>
            <select id="subject2">
                <option value="">--Subject 2--</option>
                <option>Economics</option>
                <option>Mathematics</option>
                <option>Physics</option>
                <option>Biology</option>
                <option>Chemistry</option>
            </select>
            <select id="subject3">
                <option value="">--Subject 3--</option>
                <option>Economics</option>
                <option>Mathematics</option>
                <option>Physics</option>
                <option>Biology</option>
                <option>Chemistry</option>
            </select>
            <button onclick="startCustomExam()">Start Exam (3 hours)</button>
        </div>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = { 
    apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
    authDomain: "ijmb-portal.firebaseapp.com"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
    if(!user) window.location.href="landing.html";
});

function logout(){
    auth.signOut();
    window.location.href="landing.html";
}

// Hamburger animation
function toggleHamburger(h) {
    h.classList.toggle('open');
    document.querySelector('.nav-links').classList.toggle('active');
}
document.querySelector('.hamburger div:nth-child(1)').style.transition = '0.3s';

// Exam functions
function startStandardExam(subjects){
    localStorage.setItem('examSubjects', JSON.stringify(subjects));
    localStorage.setItem('examTime', 180); // 3 hours in minutes
    window.location.href = 'exam-questions.html';
}

function startCustomExam(){
    const s1 = document.getElementById('subject1').value;
    const s2 = document.getElementById('subject2').value;
    const s3 = document.getElementById('subject3').value;
    const subjects = [s1,s2,s3].filter(s=>s);
    if(subjects.length===0) { alert("Select at least one subject"); return; }
    if(subjects.length>3) { alert("Maximum 3 subjects"); return; }
    localStorage.setItem('examSubjects', JSON.stringify(subjects));
    localStorage.setItem('examTime', 180); // 3 hours
    window.location.href='exam-questions.html';
}
</script>
</body>
</html>
