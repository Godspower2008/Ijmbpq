<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Mode | IJMB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--bg:#020617;
--card:#0f172a;
--glass:rgba(30,41,59,0.8);
--border:rgba(99,102,241,0.2);
--accent:#6366f1;
--text:#f8fafc;
--text-dim:#94a3b8;
--success:#10b981;
--warning:#f59e0b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:rgba(15,23,42,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:800;
font-size:1.2rem;
text-decoration:none;
color:white;
}

.logo span{
color:var(--accent);
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:var(--text-dim);
font-weight:600;
}

.nav-links a:hover{
color:var(--accent);
}

/* HAMBURGER */

.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
width:28px;
}

.hamburger div{
height:3px;
background:white;
margin:5px 0;
transition:0.3s;
}

/* X animation */

.hamburger.open div:nth-child(1){
transform:rotate(45deg) translate(6px,6px);
}

.hamburger.open div:nth-child(2){
opacity:0;
}

.hamburger.open div:nth-child(3){
transform:rotate(-45deg) translate(7px,-7px);
}

.nav-links.active{
display:flex;
flex-direction:column;
position:absolute;
top:60px;
right:5%;
background:var(--card);
padding:20px;
border-radius:15px;
}

/* BACK BUTTON */

.back-btn{
margin:20px 5%;
background:var(--accent);
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

/* SETUP */

.setup-container{
max-width:900px;
margin:40px auto;
padding:0 5%;
}

.setup-card{
background:var(--card);
border:1px solid var(--border);
padding:40px;
border-radius:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

label{
font-size:0.7rem;
font-weight:800;
color:var(--accent);
text-transform:uppercase;
margin-bottom:6px;
display:block;
}

select,input{
width:100%;
background:#1e293b;
border:1px solid var(--border);
color:white;
padding:12px;
border-radius:10px;
}

/* BUTTON */

.btn-proceed{
width:100%;
padding:16px;
background:var(--accent);
border:none;
border-radius:12px;
color:white;
font-weight:700;
cursor:pointer;
}

/* EXAM WORKSPACE */

.exam-workspace{
display:grid;
grid-template-columns:1fr 320px;
gap:25px;
max-width:1300px;
margin:30px auto;
padding:0 5%;
}

.question-panel{
background:var(--card);
border:1px solid var(--border);
border-radius:25px;
padding:40px;
}

.sidebar{
background:var(--glass);
border:1px solid var(--border);
border-radius:25px;
padding:25px;
position:sticky;
top:90px;
}

.timer-box{
font-size:2.5rem;
font-weight:800;
text-align:center;
margin-bottom:20px;
font-family:monospace;
}

/* QUESTION MAP */

.q-map{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.dot{
height:40px;
background:#1e293b;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:700;
}

.dot.active{
background:var(--accent);
}

.dot.flagged{
border:2px solid var(--warning);
color:var(--warning);
}

/* NAV BUTTONS */

.nav-btns{
display:flex;
gap:10px;
margin-top:30px;
}

.btn-nav{
flex:1;
padding:14px;
border-radius:10px;
border:1px solid var(--border);
background:none;
color:white;
cursor:pointer;
}

.btn-next{
background:var(--accent);
border:none;
}

/* RESPONSIVE */

@media(max-width:900px){

.exam-workspace{
grid-template-columns:1fr;
}

.sidebar{
position:relative;
top:0;
}

}

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

.question-panel{
padding:25px;
}

.nav-btns{
flex-direction:column;
}

.q-map{
grid-template-columns:repeat(4,1fr);
}

.timer-box{
font-size:2rem;
}

}

</style>
</head>

<body>

<header>

<a href="dashboard.html" class="logo">IJMB<span>PRO</span></a>

<nav class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="study.html">Study</a>
<a href="exam.html">Exam</a>
<a href="#">Logout</a>
</nav>

<div class="hamburger" id="hamburger">
<div></div>
<div></div>
<div></div>
</div>

</header>

<button class="back-btn" onclick="history.back()">← Back</button>

<main>

<div class="setup-container" id="setupView">

<h2 style="margin-bottom:20px;">Exam Setup</h2>

<div class="setup-card">

<div class="grid">

<div>
<label>Subject</label>
<select id="subject">
<option value="Physics">Physics</option>
<option value="Chemistry">Chemistry</option>
<option value="Mathematics">Mathematics</option>
</select>
</div>

<div>
<label>Year</label>
<select id="year"></select>
</div>

<div>
<label>Paper</label>
<select id="paper">
<option value="I">Paper I</option>
<option value="II">Paper II</option>
</select>
</div>

<div>
<label>Section</label>
<select id="section">
<option value="A">Section A</option>
<option value="B">Section B</option>
</select>
</div>

</div>

<div class="grid">

<div>
<label>No of Questions</label>
<input type="number" id="qAmount" min="1" value="10">
</div>

<div>
<label>Time (Minutes)</label>
<input type="number" id="examTime" min="1" value="30">
</div>

</div>

<button class="btn-proceed" onclick="startExam()">Start Exam</button>

</div>

</div>


<div class="exam-workspace" id="examView" style="display:none">

<div class="question-panel">

<div style="display:flex;justify-content:space-between;margin-bottom:20px">
<h3 id="examTitle"></h3>
<span id="qCount"></span>
</div>

<div id="questionBox"></div>

<div class="nav-btns">
<button class="btn-nav" onclick="changeQ(-1)">Previous</button>
<button class="btn-nav" onclick="flagQ()">Flag</button>
<button class="btn-nav btn-next" onclick="changeQ(1)">Next</button>
</div>

</div>


<div class="sidebar">

<div class="timer-box" id="timer">00:00</div>

<div class="q-map" id="qMap"></div>

<button class="btn-proceed" style="background:var(--success);margin-top:20px" onclick="submitExam()">Submit</button>

</div>

</div>

</main>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
databaseURL:"https://ijmb-portal-default-rtdb.firebaseio.com"
});

const db=firebase.database()

/* YEARS */

const year=document.getElementById("year")

for(let y=2026;y>=2009;y--){
let o=document.createElement("option")
o.value=y
o.innerText=y
year.appendChild(o)
}

/* NAVBAR */

const hamburger=document.getElementById("hamburger")
const nav=document.querySelector(".nav-links")

hamburger.onclick=()=>{
hamburger.classList.toggle("open")
nav.classList.toggle("active")
}

/* EXAM ENGINE */

let questions=[]
let index=0
let flagged=new Set()
let timerInterval

async function startExam(){

let subject=document.getElementById("subject").value
let yr=document.getElementById("year").value
let paper=document.getElementById("paper").value
let section=document.getElementById("section").value
let limit=parseInt(document.getElementById("qAmount").value)

let snap=await db.ref(`questions/${subject}/${yr}/${paper}/${section}`).once("value")

if(!snap.exists()){
alert("No questions found")
return
}

questions=[]
snap.forEach(c=>{
questions.push(c.val())
})

questions=questions.slice(0,limit)

document.getElementById("setupView").style.display="none"
document.getElementById("examView").style.display="grid"

document.getElementById("examTitle").innerText=subject+" "+yr

buildMap()

startTimer(document.getElementById("examTime").value)

render()

}

/* QUESTION MAP */

function buildMap(){

let map=document.getElementById("qMap")
map.innerHTML=""

questions.forEach((q,i)=>{

let d=document.createElement("div")
d.className="dot"
d.innerText=i+1
d.onclick=()=>{index=i;render()}
d.id="dot"+i

map.appendChild(d)

})

}

/* RENDER */

function render(){

let q=questions[index]

document.getElementById("questionBox").innerHTML=q.text||q.question||"Question missing"

document.getElementById("qCount").innerText=`Question ${index+1} of ${questions.length}`

document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"))

document.getElementById("dot"+index).classList.add("active")

MathJax.typesetPromise()

}

/* NAVIGATION */

function changeQ(n){

let next=index+n

if(next>=0 && next<questions.length){

index=next
render()

}

}

/* FLAG */

function flagQ(){

let dot=document.getElementById("dot"+index)

if(flagged.has(index)){
flagged.delete(index)
dot.classList.remove("flagged")
}else{
flagged.add(index)
dot.classList.add("flagged")
}

}

/* TIMER */

function startTimer(mins){

let sec=mins*60

timerInterval=setInterval(()=>{

let m=Math.floor(sec/60)
let s=sec%60

document.getElementById("timer").innerText=
`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`

sec--

if(sec<0){
submitExam()
}

},1000)

}

/* SUBMIT */

function submitExam(){

clearInterval(timerInterval)

alert("Exam Submitted")

location.reload()

}

</script>

</body>
</html>
