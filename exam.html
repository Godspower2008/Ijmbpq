<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Mode | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --glass: rgba(30, 41, 59, 0.8);
            --border: rgba(99, 102, 241, 0.2); --accent: #6366f1; --text: #f8fafc;
            --text-dim: #94a3b8; --success: #10b981; --warning: #f59e0b;
            --btn-red: #cc1d1d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--glass);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        
        .hamburger { display: none; flex-direction: column; justify-content: space-around; width: 28px; height: 22px; cursor: pointer; z-index: 1100; }
        .hamburger div { height: 3px; background: var(--text); border-radius: 2px; transition: 0.4s; }

        @media(max-width: 768px) {
            .nav-links { 
                display: none; flex-direction: column; position: absolute; top: 60px; right: 5%; 
                background: var(--bg); padding: 20px; border-radius: 10px; 
                box-shadow: 0 8px 20px rgba(0,0,0,0.4); gap: 15px; z-index: 1001; 
            }
            .nav-links.active { display: flex; animation: fadeIn 0.3s ease forwards; }
            .hamburger { display: flex; }
            .hamburger.open div:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
            .hamburger.open div:nth-child(2) { opacity: 0; transform: translateX(-20px); }
            .hamburger.open div:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        main { max-width: 1000px; margin: 0 auto; padding: 20px 5%; }

        /* --- UNIFIED BACK BUTTON --- */
        .global-back-btn {
            margin-bottom: 25px; padding: 8px 14px; border: none; border-radius: 8px; 
            background: var(--accent); color: white; font-weight: 700; font-size: 0.75rem; 
            cursor: pointer; display: inline-flex; align-items: center; gap: 6px; 
            transition: 0.3s; text-transform: uppercase;
        }
        .global-back-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(99,102,241,0.3); }

        /* --- MODE SELECTION --- */
        .mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .mode-card { 
            background: var(--card); border: 1px solid var(--border); padding: 40px 25px; 
            border-radius: 24px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .mode-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
        .mode-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; display: block; }

        /* --- SETUP FORMS --- */
        .setup-view { display: none; animation: slideIn 0.4s ease-out; max-width: 700px; margin: 0 auto; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .setup-card { background: var(--card); border: 1px solid var(--border); padding: 35px; border-radius: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .input-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { width: 100%; background: #1e293b; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 12px; font-weight: 600; outline: none; transition: 0.3s; }
        select:focus { border-color: var(--accent); }

        /* CBT ICON STYLES */
        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .icon-box { padding: 10px; border-radius: 10px; color: white; }

        .btn-red-action { 
            width: 100%; padding: 18px; background: var(--btn-red); color: white; 
            border: none; border-radius: 50px; font-weight: 800; font-size: 1rem; 
            cursor: pointer; transition: 0.3s; margin-top: 25px; text-transform: uppercase;
        }
        .btn-red-action:hover { opacity: 0.9; transform: scale(1.02); box-shadow: 0 10px 20px rgba(204, 29, 29, 0.2); }

    </style>
</head>
<body>

<header>
    <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
    <nav class="nav-links">
        <a href="ijmbpq.html">Dashboard</a>
        <a href="study.html">Study</a>
        <a href="exam.html">Exam Mode</a>
        <a href="pricing.html">Upgrade</a>
    </nav>
    <div class="hamburger" id="hamburger">
        <div></div><div></div><div></div>
    </div>
</header>

<main>
    <button class="global-back-btn" onclick="handleBack()">
        <i class="fa-solid fa-arrow-left"></i> Back
    </button>

    <div id="selectionView">
        <h1 style="margin-bottom: 10px; font-size: 2.2rem;">Exam Mode</h1>
        <p style="color: var(--text-dim); margin-bottom: 35px;">Select your preferred examination environment.</p>
        
        <div class="mode-grid">
            <div class="mode-card" onclick="openSetup('standard')">
                <i class="fa-solid fa-graduation-cap"></i>
                <h3>Standard Exam</h3>
                <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 10px;">Practice with full subject combinations (e.g. PCM, ART, SMS).</p>
            </div>
            <div class="mode-card" onclick="openSetup('cbt')">
                <i class="fa-solid fa-laptop-code"></i>
                <h3>CBT Simulator</h3>
                <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 10px;">Highly customizable simulation with specific parameters.</p>
            </div>
        </div>
    </div>

    <div id="standardSetup" class="setup-view">
        <div class="section-header">
            <div class="icon-box" style="background: var(--accent);"><i class="fa-solid fa-layer-group"></i></div>
            <h2 style="font-size: 1.3rem;">Standard Exam Setup</h2>
        </div>
        
        <div class="setup-card">
            <div class="form-grid">
                <div class="input-group">
                    <label>Subject Combination</label>
                    <select id="combination">
                        <option value="PCM">Physics, Chemistry, Mathematics (PCM)</option>
                        <option value="PCB">Physics, Chemistry, Biology (PCB)</option>
                        <option value="ART">Government, Literature, C.R.S (ART)</option>
                        <option value="SMS">Economics, Government, Mathematics (SMS)</option>
                        <option value="BEA">Business Management, Economics, Accounting (BEA)</option>
                    </select>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Exam Year</label>
                        <select id="examYear"></select>
                    </div>
                    <div class="input-group">
                        <label>Paper Type</label>
                        <select><option>Type I</option><option>Type II</option></select>
                    </div>
                </div>
            </div>
            <button class="btn-red-action" onclick="startSession()">Start Standard Exam</button>
        </div>
    </div>

    <div id="cbtSetup" class="setup-view">
        <div class="section-header">
            <div class="icon-box" style="background: #4f46e5;"><i class="fa-solid fa-list-check"></i></div>
            <h2 style="font-size: 1.3rem;">CBT Parameters</h2>
        </div>

        <div class="setup-card">
            <div class="form-grid">
                <div class="input-group">
                    <label>Select Subject</label>
                    <select><option>Mathematics</option><option>Physics</option><option>Chemistry</option></select>
                </div>
                <div class="input-group">
                    <label>Number of Questions</label>
                    <input type="number" value="50">
                </div>
                <div class="input-group">
                    <label>Duration (Minutes)</label>
                    <input type="number" value="60">
                </div>
            </div>
            <button class="btn-red-action" onclick="startSession()">Launch Simulator</button>
        </div>
    </div>

</main>

<script>
    let activeStep = 'selection';

    // Populate Year Select
    const yearDropdown = document.getElementById('examYear');
    for(let y=2026; y>=2009; y--) {
        let opt = document.createElement('option');
        opt.value = y; opt.innerText = y;
        yearDropdown.appendChild(opt);
    }

    function openSetup(mode) {
        document.getElementById('selectionView').style.display = 'none';
        if(mode === 'standard') {
            document.getElementById('standardSetup').style.display = 'block';
        } else {
            document.getElementById('cbtSetup').style.display = 'block';
        }
        activeStep = 'setup';
        window.scrollTo(0,0);
    }

    function handleBack() {
        if(activeStep === 'setup') {
            document.getElementById('standardSetup').style.display = 'none';
            document.getElementById('cbtSetup').style.display = 'none';
            document.getElementById('selectionView').style.display = 'block';
            activeStep = 'selection';
        } else {
            window.location.href = 'ijmbpq.html';
        }
    }

    function startSession() {
        alert("Preparing your examination environment...");
        // Add your question loading logic here
    }

    // Hamburger Logic
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.querySelector('.nav-links');
    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('open');
    });
</script>

</body>
</html>
