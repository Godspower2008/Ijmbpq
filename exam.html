<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --glass: rgba(30, 41, 59, 0.8);
            --border: rgba(99, 102, 241, 0.2); --accent: #6366f1; --text: #f8fafc;
            --text-dim: #94a3b8; --success: #10b981; --warning: #f59e0b;
            --btn-red: #cc1d1d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- TOP BAR --- */
        .exam-header {
            height: 70px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 5%;
            position: sticky; top: 0; z-index: 100;
        }
        .status-pill { background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .timer-box { font-size: 1.4rem; font-weight: 800; color: var(--warning); display: flex; align-items: center; gap: 8px; }

        /* --- MAIN LAYOUT --- */
        .workspace { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 70px); }

        /* --- QUESTION SECTION --- */
        .question-area { padding: 40px 10%; overflow-y: auto; position: relative; }
        .q-meta { font-weight: 800; color: var(--accent); margin-bottom: 10px; display: block; }
        .q-text { font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; }

        .options-list { display: grid; gap: 12px; }
        .option {
            background: var(--card); border: 1px solid var(--border); padding: 18px;
            border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px;
        }
        .option:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
        .option.selected { border-color: var(--accent); background: var(--accent); color: white; }
        .opt-letter { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; }
        .option.selected .opt-letter { border-color: white; }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: var(--card); border-left: 1px solid var(--border); 
            padding: 25px; display: flex; flex-direction: column; gap: 25px;
        }
        .sidebar-title { font-size: 0.8rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        
        .question-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 300px; overflow-y: auto; }
        .q-dot { 
            aspect-ratio: 1; background: #1e293b; border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .q-dot.current { border: 2px solid var(--accent); color: var(--accent); }
        .q-dot.answered { background: var(--accent); color: white; border: none; }

        /* --- FOOTER NAV --- */
        .action-btns { margin-top: auto; display: grid; gap: 10px; }
        .btn-nav { padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-prev { background: #1e293b; color: white; }
        .btn-next { background: var(--accent); color: white; }
        .btn-submit { background: var(--btn-red); color: white; margin-top: 10px; }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; }
            .sidebar { display: none; } /* On mobile, we can use a drawer for the q-grid */
        }
    </style>
</head>
<body>

    <div class="exam-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="logo" style="font-weight: 800; font-size: 1.1rem;">IJMB<span style="color:var(--accent)">PRO</span></span>
            <div class="status-pill" id="saveStatus"><i class="fa-solid fa-cloud-check"></i> Auto-saved</div>
        </div>
        
        <div class="timer-box">
            <i class="fa-regular fa-clock"></i>
            <span id="timer">01:45:00</span>
        </div>
    </div>

    <main class="workspace">
        <section class="question-area">
            <span class="q-meta" id="qNumber">QUESTION 1</span>
            <div class="q-text" id="qText">
                A body of mass 2kg is moving with a velocity of 10m/s. Calculate its kinetic energy.
            </div>

            <div class="options-list">
                <div class="option" onclick="selectOption(this, 'A')">
                    <div class="opt-letter">A</div>
                    <span class="opt-val">50 Joules</span>
                </div>
                <div class="option" onclick="selectOption(this, 'B')">
                    <div class="opt-letter">B</div>
                    <span class="opt-val">100 Joules</span>
                </div>
                <div class="option" onclick="selectOption(this, 'C')">
                    <div class="opt-letter">C</div>
                    <span class="opt-val">200 Joules</span>
                </div>
                <div class="option" onclick="selectOption(this, 'D')">
                    <div class="opt-letter">D</div>
                    <span class="opt-val">400 Joules</span>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <div>
                <h3 class="sidebar-title">Subject Summary</h3>
                <p style="font-size: 0.9rem; font-weight: 700; margin-top: 5px;" id="examSubject">Physics (Standard PCM)</p>
            </div>

            <div>
                <h3 class="sidebar-title">Question Navigator</h3>
                <div class="question-grid" id="qGrid">
                    </div>
            </div>

            <div class="action-btns">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-nav btn-prev" onclick="prevQ()"><i class="fa-solid fa-chevron-left"></i> Prev</button>
                    <button class="btn-nav btn-next" onclick="nextQ()">Next <i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <button class="btn-nav btn-submit" onclick="confirmSubmit()">SUBMIT EXAM</button>
            </div>
        </aside>
    </main>

    <script>
        let currentIdx = 1;
        const totalQuestions = 50;
        let answers = JSON.parse(localStorage.getItem('current_exam_answers')) || {};

        // 1. GENERATE NAVIGATION DOTS
        const qGrid = document.getElementById('qGrid');
        function renderGrid() {
            qGrid.innerHTML = '';
            for (let i = 1; i <= totalQuestions; i++) {
                const dot = document.createElement('div');
                dot.className = `q-dot ${i === currentIdx ? 'current' : ''} ${answers[i] ? 'answered' : ''}`;
                dot.innerText = i;
                dot.onclick = () => jumpTo(i);
                qGrid.appendChild(dot);
            }
        }

        // 2. OPTION SELECTION
        function selectOption(el, val) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            answers[currentIdx] = val;
            
            // Auto-Save to LocalStorage
            localStorage.setItem('current_exam_answers', JSON.stringify(answers));
            showSaveStatus();
            renderGrid();
        }

        function showSaveStatus() {
            const status = document.getElementById('saveStatus');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0.5'; }, 1000);
        }

        // 3. NAVIGATION LOGIC
        function jumpTo(n) {
            currentIdx = n;
            document.getElementById('qNumber').innerText = `QUESTION ${currentIdx}`;
            // Here you would fetch the question text from your question array
            renderGrid();
        }

        function nextQ() { if(currentIdx < totalQuestions) jumpTo(currentIdx + 1); }
        function prevQ() { if(currentIdx > 1) jumpTo(currentIdx - 1); }

        // 4. TIMER LOGIC
        let seconds = 3600; // 1 Hour
        const timerEl = document.getElementById('timer');
        setInterval(() => {
            if(seconds <= 0) return;
            seconds--;
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            timerEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(seconds < 300) timerEl.style.color = 'var(--btn-red)'; // Red timer at 5 mins
        }, 1000);

        // 5. SUBMIT
        function confirmSubmit() {
            if(confirm("Are you sure you want to submit? This action cannot be undone.")) {
                localStorage.removeItem('ijmb_exam_session');
                localStorage.removeItem('current_exam_answers');
                alert("Exam Submitted Successfully!");
                window.location.href = 'ijmbpq.html';
            }
        }

        renderGrid();
    </script>
</body>
</html>
