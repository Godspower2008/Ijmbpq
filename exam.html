<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Hall | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --border: rgba(99, 102, 241, 0.2); 
            --accent: #6366f1; --text: #f8fafc; --text-dim: #94a3b8; 
            --success: #10b981; --warning: #f59e0b; --btn-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- FIXED TOP NAV --- */
        header {
            height: 70px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 5%;
            position: fixed; top: 0; width: 100%; z-index: 2000;
        }
        
        .nav-group { display: flex; align-items: center; gap: 12px; }

        .icon-btn {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
        .exit-btn { color: var(--btn-red); border-color: rgba(239, 68, 68, 0.3); }

        /* --- CALCULATOR --- */
        #calcBox {
            position: fixed; top: 80px; right: 5%; width: 260px; background: var(--card);
            border: 1px solid var(--border); border-radius: 20px; padding: 15px; z-index: 3000;
            display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .calc-screen { width: 100%; background: var(--bg); border: none; padding: 10px; color: white; text-align: right; font-size: 1.2rem; border-radius: 8px; margin-bottom: 10px; outline: none; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-grid button { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: white; cursor: pointer; font-weight: 700; }

        /* --- MAIN LAYOUT --- */
        main { padding-top: 90px; height: 100vh; overflow-y: auto; padding-bottom: 50px; }
        .content { max-width: 800px; margin: 0 auto; padding: 0 5%; }

        /* --- THEORY INTERFACE --- */
        .theory-container { display: none; margin-top: 20px; animation: fadeIn 0.4s ease; }
        .question-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 24px; margin-bottom: 20px; }
        .theory-input { 
            width: 100%; min-height: 300px; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 15px; color: var(--text); padding: 20px; font-size: 1.1rem; line-height: 1.6;
            resize: none; outline: none; transition: 0.3s;
        }
        .theory-input:focus { border-color: var(--accent); }

        /* --- SELECTION CARDS --- */
        .card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .footer-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 15px 5%; border-top: 1px solid var(--border); display: none; justify-content: space-between; }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <button class="icon-btn" id="globalBackBtn" onclick="handleBack()"><i class="fa-solid fa-arrow-left"></i></button>
            <span style="font-weight: 800; font-size: 0.9rem; letter-spacing: 1px;">IJMB<span style="color:var(--accent)">PRO</span></span>
        </div>

        <div class="nav-group">
            <div id="timer" style="display:none; font-weight: 800; color: var(--warning); margin-right: 10px;">60:00</div>
            <button class="icon-btn" onclick="toggleCalc()"><i class="fa-solid fa-calculator"></i></button>
        </div>
    </header>

    <div id="calcBox">
        <input type="text" id="calcDisplay" class="calc-screen" readonly placeholder="0">
        <div class="calc-grid">
            <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button><button onclick="calcIn('/')" style="color:var(--accent)">/</button>
            <button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button><button onclick="calcIn('6')">6</button><button onclick="calcIn('*')" style="color:var(--accent)">*</button>
            <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button><button onclick="calcIn('-')" style="color:var(--accent)">-</button>
            <button onclick="calcClr()" style="color:var(--btn-red)">C</button><button onclick="calcIn('0')">0</button><button onclick="calcRes()" style="background:var(--accent)">=</button><button onclick="calcIn('+')" style="color:var(--accent)">+</button>
        </div>
    </div>

    <main>
        <div class="content" id="homeView">
            <h1 style="margin: 20px 0;">Exam Hall</h1>
            <div class="card" onclick="openSetup()">
                <i class="fa-solid fa-pen-nib" style="color:var(--accent); font-size: 2rem; margin-bottom: 15px; display: block;"></i>
                <h3>Theory Mode</h3>
                <p style="color:var(--text-dim); font-size: 0.9rem;">Submit written answers for grading.</p>
            </div>
        </div>

        <div class="content" id="setupView" style="display:none;">
            <h2>Configure Exam</h2>
            <div class="card" style="cursor:default; margin-top:20px;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--accent)">SELECT SUBJECT</label>
                <select style="width:100%; padding:15px; background:var(--bg); color:white; border:1px solid var(--border); border-radius:12px; margin: 10px 0 20px 0;">
                    <option>Mathematics Theory</option>
                    <option>Physics Theory</option>
                </select>
                <button onclick="startExam()" style="width:100%; padding:18px; border-radius:50px; background:var(--accent); color:white; border:none; font-weight:800; cursor:pointer;">START WRITING</button>
            </div>
        </div>

        <div class="content theory-container" id="examView">
            <div class="question-card">
                <span id="qNumber" style="color:var(--accent); font-weight:800; font-size:0.8rem;">QUESTION 1</span>
                <h2 id="qText" style="margin-top:10px; line-height:1.4;">State and explain the First Law of Thermodynamics.</h2>
            </div>
            <textarea class="theory-input" id="theoryField" placeholder="Start typing your answer here..."></textarea>
            
            <button onclick="submitExam()" style="width:100%; padding:20px; border-radius:15px; background:var(--success); color:white; border:none; font-weight:800; margin-top:20px;">SUBMIT FINAL PAPER</button>
        </div>
    </main>

    <div class="footer-nav" id="examFooter">
        <button class="icon-btn" style="width:48%; height:50px;" onclick="alert('Previous')">PREVIOUS</button>
        <button class="icon-btn" style="width:48%; height:50px;" onclick="alert('Next')">NEXT</button>
    </div>

    <script>
        let isExamActive = false;

        function handleBack() {
            if (isExamActive) {
                if (confirm("Are you sure you want to leave the exam? Unsaved progress will be lost.")) {
                    exitExamMode();
                }
            } else if (document.getElementById('setupView').style.display === 'block') {
                document.getElementById('setupView').style.display = 'none';
                document.getElementById('homeView').style.display = 'block';
            } else {
                window.location.href = 'ijmbpq.html';
            }
        }

        function openSetup() {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('setupView').style.display = 'block';
        }

        function startExam() {
            isExamActive = true;
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('examView').style.display = 'block';
            document.getElementById('examFooter').style.display = 'flex';
            document.getElementById('timer').style.display = 'block';
            
            // Add visual cue to back button
            document.getElementById('globalBackBtn').classList.add('exit-btn');
        }

        function exitExamMode() {
            isExamActive = false;
            document.getElementById('examView').style.display = 'none';
            document.getElementById('examFooter').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('globalBackBtn').classList.remove('exit-btn');
        }

        function toggleCalc() {
            const calc = document.getElementById('calcBox');
            calc.style.display = calc.style.display === 'block' ? 'none' : 'block';
        }

        // Calculator Logic
        function calcIn(v) { document.getElementById('calcDisplay').value += v; }
        function calcClr() { document.getElementById('calcDisplay').value = ""; }
        function calcRes() {
            try { document.getElementById('calcDisplay').value = eval(document.getElementById('calcDisplay').value); }
            catch { document.getElementById('calcDisplay').value = "Error"; }
        }

        function submitExam() {
            alert("Examination submitted successfully!");
            exitExamMode();
        }
    </script>
</body>
</html>
