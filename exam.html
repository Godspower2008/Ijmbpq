<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Mode | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --glass: rgba(30, 41, 59, 0.4);
            --border: rgba(99, 102, 241, 0.2);
            --accent: #6366f1;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        .hidden { display: none !important; }

        /* --- PAGE 1: SETUP --- */
        .setup-container { max-width: 850px; margin: 60px auto; padding: 0 5%; text-align: center; }
        .setup-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 30px; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .input-box label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        select, input { width: 100%; background: #1e293b; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 12px; font-weight: 600; outline: none; }

        .btn-proceed { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-proceed:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3); }

        /* --- PAGE 2: WORKSPACE --- */
        .exam-workspace { display: grid; grid-template-columns: 1fr 340px; gap: 30px; max-width: 1400px; margin: 30px auto; padding: 0 5%; animation: fadeIn 0.5s ease; }
        .question-panel { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 45px; min-height: 550px; }
        .sidebar { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 24px; position: sticky; top: 100px; }
        
        .timer-box { font-size: 2.8rem; font-weight: 800; text-align: center; margin-bottom: 25px; font-family: monospace; color: var(--text); }
        .q-map { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .dot { height: 45px; background: #1e293b; border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .dot.flagged { border: 2px solid var(--warning); color: var(--warning); }

        .nav-btns { display: flex; gap: 15px; margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border); }
        .btn-nav { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: white; cursor: pointer; font-weight: 700; }
        .btn-next { flex: 2; background: var(--accent); border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 1024px) { .exam-workspace { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
    <div id="liveBadge" class="hidden" style="display:flex; align-items:center; gap:8px;">
        <span style="height:8px; width:8px; background:var(--success); border-radius:50%;"></span>
        <small style="font-weight:800; color:var(--text-dim);">LIVE SESSION</small>
    </div>
</header>

<main>
    <div id="setupView" class="setup-container">
        <h1>Exam Parameters</h1>
        <p style="color:var(--text-dim); margin-bottom:30px;">Set up your workspace before we proceed.</p>
        <div class="setup-card">
            <div class="grid">
                <div class="input-box">
                    <label>Subject</label>
                    <select id="subject">
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Economics">Economics</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>Year</label>
                    <select id="yearSelect"></select>
                </div>
                <div class="input-box">
                    <label>Paper</label>
                    <select id="paper">
                        <option value="I">Paper I</option>
                        <option value="II">Paper II</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>Section</label>
                    <select id="section">
                        <option value="A">Section A</option>
                        <option value="B">Section B</option>
                    </select>
                </div>
            </div>
            <div class="grid" style="border-top:1px solid var(--border); padding-top:25px;">
                <div class="input-box">
                    <label>No. of Questions</label>
                    <input type="number" id="qAmount" value="15">
                </div>
                <div class="input-box">
                    <label>Timer (Mins)</label>
                    <input type="number" id="examTime" value="45">
                </div>
            </div>
            <button class="btn-proceed" onclick="proceedToExam()">Proceed <i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <div id="examView" class="exam-workspace hidden">
        <div class="question-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 id="displaySub" style="color:var(--accent); text-transform:uppercase; font-size:1rem;">SUBJECT</h2>
                <span id="qCount" style="font-weight:700; color:var(--text-dim);">Question 1 of --</span>
            </div>

            <div id="questions-container" style="font-size:1.4rem; line-height:1.8; min-height:300px;">
                </div>

            <div class="nav-btns">
                <button class="btn-nav" onclick="changeQ(-1)">← Previous</button>
                <button class="btn-nav" style="border-color:var(--warning); color:var(--warning);" onclick="toggleFlag()">Flag Question</button>
                <button class="btn-nav btn-next" onclick="changeQ(1)">Next Question →</button>
            </div>
        </div>

        <aside class="sidebar">
            <p style="text-align:center; font-size:0.7rem; font-weight:800; color:var(--text-dim); margin-bottom:10px;">REMAINING TIME</p>
            <div class="timer-box" id="timer">00:00:00</div>
            
            <p style="font-weight:800; font-size:0.85rem; margin-bottom:15px;">Question Map</p>
            <div class="q-map" id="qMap"></div>

            <button class="btn-proceed" style="background:var(--success); margin-top:40px;" onclick="submitExam()">Finish & Submit</button>
        </aside>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
        databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com"
    });
    const db = firebase.database();

    // Populate years
    const ys = document.getElementById('yearSelect');
    for(let y=2026; y>=2009; y--) {
        let o = document.createElement('option'); o.value=y; o.innerText=y; ys.appendChild(o);
    }

    let questions = [];
    let currentIndex = 0;
    let timerInterval;
    let flagged = new Set();

    async function proceedToExam() {
        const sub = document.getElementById('subject').value;
        const yr = document.getElementById('yearSelect').value;
        const pap = document.getElementById('paper').value;
        const sec = document.getElementById('section').value;
        const limit = parseInt(document.getElementById('qAmount').value);

        // Fetch Data
        const snap = await db.ref(`questions/${sub}/${yr}/${pap}/${sec}`).once('value');
        if(!snap.exists()) return alert("No data found for this selection.");

        questions = [];
        snap.forEach(c => questions.push(c.val()));
        questions = questions.slice(0, limit); // Respect the "Number of Questions" input

        // Transition Pages
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('examView').classList.remove('hidden');
        document.getElementById('liveBadge').classList.remove('hidden');
        document.getElementById('displaySub').innerText = sub + " " + yr;

        // Build Map
        const map = document.getElementById('qMap');
        map.innerHTML = '';
        questions.forEach((_, i) => {
            map.innerHTML += `<div class="dot" id="dot-${i}" onclick="jumpTo(${i})">${i+1}</div>`;
        });

        startTimer(document.getElementById('examTime').value);
        render();
    }

    function render() {
        const q = questions[currentIndex];
        document.getElementById('questions-container').innerHTML = q.text;
        document.getElementById('qCount').innerText = `Question ${currentIndex+1} of ${questions.length}`;
        
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        document.getElementById(`dot-${currentIndex}`).classList.add('active');

        MathJax.typesetPromise();
    }

    function changeQ(dir) {
        let next = currentIndex + dir;
        if(next >= 0 && next < questions.length) { currentIndex = next; render(); }
    }

    function jumpTo(i) { currentIndex = i; render(); }

    function toggleFlag() {
        const dot = document.getElementById(`dot-${currentIndex}`);
        if(flagged.has(currentIndex)) {
            flagged.delete(currentIndex);
            dot.classList.remove('flagged');
        } else {
            flagged.add(currentIndex);
            dot.classList.add('flagged');
        }
    }

    function startTimer(mins) {
        let sec = mins * 60;
        timerInterval = setInterval(() => {
            let h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(--sec < 0) { clearInterval(timerInterval); submitExam(); }
        }, 1000);
    }

    function submitExam() {
        clearInterval(timerInterval);
        alert("Exam Submitted Successfully!");
        location.href = 'ijmbpq.html';
    }
</script>
</body>
</html>
