<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Hall | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --border: rgba(99, 102, 241, 0.2); 
            --accent: #6366f1; --text: #f8fafc; --text-dim: #94a3b8; 
            --success: #10b981; --warning: #f59e0b; --btn-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- RESTORED FULL HEADER --- */
        header {
            height: 70px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 4%;
            position: fixed; top: 0; width: 100%; z-index: 2000;
        }
        
        .header-left, .header-right { display: flex; align-items: center; gap: 10px; }

        .icon-btn {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
        .exit-btn { color: var(--btn-red); border-color: rgba(239, 68, 68, 0.3); }

        /* --- SIDE NAV --- */
        #sideNav {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: var(--card); z-index: 3000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 30px 20px; border-right: 1px solid var(--border);
        }
        #sideNav.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 15px; color: var(--text); text-decoration: none; font-weight: 600; border-radius: 12px; margin-bottom: 8px; }
        .nav-link:hover { background: var(--border); color: var(--accent); }

        /* --- CALCULATOR --- */
        #calcBox {
            position: fixed; top: 80px; right: 4%; width: 260px; background: var(--card);
            border: 1px solid var(--border); border-radius: 20px; padding: 15px; z-index: 3000;
            display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .calc-screen { width: 100%; background: var(--bg); border: none; padding: 10px; color: white; text-align: right; font-size: 1.2rem; border-radius: 8px; margin-bottom: 10px; outline: none; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-grid button { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: white; cursor: pointer; font-weight: 700; }

        /* --- CONTENT AREA --- */
        main { padding-top: 90px; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 5%; }

        /* --- THEORY UI --- */
        #examWorkspace { display: none; animation: fadeIn 0.4s ease; }
        .theory-field { 
            width: 100%; min-height: 350px; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 20px; color: var(--text); padding: 20px; font-size: 1.1rem; line-height: 1.6;
            resize: none; outline: none; transition: 0.3s; margin-top: 20px;
        }
        .theory-field:focus { border-color: var(--accent); }

        /* --- CARDS --- */
        .card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .footer-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 15px 5%; border-top: 1px solid var(--border); display: none; justify-content: space-between; z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="toggleNav()"><i class="fa-solid fa-bars-staggered"></i></button>
            <button class="icon-btn" id="examBackBtn" onclick="handleBack()" title="Back/Exit"><i class="fa-solid fa-arrow-left"></i></button>
        </div>
        
        <div style="font-weight: 800; font-size: 1rem; letter-spacing: 1px;">IJMB<span style="color:var(--accent)">PRO</span></div>

        <div class="header-right">
            <div id="examTimer" style="display:none; font-weight: 800; color: var(--warning); font-size: 0.9rem; margin-right: 5px;">60:00</div>
            <button class="icon-btn" onclick="toggleCalc()"><i class="fa-solid fa-calculator"></i></button>
        </div>
    </header>

    <nav id="sideNav">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-weight:800; font-size: 1.2rem;">NAVIGATION</h2>
            <i class="fa-solid fa-xmark" onclick="toggleNav()" style="cursor:pointer; font-size:1.4rem;"></i>
        </div>
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="ijmbpq.html" class="nav-link"><i class="fa-solid fa-book"></i> Library</a>
        <a href="#" class="nav-link" onclick="handleBack()"><i class="fa-solid fa-door-open"></i> Exit Hall</a>
        <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
        <button onclick="location.reload()" style="width:100%; padding:15px; border-radius:12px; background:var(--btn-red); color:white; border:none; font-weight:800;">RESTART APP</button>
    </nav>

    <div id="calcBox">
        <input type="text" id="calcDisplay" class="calc-screen" readonly placeholder="0">
        <div class="calc-grid">
            <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button><button onclick="calcIn('/')">/</button>
            <button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button><button onclick="calcIn('6')">6</button><button onclick="calcIn('*')">*</button>
            <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button><button onclick="calcIn('-')">-</button>
            <button onclick="calcClr()" style="color:var(--btn-red)">C</button><button onclick="calcIn('0')">0</button><button onclick="calcRes()" style="background:var(--accent)">=</button><button onclick="calcIn('+')">+</button>
        </div>
    </div>

    <main>
        <div class="container" id="homeView">
            <h1 style="margin: 20px 0;">Exam Hall</h1>
            <div class="card" onclick="openSetup()">
                <i class="fa-solid fa-file-signature" style="color:var(--accent); font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                <h3>Standard Theory</h3>
                <p style="color:var(--text-dim); font-size: 0.85rem;">Submit comprehensive written answers.</p>
            </div>
            <div class="card" onclick="openSetup()">
                <i class="fa-solid fa-bolt" style="color:var(--warning); font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                <h3>CBT Simulation</h3>
                <p style="color:var(--text-dim); font-size: 0.85rem;">Fast-paced practice environment.</p>
            </div>
        </div>

        <div class="container" id="setupView" style="display:none;">
            <h2>Session Setup</h2>
            <div class="card" style="cursor:default; margin-top:20px;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--accent)">SUBJECT SELECTION</label>
                <select style="width:100%; padding:15px; background:var(--bg); color:white; border:1px solid var(--border); border-radius:12px; margin: 10px 0 20px 0; font-weight: 600;">
                    <option>Mathematics Theory</option>
                    <option>Biology Theory</option>
                    <option>Chemistry Theory</option>
                </select>
                <button onclick="startExam()" style="width:100%; padding:20px; border-radius:50px; background:var(--accent); color:white; border:none; font-weight:800;">START EXAMINATION</button>
            </div>
        </div>

        <div class="container" id="examWorkspace">
            <div style="background:var(--card); padding:25px; border-radius:24px; border:1px solid var(--border);">
                <span id="qNum" style="color:var(--accent); font-weight:800; font-size:0.8rem;">QUESTION 1</span>
                <h2 id="qTitle" style="margin-top:10px; line-height:1.4;">Discuss the impact of cell theory on modern biological research.</h2>
            </div>
            
            <textarea id="theoryField" class="theory-field" placeholder="Type your written response here..."></textarea>
            
            <button onclick="submitPaper()" style="width:100%; padding:20px; border-radius:15px; background:var(--success); color:white; border:none; font-weight:800; margin-top:20px;">SUBMIT FINAL PAPER</button>
        </div>
    </main>

    <div class="footer-nav" id="examFooter">
        <button class="icon-btn" style="width:48%; height:55px; font-weight:800;" onclick="alert('Prev')">PREVIOUS</button>
        <button class="icon-btn" style="width:48%; height:55px; font-weight:800;" onclick="alert('Next')">NEXT</button>
    </div>

    <script>
        let inExam = false;

        function toggleNav() { document.getElementById('sideNav').classList.toggle('open'); }
        function toggleCalc() { 
            const calc = document.getElementById('calcBox');
            calc.style.display = calc.style.display === 'block' ? 'none' : 'block';
        }

        function handleBack() {
            if (inExam) {
                if (confirm("Exit exam? Progress will be lost.")) {
                    resetToHome();
                }
            } else if (document.getElementById('setupView').style.display === 'block') {
                resetToHome();
            } else {
                window.location.href = 'ijmbpq.html';
            }
            if(document.getElementById('sideNav').classList.contains('open')) toggleNav();
        }

        function openSetup() {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('setupView').style.display = 'block';
        }

        function startExam() {
            inExam = true;
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('examWorkspace').style.display = 'block';
            document.getElementById('examFooter').style.display = 'flex';
            document.getElementById('examTimer').style.display = 'block';
            document.getElementById('examBackBtn').classList.add('exit-btn');
        }

        function resetToHome() {
            inExam = false;
            document.getElementById('examWorkspace').style.display = 'none';
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('examFooter').style.display = 'none';
            document.getElementById('examTimer').style.display = 'none';
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('examBackBtn').classList.remove('exit-btn');
        }

        // Calculator Logic
        function calcIn(v) { document.getElementById('calcDisplay').value += v; }
        function calcClr() { document.getElementById('calcDisplay').value = ""; }
        function calcRes() {
            try { document.getElementById('calcDisplay').value = eval(document.getElementById('calcDisplay').value); }
            catch { document.getElementById('calcDisplay').value = "Error"; }
        }

        function submitPaper() {
            alert("Examination Submitted!");
            resetToHome();
        }
    </script>
</body>
</html>
