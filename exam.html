<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Hall | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --border: rgba(99, 102, 241, 0.2); 
            --accent: #6366f1; --text: #f8fafc; --text-dim: #94a3b8; 
            --success: #10b981; --warning: #f59e0b; --btn-red: #ef4444;
            --overlay: rgba(2, 6, 23, 0.95);
        }

        body.light-mode {
            --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; 
            --text: #0f172a; --text-dim: #64748b; --accent: #4f46e5;
            --overlay: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.3s; }

        /* --- CONSOLIDATED HEADER --- */
        header {
            height: 70px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 4%;
            position: sticky; top: 0; z-index: 1000;
        }
        
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-right { display: flex; align-items: center; gap: 12px; }

        .logo { font-weight: 800; font-size: 1rem; color: var(--text); text-decoration: none; margin-left: 4px; }
        .logo span { color: var(--accent); }

        .icon-btn {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }

        .profile-btn { 
            width: 40px; height: 40px; border-radius: 12px; border: 2px solid var(--accent); 
            cursor: pointer; padding: 2px; background: var(--bg);
        }
        .profile-btn img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }

        /* --- SIDE NAV --- */
        #sideNav {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: var(--card); z-index: 2000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 30px 20px; border-right: 1px solid var(--border);
        }
        #sideNav.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.3); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px; color: var(--text); text-decoration: none; font-weight: 600; border-radius: 12px; }
        .nav-link:hover { background: var(--border); color: var(--accent); }

        /* --- PROFILE MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0; background: var(--overlay); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--card); border: 1px solid var(--border); width: 90%; max-width: 400px; padding: 30px; border-radius: 28px; text-align: center; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .avatar-opt { cursor: pointer; border-radius: 10px; border: 2px solid transparent; padding: 4px; }
        .avatar-opt.active { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
        .avatar-opt img { width: 100%; border-radius: 6px; }

        /* --- VIEWS --- */
        .view-step { display: none; height: calc(100vh - 70px); overflow-y: auto; padding: 25px 5%; animation: fadeIn 0.3s; }
        .view-step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS --- */
        .mode-card {
            background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border);
            cursor: pointer; transition: 0.3s; margin-bottom: 16px;
        }
        .mode-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        /* --- EXAM --- */
        #examWorkspace { display: none; grid-template-columns: 1fr 320px; height: calc(100vh - 70px); }
        .question-area { padding: 40px 8%; overflow-y: auto; }
        .sidebar { background: var(--card); border-left: 1px solid var(--border); padding: 25px; }
        
        .timer-box { font-size: 1rem; font-weight: 800; color: var(--warning); display: none; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(245, 158, 11, 0.1); border-radius: 8px; }

        @media (max-width: 900px) {
            #examWorkspace { grid-template-columns: 1fr; }
            .sidebar { position: fixed; top: 70px; right: -100%; width: 280px; height: calc(100vh - 70px); z-index: 1050; transition: 0.4s; background: var(--card); }
            .sidebar.active { right: 0; }
            body.in-exam .timer-box { display: flex; }
        }
    </style>
</head>
<body>

    <nav id="sideNav">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 class="logo">IJMB<span>MENU</span></h2>
            <i class="fa-solid fa-xmark" onclick="toggleNav()" style="cursor:pointer; font-size: 1.2rem;"></i>
        </div>
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="ijmbpq.html" class="nav-link"><i class="fa-solid fa-book"></i> Past Questions</a>
        <a href="#" class="nav-link" onclick="openProfile()"><i class="fa-solid fa-user"></i> My Profile</a>
        <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
        <a href="#" class="nav-link" style="color:var(--btn-red)" onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Exit</a>
    </nav>

    <div class="modal-overlay" id="profileModal" onclick="closeProfile(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 20px;">Student Profile</h3>
            <div class="avatar-grid">
                <div class="avatar-opt active" onclick="setAvatar(this, 'Felix')"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"></div>
                <div class="avatar-opt" onclick="setAvatar(this, 'Aneka')"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka"></div>
                <div class="avatar-opt" onclick="setAvatar(this, 'Max')"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Max"></div>
                <div class="avatar-opt" onclick="setAvatar(this, 'Jude')"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jude"></div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin: 25px 0;">
                <span style="font-weight: 700;">Night Mode</span>
                <button class="icon-btn" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
            </div>
            <button class="icon-btn" onclick="closeProfile()" style="width:100%; height:50px; border-radius:50px; background:var(--accent); color:white; border:none; font-weight:800;">SAVE</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="icon-btn" onclick="toggleNav()"><i class="fa-solid fa-bars-staggered"></i></button>
            <a href="#" class="logo">IJMB<span>PRO</span></a>
        </div>
        
        <div class="header-right">
            <div class="timer-box" id="timerUI">
                <i class="fa-regular fa-clock"></i> <span id="clock">60:00</span>
            </div>
            <div class="profile-btn" onclick="openProfile()">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" id="headerAvatar">
            </div>
        </div>
    </header>

    <main>
        <div id="resultView" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:2000; flex-direction:column; align-items:center; justify-content:center;">
             <h1 id="resScore" style="font-size:4rem; color:var(--accent);">0</h1>
             <p>FINISHED</p>
             <button onclick="location.reload()" style="padding:15px 40px; border-radius:50px; background:var(--accent); color:white; border:none; margin-top:20px;">EXIT</button>
        </div>

        <div id="view-selection" class="view-step active">
            <h2 style="margin-bottom:20px;">Exam Hall</h2>
            <div style="max-width:500px; margin:0 auto;">
                <div class="mode-card" onclick="showView('standard')">
                    <i class="fa-solid fa-graduation-cap" style="color:var(--accent); font-size:1.8rem; margin-bottom:10px; display:block;"></i>
                    <h3>Standard Exam</h3>
                    <p style="font-size:0.8rem; color:var(--text-dim);">Practice with full combinations.</p>
                </div>
                <div class="mode-card" onclick="showView('cbt')">
                    <i class="fa-solid fa-bolt" style="color:var(--warning); font-size:1.8rem; margin-bottom:10px; display:block;"></i>
                    <h3>CBT Simulator</h3>
                    <p style="font-size:0.8rem; color:var(--text-dim);">Quick subject speed drill.</p>
                </div>
            </div>
        </div>

        <div id="view-standard" class="view-step">
            <div style="background:var(--card); padding:30px; border-radius:24px; border:1px solid var(--border); max-width:500px; margin:0 auto;">
                <h3>Exam Setup</h3>
                <select style="width:100%; padding:15px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:12px; margin:20px 0;">
                    <option>Physics, Chemistry, Maths</option>
                </select>
                <button onclick="startExam()" style="width:100%; padding:18px; border-radius:50px; background:var(--accent); color:white; border:none; font-weight:800;">START</button>
            </div>
        </div>

        <div id="view-cbt" class="view-step">
            <div style="background:var(--card); padding:30px; border-radius:24px; border:1px solid var(--border); max-width:500px; margin:0 auto;">
                <h3>CBT Drill</h3>
                <select style="width:100%; padding:15px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:12px; margin:20px 0;">
                    <option>Mathematics</option>
                </select>
                <button onclick="startExam()" style="width:100%; padding:18px; border-radius:50px; background:var(--warning); color:white; border:none; font-weight:800;">BEGIN</button>
            </div>
        </div>

        <div id="examWorkspace">
            <section class="question-area">
                <span id="qIdx" style="font-weight:800; color:var(--accent);">Question 1</span>
                <div id="qText" style="font-size:1.4rem; font-weight:700; margin:20px 0;">Loading...</div>
                <div id="options">
                    <div class="option" onclick="pick('A')"><div style="font-weight:800; width: 30px;">A</div><span id="optA">...</span></div>
                    <div class="option" onclick="pick('B')"><div style="font-weight:800; width: 30px;">B</div><span id="optB">...</span></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let current = 0; let userAnswers = {};
        function toggleNav() { document.getElementById('sideNav').classList.toggle('open'); }
        function openProfile() { document.getElementById('profileModal').classList.add('open'); }
        function closeProfile() { document.getElementById('profileModal').classList.remove('open'); }
        
        function goBack() {
            const currentView = document.querySelector('.view-step.active');
            if (document.body.classList.contains('in-exam')) {
                if(confirm("Exit exam?")) location.reload();
            } else if (!currentView || currentView.id === 'view-selection') {
                window.location.href = 'ijmbpq.html';
            } else {
                showView('selection');
            }
        }

        function setAvatar(el, name) {
            document.querySelectorAll('.avatar-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('headerAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
        }

        function toggleTheme() { 
            document.body.classList.toggle('light-mode');
            document.querySelector('#themeBtn i').className = document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        function showView(id) {
            document.querySelectorAll('.view-step').forEach(v => v.classList.remove('active'));
            const target = document.getElementById('view-' + id);
            if(target) target.classList.add('active');
            document.body.classList.remove('in-exam');
        }

        function startExam() {
            document.body.classList.add('in-exam');
            document.querySelectorAll('.view-step').forEach(v => v.classList.remove('active'));
            document.getElementById('examWorkspace').style.display = 'grid';
            document.getElementById('timerUI').style.display = 'flex';
        }
    </script>
</body>
</html>
