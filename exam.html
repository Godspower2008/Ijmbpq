<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Mode | IJMB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--bg:#020617;
--card:#0f172a;
--glass:rgba(30,41,59,0.4);
--border:rgba(99,102,241,0.2);
--accent:#6366f1;
--text:#f8fafc;
--text-dim:#94a3b8;
--success:#10b981;
--warning:#f59e0b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:rgba(15,23,42,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:800;
font-size:1.2rem;
text-decoration:none;
color:white;
}

.logo span{
color:var(--accent);
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
text-decoration:none;
color:var(--text-dim);
font-weight:600;
}

.nav-links a:hover{
color:var(--accent);
}

.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
}

.hamburger div{
width:26px;
height:3px;
background:white;
margin:4px 0;
transition:.3s;
}

.hamburger.open div:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.hamburger.open div:nth-child(2){
opacity:0;
}

.hamburger.open div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

@media(max-width:768px){

.nav-links{
display:none;
position:absolute;
right:5%;
top:60px;
flex-direction:column;
background:#0f172a;
padding:20px;
border-radius:10px;
}

.nav-links.active{
display:flex;
}

.hamburger{
display:flex;
}

}

.back-btn{
position:fixed;
top:80px;
left:20px;
background:#1e293b;
border:1px solid var(--border);
padding:10px 18px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:700;
z-index:999;
}

.setup{
max-width:850px;
margin:80px auto;
padding:0 5%;
}

.card{
background:var(--card);
border:1px solid var(--border);
padding:35px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

label{
font-size:.7rem;
font-weight:800;
color:var(--accent);
text-transform:uppercase;
margin-bottom:6px;
display:block;
}

select,input{
width:100%;
background:#1e293b;
border:1px solid var(--border);
padding:14px;
border-radius:10px;
color:white;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:800;
cursor:pointer;
}

.exam{
display:none;
max-width:1200px;
margin:40px auto;
padding:0 5%;
grid-template-columns:1fr 300px;
gap:25px;
}

.panel{
background:var(--card);
padding:35px;
border-radius:20px;
border:1px solid var(--border);
}

.sidebar{
background:var(--glass);
padding:20px;
border-radius:20px;
border:1px solid var(--border);
}

.timer{
font-size:2rem;
text-align:center;
font-weight:800;
margin-bottom:20px;
}

.qmap{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.dot{
height:40px;
background:#1e293b;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.dot.active{
background:var(--accent);
}

.nav-btns{
display:flex;
gap:10px;
margin-top:30px;
}

.nav-btn{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid var(--border);
background:transparent;
color:white;
cursor:pointer;
}

.next{
background:var(--accent);
border:none;
}

</style>
</head>

<body>

<header>

<a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>

<nav class="nav-links">
<a href="ijmbpq.html">Home</a>
<a href="#">Study</a>
<a href="#">Exam</a>
<a href="#">Upgrade</a>
</nav>

<div class="hamburger" id="hamburger">
<div></div>
<div></div>
<div></div>
</div>

</header>

<a href="ijmbpq.html" class="back-btn">← Back</a>

<div class="setup" id="setup">

<h1 style="margin-bottom:20px">Exam Parameters</h1>

<div class="card">

<div class="grid">

<div>
<label>Subject</label>
<select id="subject">
<option>Physics</option>
<option>Chemistry</option>
<option>Economics</option>
</select>
</div>

<div>
<label>Year</label>
<select id="year"></select>
</div>

<div>
<label>Paper</label>
<select id="paper">
<option>I</option>
<option>II</option>
</select>
</div>

<div>
<label>Section</label>
<select id="section">
<option>A</option>
<option>B</option>
</select>
</div>

</div>

<div class="grid">

<div>
<label>Questions</label>
<input type="number" id="qAmount" value="10" min="1">
</div>

<div>
<label>Timer (minutes)</label>
<input type="number" id="examTime" value="30" min="1">
</div>

</div>

<button class="btn" onclick="startExam()">Start Exam</button>

</div>
</div>


<div class="exam" id="exam">

<div class="panel">

<h2 id="qTitle">Question</h2>

<div id="questionBox" style="margin-top:20px;font-size:1.3rem"></div>

<div class="nav-btns">
<button class="nav-btn" onclick="changeQ(-1)">Previous</button>
<button class="nav-btn next" onclick="changeQ(1)">Next</button>
</div>

</div>

<div class="sidebar">

<div class="timer" id="timer">00:00</div>

<div class="qmap" id="qmap"></div>

<button class="btn" style="margin-top:20px;background:var(--success)" onclick="submitExam()">Submit</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
databaseURL:"https://ijmb-portal-default-rtdb.firebaseio.com"
});

const db=firebase.database()

const year=document.getElementById("year")

for(let y=2026;y>=2009;y--){
let o=document.createElement("option")
o.value=y
o.innerText=y
year.appendChild(o)
}

let questions=[]
let index=0
let timerInterval

async function startExam(){

const sub=document.getElementById("subject").value
const yr=document.getElementById("year").value
const pap=document.getElementById("paper").value
const sec=document.getElementById("section").value
const limit=parseInt(document.getElementById("qAmount").value)

const snap=await db.ref(`questions/${sub}/${yr}/${pap}/${sec}`).once("value")

if(!snap.exists()){
alert("No questions found")
return
}

questions=[]
snap.forEach(c=>{
questions.push(c.val())
})

questions=questions.slice(0,limit)

document.getElementById("setup").style.display="none"
document.getElementById("exam").style.display="grid"

buildMap()

startTimer(document.getElementById("examTime").value)

render()

}

function buildMap(){

const map=document.getElementById("qmap")
map.innerHTML=""

questions.forEach((q,i)=>{

map.innerHTML+=`<div class="dot" id="d${i}" onclick="jump(${i})">${i+1}</div>`

})

}

function render(){

const q=questions[index]

const text=q.text||q.question||q.q||"Question format error"

document.getElementById("questionBox").innerHTML=text

document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"))

document.getElementById("d"+index).classList.add("active")

}

function changeQ(n){

let next=index+n

if(next>=0 && next<questions.length){

index=next
render()

}

}

function jump(i){

index=i
render()

}

function startTimer(min){

let sec=min*60

timerInterval=setInterval(()=>{

let m=Math.floor(sec/60)
let s=sec%60

document.getElementById("timer").innerText=
`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`

sec--

if(sec<0){

clearInterval(timerInterval)
submitExam()

}

},1000)

}

function submitExam(){

clearInterval(timerInterval)

alert("Exam submitted")

location.href="ijmbpq.html"

}


const hamburger=document.getElementById("hamburger")
const nav=document.querySelector(".nav-links")

hamburger.onclick=()=>{
nav.classList.toggle("active")
hamburger.classList.toggle("open")
}

</script>

</body>
</html>
