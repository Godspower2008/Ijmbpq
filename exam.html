<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Hall | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --border: rgba(99, 102, 241, 0.2); 
            --accent: #6366f1; --text: #f8fafc; --text-dim: #94a3b8; 
            --success: #10b981; --warning: #f59e0b; --btn-red: #ef4444;
            --overlay: rgba(2, 6, 23, 0.98);
        }

        body.light-mode {
            --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; 
            --text: #0f172a; --text-dim: #64748b; --accent: #4f46e5;
            --overlay: rgba(255, 255, 255, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.3s; }

        /* --- HEADER --- */
        header {
            height: 70px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 5%;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 10px; }
        .logo { font-weight: 800; font-size: 1.1rem; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }

        .icon-btn {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }

        .profile-btn { 
            width: 40px; height: 40px; border-radius: 12px; border: 2px solid var(--accent); 
            cursor: pointer; padding: 2px; background: var(--bg);
        }
        .profile-btn img { width: 100%; height: 100%; border-radius: 8px; }

        /* --- CONTENT WRAPPER --- */
        main { padding-top: 85px; height: 100vh; overflow-y: auto; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 5% 100px 5%; }

        /* --- BACK LINK --- */
        .back-area { margin-bottom: 20px; }
        .back-link { color: var(--text-dim); font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }

        /* --- CARDS --- */
        .mode-card {
            background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border);
            cursor: pointer; transition: 0.3s; margin-bottom: 15px;
        }
        .mode-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        /* --- EXAM WORKSPACE --- */
        #examWorkspace { 
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            grid-template-columns: 1fr 320px; padding-top: 70px;
        }
        .question-area { padding: 40px 8%; overflow-y: auto; padding-bottom: 120px; }
        .sidebar { background: var(--card); border-left: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        
        .option { 
            background: var(--card); border: 1px solid var(--border); padding: 18px; 
            border-radius: 15px; cursor: pointer; display: flex; align-items: center; 
            gap: 15px; margin-bottom: 12px; font-weight: 600;
        }
        .option.selected { border-color: var(--accent); background: var(--accent); color: white; }

        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .q-num { 
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; 
        }
        .q-num.active { border: 2px solid var(--accent); color: var(--accent); }
        .q-num.answered { background: var(--accent); color: white; border: none; }

        /* --- MOBILE EXAM NAV --- */
        .mobile-exam-nav {
            display: none; position: fixed; bottom: 0; width: 100%; background: var(--card);
            padding: 15px 5%; border-top: 1px solid var(--border); grid-template-columns: 1fr 1fr 1fr; gap: 10px;
        }

        @media (max-width: 900px) {
            #examWorkspace { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .mobile-exam-nav { display: grid; }
        }

        /* --- SIDE NAV --- */
        #sideNav {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: var(--card); z-index: 3000; transition: 0.4s; padding: 30px 20px;
        }
        #sideNav.open { left: 0; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="toggleNav()"><i class="fa-solid fa-bars-staggered"></i></button>
            <a href="#" class="logo">IJMB<span>PRO</span></a>
        </div>
        <div class="header-right">
            <div id="timer" style="display:none; color:var(--warning); font-weight:800; background:rgba(245,158,11,0.1); padding:5px 12px; border-radius:8px;">60:00</div>
            <div class="profile-btn" onclick="openProfile()">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" id="headerAvatar">
            </div>
        </div>
    </header>

    <nav id="sideNav">
        <h2 class="logo" style="margin-bottom:30px;">MENU</h2>
        <a href="ijmbpq.html" style="text-decoration:none; color:var(--text); display:block; padding:15px 0; font-weight:700;">Library</a>
        <a href="#" onclick="location.reload()" style="text-decoration:none; color:var(--btn-red); display:block; padding:15px 0; font-weight:700;">Reset Hall</a>
    </nav>

    <main id="mainContent">
        <div class="container">
            <div class="back-area">
                <div class="back-link" onclick="goBack()">
                    <i class="fa-solid fa-arrow-left"></i> GO BACK
                </div>
            </div>

            <div id="view-selection" class="active">
                <h1 style="margin-bottom:20px;">Exam Hall</h1>
                <div class="mode-card" onclick="showSetup('standard')">
                    <i class="fa-solid fa-graduation-cap" style="color:var(--accent)"></i>
                    <h3>Standard Exam</h3>
                    <p>Full subject combinations and timing.</p>
                </div>
                <div class="mode-card" onclick="showSetup('cbt')">
                    <i class="fa-solid fa-bolt" style="color:var(--warning)"></i>
                    <h3>CBT Simulator</h3>
                    <p>Fast single-subject drill.</p>
                </div>
            </div>

            <div id="view-setup" style="display:none;">
                <h2 id="setupTitle" style="margin-bottom:20px;">Setup</h2>
                <div style="background:var(--card); padding:25px; border-radius:24px; border:1px solid var(--border);">
                    <select id="subSelect" style="width:100%; padding:15px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; font-weight:600;">
                        <option>Physics, Chemistry, Maths</option>
                        <option>Government, Literature, Economics</option>
                    </select>
                    <button onclick="startExam()" style="width:100%; padding:20px; border-radius:50px; background:var(--accent); color:white; border:none; font-weight:800;">START SESSION</button>
                </div>
            </div>
        </div>
    </main>

    <div id="examWorkspace">
        <section class="question-area">
            <span id="qIdx" style="font-weight:800; color:var(--accent);">QUESTION 1</span>
            <h2 id="qText" style="margin:20px 0; line-height:1.4;">Loading question...</h2>
            <div id="options">
                <div class="option" onclick="pick('A')"><div style="width:25px;">A</div> <span id="optA">Option A</span></div>
                <div class="option" onclick="pick('B')"><div style="width:25px;">B</div> <span id="optB">Option B</span></div>
                <div class="option" onclick="pick('C')"><div style="width:25px;">C</div> <span id="optC">Option C</span></div>
                <div class="option" onclick="pick('D')"><div style="width:25px;">D</div> <span id="optD">Option D</span></div>
            </div>
        </section>

        <aside class="sidebar">
            <h4 style="font-size:0.7rem; color:var(--text-dim); letter-spacing:1px;">NAVIGATOR</h4>
            <div class="q-grid" id="qGrid"></div>
            <button onclick="finish()" style="margin-top:auto; padding:18px; border-radius:15px; background:var(--accent); color:white; border:none; font-weight:800;">SUBMIT EXAM</button>
        </aside>

        <div class="mobile-exam-nav">
            <button class="icon-btn" style="width:100%" onclick="prev()"><i class="fa-solid fa-chevron-left"></i></button>
            <button onclick="finish()" style="background:var(--accent); color:white; border:none; border-radius:12px; font-weight:800;">SUBMIT</button>
            <button class="icon-btn" style="width:100%" onclick="next()"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <script>
        let current = 0;
        let answers = {};
        const questions = [
            { q: "What is the result of 5 + 5?", a: "8", b: "10", c: "12", d: "15", correct: "B" },
            { q: "Which is a noble gas?", a: "Oxygen", b: "Nitrogen", c: "Helium", d: "Hydrogen", correct: "C" },
            { q: "SI unit of Force?", a: "Joule", b: "Watt", c: "Newton", d: "Pascal", correct: "C" }
        ];

        function toggleNav() { document.getElementById('sideNav').classList.toggle('open'); }

        function goBack() {
            if(document.getElementById('view-setup').style.display === 'block') {
                document.getElementById('view-setup').style.display = 'none';
                document.getElementById('view-selection').style.display = 'block';
            } else {
                window.location.href = 'ijmbpq.html';
            }
        }

        function showSetup(type) {
            document.getElementById('view-selection').style.display = 'none';
            document.getElementById('view-setup').style.display = 'block';
            document.getElementById('setupTitle').innerText = type === 'standard' ? 'Standard Exam Setup' : 'CBT Drill Setup';
        }

        function startExam() {
            document.getElementById('examWorkspace').style.display = 'grid';
            document.getElementById('timer').style.display = 'block';
            loadQ(0);
        }

        function loadQ(i) {
            current = i;
            document.getElementById('qIdx').innerText = `QUESTION ${i + 1}`;
            document.getElementById('qText').innerText = questions[i].q;
            document.getElementById('optA').innerText = questions[i].a;
            document.getElementById('optB').innerText = questions[i].b;
            document.getElementById('optC').innerText = questions[i].c;
            document.getElementById('optD').innerText = questions[i].d;

            // Mark selected
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            if(answers[i]) {
                const idx = ["A","B","C","D"].indexOf(answers[i]);
                document.querySelectorAll('.option')[idx].classList.add('selected');
            }
            renderGrid();
        }

        function pick(val) {
            answers[current] = val;
            loadQ(current);
        }

        function renderGrid() {
            const grid = document.getElementById('qGrid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const div = document.createElement('div');
                div.className = `q-num ${i === current ? 'active' : ''} ${answers[i] ? 'answered' : ''}`;
                div.innerText = i + 1;
                div.onclick = () => loadQ(i);
                grid.appendChild(div);
            });
        }

        function next() { if(current < questions.length - 1) loadQ(current + 1); }
        function prev() { if(current > 0) loadQ(current - 1); }

        function finish() {
            if(confirm("Are you sure you want to submit?")) {
                alert("Exam Submitted! Check your results on the dashboard.");
                location.reload();
            }
        }
    </script>
</body>
</html>
