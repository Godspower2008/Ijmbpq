<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Hall | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Exam Specific Layout Override */
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .exam-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            flex-grow: 1;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Left Side: Question Area */
        .question-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .q-text { font-size: 1.2rem; font-weight: 600; line-height: 1.6; margin-bottom: 30px; }

        .options-list { display: flex; flex-direction: column; gap: 15px; }

        .option {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
        .option.selected { border-color: var(--accent); background: var(--accent); color: white; }

        .option-letter {
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.8rem;
        }

        /* Right Side: Sidebar */
        .exam-sidebar { display: flex; flex-direction: column; gap: 20px; }

        .timer-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        #timer { font-size: 2rem; font-weight: 800; color: #fbbf24; }

        .nav-grid {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .q-nav-btn {
            aspect-ratio: 1;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .q-nav-btn.answered { background: var(--accent); color: white; border: none; }
        .q-nav-btn.current { border: 2px solid var(--accent); color: var(--accent); }

        /* Action Buttons */
        .action-btns { margin-top: auto; display: flex; gap: 15px; padding-top: 30px; }
        .btn { padding: 12px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; }
        .btn-next { background: var(--accent); color: white; flex-grow: 1; }
        .btn-prev { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
        .btn-submit { background: #ef4444; color: white; }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 900px) {
            .exam-container { grid-template-columns: 1fr; overflow-y: auto; }
            body { overflow-y: auto; }
            .exam-sidebar { order: -1; } /* Timer at top on mobile */
            .nav-grid { grid-template-columns: repeat(10, 1fr); }
            .question-box { padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        <div style="font-weight: 700; font-size: 0.9rem; color: var(--text-dim);">Mathematics | Exam Mode</div>
        <button class="btn btn-submit" onclick="finishExam()">Submit</button>
    </header>

    <div class="exam-container">
        <div class="question-box">
            <div class="question-header">
                <span style="font-weight: 800; color: var(--accent);">Question 12 of 50</span>
                <i class="fa-regular fa-bookmark" style="cursor: pointer;"></i>
            </div>

            <div class="q-text">
                If $2x + 5 = 15$, what is the value of $x^2$?
            </div>

            <div class="options-list">
                <div class="option" onclick="selectOption(this)">
                    <div class="option-letter">A</div>
                    <div class="option-text">25</div>
                </div>
                <div class="option selected" onclick="selectOption(this)">
                    <div class="option-letter">B</div>
                    <div class="option-text">100</div>
                </div>
                <div class="option" onclick="selectOption(this)">
                    <div class="option-letter">C</div>
                    <div class="option-text">50</div>
                </div>
                <div class="option" onclick="selectOption(this)">
                    <div class="option-letter">D</div>
                    <div class="option-text">225</div>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn btn-prev">Previous</button>
                <button class="btn btn-next">Save & Next</button>
            </div>
        </div>

        <div class="exam-sidebar">
            <div class="timer-card">
                <div style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px;">Time Remaining</div>
                <div id="timer">59:42</div>
            </div>

            <div class="nav-grid">
                <script>
                    for(let i=1; i<=50; i++) {
                        let status = i < 12 ? 'answered' : (i == 12 ? 'current' : '');
                        document.write(`<button class="q-nav-btn ${status}">${i}</button>`);
                    }
                </script>
            </div>

            <button class="card" style="padding: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="toggleCalc()">
                <i class="fa-solid fa-calculator"></i> Open Calculator
            </button>
        </div>
    </div>

    <script>
        function selectOption(el) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        }

        function finishExam() {
            if(confirm("Are you sure you want to end this exam? Your progress will be saved.")) {
                location.href = 'results.html';
            }
        }

        // Simple Timer Logic
        let time = 3600; 
        setInterval(() => {
            time--;
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            document.getElementById('timer').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    </script>
</body>
</html>
