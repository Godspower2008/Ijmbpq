<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam | IJMB PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --glass:rgba(30,41,59,0.8);
  --border:rgba(99,102,241,0.2);
  --accent:#6366f1;
  --text:#f8fafc;
  --text-dim:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:var(--bg);color:var(--text);}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 5%;background:var(--glass);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;}
.logo{font-weight:800;font-size:1.2rem;color:var(--text);text-decoration:none;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:20px;}
.nav-links a{color:var(--text-dim);text-decoration:none;font-weight:600;}
.nav-links a:hover{color:var(--accent);}
.hamburger{display:none;flex-direction:column;width:28px;cursor:pointer;}
.hamburger div{height:3px;background:var(--text);margin:4px 0;transition:0.3s;}
main{max-width:1200px;margin:40px auto;padding:0 5%;}
button.back-btn, button#loadQuestions{margin-bottom:20px;padding:10px 18px;border:none;border-radius:8px;background:var(--accent);color:white;cursor:pointer;font-weight:600;}
.question-card{background:var(--card);padding:20px;border-radius:15px;margin-bottom:20px;}
.question-card h3{font-size:1rem;margin-bottom:10px;}
.question-card p{margin-bottom:10px;color:var(--text);}
.question-card .solution{color:var(--accent);font-style:italic;}
select{padding:10px;border-radius:8px;border:1px solid var(--border);margin-right:10px;background:#0f172a;color:white;}
@media(max-width:768px){
  .nav-links{display:none;}
  .hamburger{display:flex;}
}
.nav-links.active{display:flex;flex-direction:column;gap:15px;background:var(--glass);position:absolute;top:60px;right:5%;padding:15px;border-radius:12px;}
.hamburger.open div:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open div:nth-child(2){opacity:0;}
.hamburger.open div:nth-child(3){transform:rotate(-45deg) translate(6px,-6px);}
</style>
</head>
<body>

<header>
  <a href="dashboard.html" class="logo">IJMB<span>PRO</span></a>
  <nav class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="study.html">Study</a>
    <a href="exam.html">Exam Mode</a>
    <a href="pricing.html">Upgrade</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
</header>

<main>
  <button class="back-btn" onclick="goBack()">← Back</button>

  <h1 style="margin-bottom:20px;">Select Exam Parameters</h1>

  <div style="margin-bottom:20px;">
    <select id="subject">
      <option value="Physics">Physics</option>
      <option value="Chemistry">Chemistry</option>
      <option value="Biology">Biology</option>
      <option value="Economics">Economics</option>
      <option value="Mathematics">Mathematics</option>
    </select>

    <select id="year"></select>

    <select id="paper">
      <option value="I">Paper I</option>
      <option value="II">Paper II</option>
      <option value="III">Paper III</option>
    </select>

    <select id="section">
      <option value="A">Section A</option>
      <option value="B">Section B</option>
      <option value="C">Section C</option>
      <option value="D">Section D</option>
    </select>

    <button id="loadQuestions">Load Questions</button>
  </div>

  <div id="questions-container"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
// --- Animated Nav ---
document.addEventListener('DOMContentLoaded', () => {
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.querySelector('.nav-links');
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    hamburger.classList.toggle('open');
  });
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('active');
      hamburger.classList.remove('open');
    });
  });

  // Populate years
  const yearSelect = document.getElementById('year');
  for(let y=2026; y>=2009; y--){
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
  }
});

// --- Go Back ---
function goBack(defaultPage='dashboard.html'){
  if(history.length>1){history.back();}
  else{window.location.href=defaultPage;}
}

// --- Load Questions ---
async function loadExam(subject, year, paper, section){
  const container = document.getElementById('questions-container');
  container.innerHTML = 'Loading questions...';
  try{
    const snapshot = await db.collection('questions')
      .doc(subject).collection(year).doc(paper).collection(section).get();

    if(snapshot.empty){
      container.innerHTML = '<p>No questions found for this selection.</p>';
      return;
    }

    container.innerHTML = '';
    let count=1;
    snapshot.forEach(doc=>{
      const data = doc.data();
      const card = document.createElement('div');
      card.classList.add('question-card');
      card.innerHTML = `<h3>Question ${count}</h3>
                        <p>${data.text}</p>
                        ${data.solution? `<p class="solution">Solution: ${data.solution}</p>`: ''}`;
      container.appendChild(card);
      MathJax.typesetPromise([card]);
      count++;
    });
  } catch(err){
    container.innerHTML = `<p>Error loading questions: ${err}</p>`;
  }
}

// --- Load Button Handler ---
document.getElementById('loadQuestions').addEventListener('click', ()=>{
  const subject = document.getElementById('subject').value;
  const year = document.getElementById('year').value;
  const paper = document.getElementById('paper').value;
  const section = document.getElementById('section').value;
  loadExam(subject, year, paper, section);
});

// --- Auth Check ---
auth.onAuthStateChanged(user=>{
  if(!user) window.location.href='landing.html';
});
</script>

</body>
</html>
