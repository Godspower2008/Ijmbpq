<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Mode | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --glass: rgba(30, 41, 59, 0.8);
            --border: rgba(99, 102, 241, 0.2); --accent: #6366f1; --text: #f8fafc;
            --text-dim: #94a3b8; --success: #10b981; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
        }

        /* --- HEADER & NAV (ALWAYS VISIBLE) --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--glass); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .hamburger { display: none; flex-direction: column; justify-content: space-around; width: 24px; height: 18px; cursor: pointer; }
        .hamburger div { height: 2px; background: var(--text); border-radius: 10px; transition: 0.3s; }

        .global-back-btn {
            position: fixed; top: 85px; left: 20px; z-index: 900; padding: 10px 16px; 
            border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: white; 
            font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .global-back-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* --- SETUP VIEW --- */
        .setup-container { max-width: 850px; margin: 100px auto 50px; padding: 0 20px; text-align: center; }
        .setup-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 30px; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .input-box label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
        select, input { width: 100%; background: #1e293b; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 12px; font-weight: 600; outline: none; }
        .btn-proceed { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }

        /* --- EXAM WORKSPACE (HIDDEN INITIALLY) --- */
        #examView { display: none; grid-template-columns: 1fr 340px; gap: 30px; max-width: 1400px; margin: 40px auto; padding: 0 5%; }
        .question-panel { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 45px; min-height: 550px; }
        .sidebar { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 24px; position: sticky; top: 100px; height: fit-content; }
        .timer-box { font-size: 2.8rem; font-weight: 800; text-align: center; margin-bottom: 20px; font-family: monospace; }
        .q-map { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .dot { height: 45px; background: #1e293b; border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; }
        .dot.active { background: var(--accent); }
        .dot.flagged { border: 2px solid var(--warning); color: var(--warning); }
        .nav-btns { display: flex; gap: 15px; margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border); }
        .btn-nav { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: white; cursor: pointer; font-weight: 700; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .loader { border: 5px solid #1e293b; border-top: 5px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 900px) {
            .hamburger { display: flex; }
            .nav-links { display: none; }
            #examView { grid-template-columns: 1fr; }
            .sidebar { position: relative; top: 0; }
        }
    </style>
</head>
<body>

<header>
    <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
    <nav class="nav-links">
        <a href="ijmbpq.html">Dashboard</a>
        <a href="study.html">Study</a>
        <a href="exam.html">Exam Mode</a>
        <a href="pricing.html">Upgrade</a>
    </nav>
    <div class="hamburger" onclick="alert('Menu clicked')">
        <div></div><div></div><div></div>
    </div>
</header>

<button class="global-back-btn" onclick="window.location.href='ijmbpq.html'">
    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
</button>

<main>
    <div id="setupView" class="setup-container">
        <h1 style="margin-bottom:10px;">Exam Parameters</h1>
        <p style="color:var(--text-dim); margin-bottom:30px;">Customize your session before clicking proceed.</p>
        <div class="setup-card">
            <div class="grid">
                <div class="input-box"><label>Subject</label>
                    <select id="subject"><option>Physics</option><option>Chemistry</option><option>Economics</option></select>
                </div>
                <div class="input-box"><label>Year</label><select id="yearSelect"></select></div>
                <div class="input-box"><label>Paper</label>
                    <select id="paper"><option>I</option><option>II</option></select>
                </div>
                <div class="input-box"><label>Section</label>
                    <select id="section"><option>A</option><option>B</option></select>
                </div>
            </div>
            <div class="grid" style="border-top: 1px solid var(--border); padding-top:25px;">
                <div class="input-box"><label>No. of Questions</label><input type="number" id="qAmount" value="15"></div>
                <div class="input-box"><label>Timer (Mins)</label><input type="number" id="examTime" value="45"></div>
            </div>
            <button class="btn-proceed" onclick="proceedToExam()">Proceed <i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <div id="examView">
        <div class="question-panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
                <h2 id="displaySub" style="color:var(--accent); font-size:1rem; text-transform:uppercase;">SUBJECT</h2>
                <span id="qCount" style="color:var(--text-dim); font-weight:700;">Question -- of --</span>
            </div>
            <div id="questions-container" style="font-size:1.3rem; min-height:300px;"></div>
            <div class="nav-btns">
                <button class="btn-nav" onclick="changeQ(-1)">← Previous</button>
                <button class="btn-nav" style="color:var(--warning); border-color:var(--warning);" onclick="toggleFlag()">Flag</button>
                <button class="btn-nav" style="background:var(--accent); border:none;" onclick="changeQ(1)">Next →</button>
            </div>
        </div>

        <aside class="sidebar">
            <p style="text-align:center; font-size:0.7rem; font-weight:800; color:var(--text-dim); margin-bottom:10px;">TIME REMAINING</p>
            <div class="timer-box" id="timer">00:00:00</div>
            <div class="q-map" id="qMap"></div>
            <button class="btn-proceed" style="background:var(--success); margin-top:30px;" onclick="location.reload()">Finish Exam</button>
        </aside>
    </div>
</main>

<div class="loading-overlay" id="loading"><div class="loader"></div></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
        databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com"
    });
    const db = firebase.database();

    const ys = document.getElementById('yearSelect');
    for(let y=2026; y>=2009; y--) {
        let o = document.createElement('option'); o.value=y; o.innerText=y; ys.appendChild(o);
    }

    let questions = [], currentIndex = 0, timerInterval, flagged = new Set();

    async function proceedToExam() {
        const sub = document.getElementById('subject').value;
        const yr = document.getElementById('yearSelect').value;
        const pap = document.getElementById('paper').value;
        const sec = document.getElementById('section').value;
        const limit = parseInt(document.getElementById('qAmount').value);

        document.getElementById('loading').style.display = 'flex';

        const snap = await db.ref(`questions/${sub}/${yr}/${pap}/${sec}`).once('value');
        if(!snap.exists()) {
            document.getElementById('loading').style.display = 'none';
            return alert("No data found");
        }

        questions = [];
        snap.forEach(c => questions.push(c.val()));
        questions = questions.slice(0, limit);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('setupView').style.display = 'none';
        document.getElementById('examView').style.display = 'grid';
        
        document.getElementById('displaySub').innerText = sub + " " + yr;
        const map = document.getElementById('qMap'); map.innerHTML = '';
        questions.forEach((_, i) => {
            map.innerHTML += `<div class="dot" id="dot-${i}" onclick="jumpTo(${i})">${i+1}</div>`;
        });

        startTimer(parseInt(document.getElementById('examTime').value));
        render();
    }

    function render() {
        const q = questions[currentIndex];
        document.getElementById('questions-container').innerHTML = q.text;
        document.getElementById('qCount').innerText = `Question ${currentIndex+1} of ${questions.length}`;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        document.getElementById(`dot-${currentIndex}`).classList.add('active');
        if(window.MathJax) MathJax.typesetPromise();
    }

    function changeQ(dir) { let n = currentIndex + dir; if(n >= 0 && n < questions.length) { currentIndex = n; render(); } }
    function jumpTo(i) { currentIndex = i; render(); }
    function toggleFlag() {
        const dot = document.getElementById(`dot-${currentIndex}`);
        if(flagged.has(currentIndex)) { flagged.delete(currentIndex); dot.classList.remove('flagged'); }
        else { flagged.add(currentIndex); dot.classList.add('flagged'); }
    }
    function startTimer(mins) {
        let sec = mins * 60;
        timerInterval = setInterval(() => {
            let h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(--sec < 0) { clearInterval(timerInterval); location.reload(); }
        }, 1000);
    }
</script>
</body>
</html>
