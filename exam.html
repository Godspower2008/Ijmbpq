<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Hall | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --border: rgba(99, 102, 241, 0.2); 
            --accent: #6366f1; --text: #f8fafc; --text-dim: #94a3b8; 
            --success: #10b981; --warning: #f59e0b; --btn-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- MAIN HEADER --- */
        header {
            height: 65px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 4%;
            position: fixed; top: 0; width: 100%; z-index: 2000;
        }
        
        /* --- SUB NAVIGATION (BACK BUTTON ROW) --- */
        .sub-nav {
            height: 50px; background: var(--bg); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 4%;
            position: fixed; top: 65px; width: 100%; z-index: 1900;
        }

        .header-left, .header-right { display: flex; align-items: center; gap: 12px; }

        .icon-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .back-btn-text {
            color: var(--text-dim); text-decoration: none; font-weight: 700; 
            font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer;
            transition: 0.2s;
        }
        .back-btn-text:hover { color: var(--accent); }

        .profile-circle {
            width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent);
            overflow: hidden; background: #1e293b;
        }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CALCULATOR --- */
        #calcBox {
            position: fixed; top: 125px; right: 4%; width: 260px; background: var(--card);
            border: 1px solid var(--border); border-radius: 20px; padding: 15px; z-index: 3000;
            display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .calc-screen { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            padding: 12px; color: white; text-align: right; font-size: 1.2rem; 
            border-radius: 10px; margin-bottom: 10px; outline: none;
        }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .calc-grid button { 
            padding: 12px; border-radius: 8px; border: none; 
            background: #1e293b; color: white; font-weight: 700; cursor: pointer; 
        }
        .calc-grid button:active { transform: scale(0.95); }

        /* --- SIDE NAV --- */
        #sideNav {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: var(--card); z-index: 3000; transition: 0.4s; padding: 30px 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #sideNav.open { left: 0; }
        .nav-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 2500;
        }

        /* --- CONTENT AREA --- */
        main { padding-top: 130px; height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 5%; }

        .theory-field { 
            width: 100%; min-height: 300px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border);
            border-radius: 20px; color: var(--text); padding: 20px; font-size: 1.1rem; line-height: 1.6;
            resize: none; outline: none; margin-top: 20px;
        }
        .theory-field:focus { border-color: var(--accent); }

        .card { 
            background: var(--card); padding: 25px; border-radius: 24px; 
            border: 1px solid var(--border); cursor: pointer; margin-bottom: 15px; 
            transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--card); 
            padding: 15px 5%; border-top: 1px solid var(--border); 
            display: none; justify-content: space-between; gap: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="navOverlay" class="nav-overlay" onclick="toggleNav()"></div>

    <header>
        <div class="header-left">
            <button class="icon-btn" onclick="toggleNav()"><i class="fa-solid fa-bars-staggered"></i></button>
            <div style="font-weight: 800; font-size: 1rem;">IJMB<span style="color:var(--accent)">PRO</span></div>
        </div>

        <div class="header-right">
            <div id="examTimer" style="display:none; font-weight: 800; color: var(--warning); margin-right: 10px; font-variant-numeric: tabular-nums;">60:00</div>
            
            <div id="userProfile" class="profile-circle">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix">
            </div>
            
            <button id="calcTool" class="icon-btn" style="display:none;" onclick="toggleCalc()"><i class="fa-solid fa-calculator"></i></button>
        </div>
    </header>

    <div class="sub-nav">
        <div class="back-btn-text" id="backBtn" onclick="handleBack()">
            <i class="fa-solid fa-arrow-left"></i> 
            <span id="backLabel">GO BACK</span>
        </div>
    </div>

    <nav id="sideNav">
        <h2 style="margin-bottom:20px;">HALL MENU</h2>
        <a href="ijmbpq.html" style="color:white; text-decoration:none; display:block; padding:15px 0; border-bottom: 1px solid var(--border);">Past Questions</a>
        <a href="#" onclick="handleBack(); toggleNav();" style="color:var(--btn-red); text-decoration:none; display:block; padding:15px 0;">Exit Hall</a>
    </nav>

    <div id="calcBox">
        <input type="text" id="calcDisplay" class="calc-screen" readonly placeholder="0">
        <div class="calc-grid">
            <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button><button onclick="calcIn('/')">/</button>
            <button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button><button onclick="calcIn('6')">6</button><button onclick="calcIn('*')">*</button>
            <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button><button onclick="calcIn('-')">-</button>
            <button onclick="calcClr()" style="color:var(--btn-red)">C</button><button onclick="calcIn('0')">0</button><button onclick="calcRes()" style="background:var(--accent)">=</button><button onclick="calcIn('+')">+</button>
        </div>
    </div>

    <main id="mainScroll">
        <div class="container" id="homeView">
            <h1 style="margin-bottom:20px;">Exam Hall</h1>
            <div class="card" onclick="openSetup()">
                <i class="fa-solid fa-file-signature" style="color:var(--accent); font-size:1.5rem; margin-bottom:10px; display:block;"></i>
                <h3>Standard Theory Mode</h3>
                <p style="color:var(--text-dim); font-size:0.8rem;">Practice written examinations with a timer.</p>
            </div>
        </div>

        <div class="container" id="setupView" style="display:none;">
            <h2>Configure Exam</h2>
            <div class="card" style="cursor:default; margin-top:20px;">
                <label style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; display: block;">SELECT SUBJECT</label>
                <select id="subject" style="width:100%; padding:15px; background:var(--bg); color:white; border:1px solid var(--border); border-radius:12px; margin-bottom:20px; outline: none;">
                    <option>Mathematics Theory</option>
                    <option>Physics Theory</option>
                    <option>Chemistry Theory</option>
                </select>
                <button onclick="startExam()" style="width:100%; padding:18px; border-radius:50px; background:var(--accent); color:white; border:none; font-weight:800; cursor: pointer;">START EXAM</button>
            </div>
        </div>

        <div class="container" id="examWorkspace" style="display:none;">
            <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--border);">
                <span style="color:var(--accent); font-weight:800; font-size:0.75rem;">QUESTION 1</span>
                <h3 style="margin-top:5px; line-height:1.4;">Evaluate the integral of $cos(x)$ from $0$ to $\pi/2$.</h3>
            </div>
            <textarea id="answerArea" class="theory-field" placeholder="Type your full working and answer here..."></textarea>
            <button onclick="submitExam()" style="width:100%; padding:20px; border-radius:15px; background:var(--success); color:white; border:none; font-weight:800; margin-top:20px; cursor: pointer;">SUBMIT PAPER</button>
        </div>
    </main>

    <div class="bottom-nav" id="examFooter">
        <button class="icon-btn" style="width:48%; height:50px; border-radius: 12px;">PREVIOUS</button>
        <button class="icon-btn" style="width:48%; height:50px; border-radius: 12px; background: var(--accent);">NEXT</button>
    </div>

    <script>
        let inExam = false;
        let timerInterval;

        function toggleNav() {
            const nav = document.getElementById('sideNav');
            const overlay = document.getElementById('navOverlay');
            const isOpen = nav.classList.toggle('open');
            overlay.style.display = isOpen ? 'block' : 'none';
        }

        function toggleCalc() { 
            const calc = document.getElementById('calcBox');
            calc.style.display = calc.style.display === 'block' ? 'none' : 'block';
        }

        function handleBack() {
            if (inExam) {
                if (confirm("Are you sure you want to quit? Your progress will be lost.")) {
                    location.reload();
                }
            } else if (document.getElementById('setupView').style.display === 'block') {
                document.getElementById('setupView').style.display = 'none';
                document.getElementById('homeView').style.display = 'block';
            } else {
                window.location.href = 'ijmbpq.html';
            }
        }

        function openSetup() {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('setupView').style.display = 'block';
        }

        function startExam() {
            inExam = true;
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('examWorkspace').style.display = 'block';
            document.getElementById('examFooter').style.display = 'flex';
            document.getElementById('examTimer').style.display = 'block';
            
            // UI Updates
            document.getElementById('userProfile').style.display = 'none';
            document.getElementById('calcTool').style.display = 'flex';
            document.getElementById('backLabel').innerText = "EXIT EXAM";
            document.getElementById('backBtn').style.color = "var(--btn-red)";
            
            startTimer(60); // 60 minutes
        }

        function startTimer(minutes) {
            let seconds = minutes * 60;
            const timerDisplay = document.getElementById('examTimer');
            
            timerInterval = setInterval(() => {
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                timerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                
                if (seconds <= 300) timerDisplay.style.color = "var(--btn-red)"; // Warning at 5 mins
                
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up! Your paper is being submitted.");
                    location.reload();
                }
                seconds--;
            }, 1000);
        }

        function submitExam() {
            if(confirm("Do you want to submit your answers?")) {
                alert("Paper submitted successfully!");
                location.reload();
            }
        }

        // Calculator Logic
        const display = document.getElementById('calcDisplay');
        function calcIn(v) { 
            if (display.value === "Error") display.value = "";
            display.value += v; 
        }
        function calcClr() { display.value = ""; }
        function calcRes() {
            try { 
                // Simple eval for demo; in production use a math parser
                display.value = eval(display.value); 
            } catch { 
                display.value = "Error"; 
            }
        }
    </script>
</body>
</html>
