<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IJMB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#020617;
--card:#0f172a;
--glass:rgba(30,41,59,0.7);
--border:rgba(99,102,241,0.2);
--accent:#6366f1;
--text:#f8fafc;
--text-dim:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* ---------- NAVBAR ---------- */

header{
position:sticky;
top:0;
z-index:1000;

display:flex;
align-items:center;
justify-content:space-between;

padding:16px 5%;
background:rgba(15,23,42,0.9);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
}

.logo{
font-weight:800;
font-size:1.2rem;
color:white;
text-decoration:none;
}

.logo span{
color:var(--accent);
}

/* NAV LINKS */

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:var(--text-dim);
font-weight:600;
transition:0.2s;
}

.nav-links a:hover{
color:var(--accent);
}

/* ---------- HAMBURGER ---------- */

.hamburger{
display:none;
flex-direction:column;
cursor:pointer;
gap:5px;
}

.hamburger div{
width:26px;
height:3px;
background:white;
transition:0.35s ease;
transform-origin:center;
}

/* Hamburger → X */

.hamburger.open div:nth-child(1){
transform:rotate(45deg) translate(6px,6px);
}

.hamburger.open div:nth-child(2){
opacity:0;
transform:scale(0);
}

.hamburger.open div:nth-child(3){
transform:rotate(-45deg) translate(6px,-6px);
}

/* ---------- MOBILE MENU ---------- */

@media(max-width:768px){

.nav-links{
position:absolute;
top:70px;
right:5%;

flex-direction:column;
gap:15px;

background:var(--glass);
padding:20px;
border-radius:14px;

display:none;
}

.nav-links.active{
display:flex;
}

.hamburger{
display:flex;
}

}

/* ---------- MAIN AREA ---------- */

main{
max-width:900px;
margin:40px auto;
padding:0 5%;
}

/* BACK BUTTON */

.back-btn{
display:inline-flex;
align-items:center;
gap:8px;

background:var(--card);
border:1px solid var(--border);

padding:10px 18px;
border-radius:12px;

color:white;
font-weight:600;
cursor:pointer;
margin-bottom:25px;

transition:0.2s;
}

.back-btn:hover{
background:var(--accent);
}

</style>
</head>

<body>

<header>

<a href="ijmbpq.html" class="logo">
IJMB<span>PRO</span>
</a>

<nav class="nav-links">

<a href="dashboard.html">Dashboard</a>
<a href="study.html">Study</a>
<a href="exam.html">Exam</a>
<a href="pricing.html">Upgrade</a>
<a href="#">Logout</a>

</nav>

<div class="hamburger" id="hamburger">
<div></div>
<div></div>
<div></div>
</div>

</header>


<main>

<button class="back-btn" onclick="goBack()">← Back</button>

<h1>Exam Page</h1>
<p>This is where your exam content will load.</p>

</main>


<script>

/* NAVBAR TOGGLE */

const hamburger = document.getElementById("hamburger")
const navLinks = document.querySelector(".nav-links")

hamburger.onclick = () => {

navLinks.classList.toggle("active")
hamburger.classList.toggle("open")

}


/* BACK BUTTON */

function goBack(){

if(history.length > 1){
history.back()
}else{
window.location.href="dashboard.html"
}

}

</script>

</body>
</html>
