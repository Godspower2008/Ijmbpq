<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam | IJMB PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --glass:rgba(30,41,59,0.85);
  --border:rgba(99,102,241,0.2);
  --accent:#6366f1;
  --text:#f8fafc;
  --text-dim:#94a3b8;
  --btn-hover:#4f46e5;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:var(--bg);color:var(--text);}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 5%;background:var(--glass);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;}
.logo{font-weight:800;font-size:1.2rem;color:var(--text);text-decoration:none;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:20px;}
.nav-links a{color:var(--text-dim);text-decoration:none;font-weight:600;}
.nav-links a:hover{color:var(--accent);}
.hamburger{display:none;flex-direction:column;width:28px;cursor:pointer;}
.hamburger div{height:3px;background:var(--text);margin:4px 0;transition:0.3s;}
main{max-width:800px;margin:40px auto;padding:0 5%;}
button, select, input[type=number]{cursor:pointer;font-weight:600;}
button.back-btn, button#loadQuestions, button#prevBtn, button#nextBtn, .timer-btn{
  margin:8px 5px 20px 0;padding:10px 18px;border:none;border-radius:8px;background:var(--accent);color:white;transition:0.3s;
}
button.back-btn:hover, button#loadQuestions:hover, button#prevBtn:hover, button#nextBtn:hover, .timer-btn:hover{background:var(--btn-hover);}
.question-card{background:var(--card);padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.question-card h3{font-size:1rem;margin-bottom:10px;}
.question-card p{margin-bottom:10px;color:var(--text);}
.question-card .solution{color:var(--accent);font-style:italic;}
select{padding:10px;border-radius:8px;border:1px solid var(--border);margin-right:10px;background:#0f172a;color:white;}
input[type=range]{width:100%; margin-bottom:10px;}
.timer-btn{font-size:0.9rem;}
.timer-container{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
@media(max-width:768px){
  .nav-links{display:none;}
  .hamburger{display:flex;}
}
.nav-links.active{display:flex;flex-direction:column;gap:15px;background:var(--glass);position:absolute;top:60px;right:5%;padding:15px;border-radius:12px;}
.hamburger.open div:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open div:nth-child(2){opacity:0;}
.hamburger.open div:nth-child(3){transform:rotate(-45deg) translate(6px,-6px);}
</style>
</head>
<body>

<header>
  <a href="dashboard.html" class="logo">IJMB<span>PRO</span></a>
  <nav class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="study.html">Study</a>
    <a href="exam.html">Exam Mode</a>
    <a href="pricing.html">Upgrade</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
</header>

<main>
  <button class="back-btn" onclick="goBack()">← Back</button>
  <h1>Select Exam Parameters</h1>

  <div style="margin-bottom:20px;">
    <select id="subject">
      <option value="Physics">Physics</option>
      <option value="Chemistry">Chemistry</option>
      <option value="Biology">Biology</option>
      <option value="Economics">Economics</option>
      <option value="Mathematics">Mathematics</option>
    </select>
    <select id="year"></select>
    <select id="paper">
      <option value="I">Paper I</option>
      <option value="II">Paper II</option>
      <option value="III">Paper III</option>
    </select>
    <select id="section">
      <option value="A">Section A</option>
      <option value="B">Section B</option>
      <option value="C">Section C</option>
      <option value="D">Section D</option>
    </select>
    <button id="loadQuestions">Load Questions</button>
  </div>

  <div class="timer-container">
    <label for="timeRange">Set Timer (minutes):</label>
    <input type="range" id="timeRange" min="1" max="180" value="30">
    <span id="timeValue">30 min</span>
    <div style="margin-top:5px;">
      <button class="timer-btn" onclick="setTimer(30)">30 min</button>
      <button class="timer-btn" onclick="setTimer(60)">1 hr</button>
      <button class="timer-btn" onclick="setTimer(90)">1 hr 30 min</button>
      <button class="timer-btn" onclick="setTimer(120)">2 hr</button>
      <button class="timer-btn" onclick="setTimer(150)">2 hr 30 min</button>
      <button class="timer-btn" onclick="setTimer(180)">3 hr</button>
    </div>
  </div>

  <div id="questions-container"></div>
  <div style="display:flex;gap:10px;margin-top:10px;">
    <button id="prevBtn">← Previous</button>
    <button id="nextBtn">Next →</button>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyARvoLEDGHPLCOkvxf60Vt4_nd4x_y_ZZU",
  databaseURL: "https://ijmb-portal-default-rtdb.firebaseio.com"
});
const db = firebase.firestore();

// --- Animated Nav ---
document.addEventListener('DOMContentLoaded', () => {
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.querySelector('.nav-links');
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    hamburger.classList.toggle('open');
  });
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('active');
      hamburger.classList.remove('open');
    });
  });

  // Populate years
  const yearSelect = document.getElementById('year');
  for(let y=2026; y>=2009; y--){
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
  }
});

// --- Back button ---
function goBack(){
  if(history.length>1){history.back();}
  else{window.location.href='dashboard.html';}
}

// --- Timer quick buttons ---
const timeRange = document.getElementById('timeRange');
const timeValue = document.getElementById('timeValue');
timeRange.addEventListener('input', ()=>{
  timeValue.textContent = timeRange.value + ' min';
});
function setTimer(mins){
  timeRange.value = mins;
  timeValue.textContent = mins + (mins >= 60 ? ` min` : ' min');
}

// --- Questions ---
let questions = [];
let currentIndex = 0;

document.getElementById('loadQuestions').addEventListener('click', async ()=>{
  const subject = document.getElementById('subject').value;
  const year = document.getElementById('year').value;
  const paper = document.getElementById('paper').value;
  const section = document.getElementById('section').value;

  const container = document.getElementById('questions-container');
  container.innerHTML = 'Loading questions...';
  currentIndex = 0;
  questions = [];

  try {
    const snapshot = await db.collection('questions')
      .doc(subject).collection(year).doc(paper).collection(section).get();

    if(snapshot.empty){
      container.innerHTML = '<p>No questions found for this selection.</p>';
      return;
    }

    snapshot.forEach(doc=>{
      questions.push(doc.data());
    });

    renderQuestion();
  } catch(err){
    container.innerHTML = `<p>Error loading questions: ${err}</p>`;
  }
});

function renderQuestion(){
  const container = document.getElementById('questions-container');
  if(questions.length === 0){
    container.innerHTML = '';
    return;
  }

  const q = questions[currentIndex];
  container.innerHTML = `<div class="question-card">
    <h3>Question ${currentIndex+1} of ${questions.length}</h3>
    <p>${q.text}</p>
    ${q.solution? `<p class="solution">Solution: ${q.solution}</p>` : ''}
  </div>`;
  MathJax.typesetPromise([container]);
}

// --- Pagination ---
document.getElementById('prevBtn').addEventListener('click', ()=>{
  if(currentIndex>0){
    currentIndex--;
    renderQuestion();
  }
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  if(currentIndex<questions.length-1){
    currentIndex++;
    renderQuestion();
  }
});
</script>

</body>
</html>
