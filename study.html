<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; /* Keeping your dark bg */
            --card: #0f172a; 
            --glass: rgba(30, 41, 59, 0.8);
            --border: rgba(99, 102, 241, 0.2); 
            --accent: #6366f1; 
            --text: #f8fafc;
            --text-dim: #94a3b8; 
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* --- HEADER (Cleaned, matching Picture 1 structure) --- */
        header {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 5%;
            background: var(--bg); /* Removed glass for cleaner app look */
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        .header-action-icon {
            font-size: 1.4rem;
            color: var(--accent);
            cursor: pointer;
        }
        
        main { max-width: 1000px; margin: 0 auto; padding: 20px 5% 100px 5%; /* Bottom padding for mobile footer */ }

        /* --- STUDY TITLE BLOCK --- */
        .study-title-block {
            display: flex; justify-content: space-between; align-items: start;
            margin-bottom: 40px;
        }
        .study-title-text { flex: 1; }
        .study-title-text h1 { font-size: 1.6rem; margin-bottom: 5px; font-weight: 800; }
        .study-title-text p { color: var(--text-dim); font-size: 0.85rem; }
        .study-title-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: var(--accent);
            border: 2px solid var(--border);
        }

        /* --- STUDY GRID (Strict 2xN grid like image) --- */
        .study-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .study-card { 
            background: var(--card); border: 1px solid var(--border); padding: 30px 15px; 
            border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            height: 180px; /* Fixed height for consistency */
            justify-content: space-between;
        }
        .study-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        /* Matching the small icon-within-circle style */
        .card-icon-circle { 
            width: 50px; height: 50px; background: rgba(99,102,241,0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem; color: var(--accent); transition: 0.3s;
            margin-top: auto;
        }
        .study-card:hover .card-icon-circle { background: var(--accent); color: white; }

        h3 { font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: auto; }
        
        /* Removing old p.sub-text as it's not in the image */

        /* --- MOBILE NAV FOOTER (New) --- */
        .mobile-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); border-top: 1px solid var(--border);
            padding: 12px 5%; display: flex; justify-content: space-around; z-index: 1000;
        }
        .mobile-nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-dim); text-decoration: none; font-size: 0.75rem; font-weight: 600;
            transition: 0.3s;
        }
        .mobile-nav-item.active { color: var(--accent); }
        .mobile-nav-item i { font-size: 1.3rem; margin-bottom: 5px; opacity: 0.6; }
        .mobile-nav-item.active i { opacity: 1; }

        /* Responsive */
        @media(min-width: 768px) {
            header { background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: fixed; width: 100%; }
            main { padding-top: 100px; }
            .study-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .mobile-nav { display: none; }
        }
        
        @media(max-width: 768px) {
            .logo { font-size: 1.4rem; }
        }

    </style>
</head>
<body>

<header>
    <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
    <i class="fa-solid fa-bell header-action-icon"></i>
</header>

<main>
    <div class="study-title-block">
        <div class="study-title-text">
            <h1>Study</h1>
            <p>Get all the resources you need to ace your exams</p>
        </div>
        <div class="study-title-icon">
            <i class="fa-solid fa-book-open"></i>
        </div>
    </div>

    <div class="study-grid">
        <div class="study-card" onclick="location.href='past_questions.html'">
            <h3>Study Past Questions</h3>
            <div class="card-icon-circle"><i class="fa-solid fa-clock"></i></div>
        </div>

        <div class="study-card" onclick="location.href='novels.html'">
            <h3>Novels</h3>
            <div class="card-icon-circle"><i class="fa-solid fa-book"></i></div>
        </div>

        <div class="study-card" onclick="location.href='videos.html'">
            <h3>Video Lessons</h3>
            <div class="card-icon-circle"><i class="fa-solid fa-video"></i></div>
        </div>

        <div class="study-card" onclick="location.href='notes.html'">
            <h3>Lesson Notes</h3>
            <div class="card-icon-circle"><i class="fa-solid fa-file-lines"></i></div>
        </div>

        <div class="study-card" onclick="location.href='jamb_brochure.html'">
            <h3>JAMB Brochure</h3>
            <div class="card-icon-circle"><i class="fa-solid fa-file-invoice"></i></div>
        </div>

        <div class="study-card" onclick="location.href='syllabus.html'">
            <h3>JAMB Syllabus</h3>
            <div class="card-icon-circle"><i class="fa-solid fa-scroll"></i></div>
        </div>
    </div>
</main>

<nav class="mobile-nav">
    <a href="ijmbpq.html" class="mobile-nav-item">
        <i class="fa-solid fa-house"></i> <span>Home</span>
    </a>
    <a href="study.html" class="mobile-nav-item active">
        <i class="fa-solid fa-book-open"></i> <span>Study</span>
    </a>
    <a href="exam.html" class="mobile-nav-item">
        <i class="fa-solid fa-flask"></i> <span>Test</span>
    </a>
    <a href="#" class="mobile-nav-item">
        <i class="fa-solid fa-ellipsis-vertical"></i> <span>More</span>
    </a>
</nav>

<script>
    // Removed old Hamburger logic. Navigation is now handled by the footer.
</script>

</body>
</html>
