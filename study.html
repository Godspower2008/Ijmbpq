<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Past Questions | IJMB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { 
    --bg: #020617; 
    --card: #0f172a;
    --glass: rgba(30, 41, 59, 0.7); 
    --border: rgba(99, 102, 241, 0.2); 
    --accent: #6366f1; 
    --text: #f8fafc; 
    --text-dim: #94a3b8; 
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 50%);
}

/* HEADER */
header { display:flex; justify-content:space-between; align-items:center; padding:15px 5%; background:rgba(15,23,42,0.8); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1000; }
.logo { font-weight:800; font-size:1.2rem; text-decoration:none; color:var(--text); }
.logo span { color:var(--accent); }
.nav-links { display:flex; gap:20px; }
.nav-links a { color:var(--text-dim); text-decoration:none; font-size:0.9rem; font-weight:600; transition:0.3s; }

/* GRID */
.page-grid { display:grid; grid-template-columns: 1fr minmax(280px,1fr); gap:30px; max-width:1300px; margin:40px auto; padding:0 5%; }
.subject-grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap:20px; }
.subject-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:25px; transition:0.3s; cursor:pointer; text-align:center; }
.subject-card:hover { border-color:var(--accent); box-shadow:0 15px 30px rgba(99,102,241,0.2); }

/* SIDEBAR */
.sidebar-card { background: var(--glass); border:1px solid var(--border); border-radius:24px; padding:25px; position:sticky; top:100px; width:100%; overflow:hidden; }
.rank-item { display:flex; justify-content:space-between; padding:12px 0; font-size:0.85rem; border-bottom:1px solid rgba(255,255,255,0.05); }
.rank-item:last-child { border-bottom:none; }

/* SEARCH */
#search { padding:10px 15px; border-radius:10px; border:none; width:100%; margin-bottom:25px; font-size:0.95rem; }

/* RESPONSIVE */
@media(max-width:1024px){
    .page-grid { grid-template-columns:1fr; }
    .sidebar-card { position:relative; top:auto; margin-top:30px; }
}
/* Hamburger Menu */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: space-around;
  width: 30px;
  height: 24px;
  cursor: pointer;
  z-index: 1100;
}

.hamburger div {
  width: 100%;
  height: 3px;
  background: #f8fafc; /* text color */
  border-radius: 2px;
  transition: all 0.4s ease;
}

.hamburger.open div:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.hamburger.open div:nth-child(2) {
  opacity: 0;
}

.hamburger.open div:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

/* Responsive nav for mobile */
@media(max-width:768px){
  .nav-links { 
    display:none; 
    flex-direction:column; 
    gap:15px;
    position:absolute; 
    top:60px; 
    right:5%; 
    background:rgba(2,6,23,0.95); 
    padding:20px; 
    border-radius:10px; 
    box-shadow:0 10px 20px rgba(0,0,0,0.3); 
    transition: all 0.4s ease;
  }
  .nav-links.active { display:flex; }
  .hamburger { display:flex; }
}

/* Optional: hover style for nav links */
.nav-links a:hover {
  color: #6366f1;
}
</style>
</head>
<body>

<header>
    <a href="dashboard.html" class="logo">IJMB<span>PRO</span></a>
    <nav class="nav-links">
        <a href="/Ijmbpq/ijmbpq.html">Home</a>
        <a href="/Ijmbpq/exam.html">Exam Mode</a>
        <a href="/Ijmbpq/pricing.html">Upgrade</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
    <div class="hamburger" id="hamburger">
      <div></div>
      <div></div>
      <div></div>
    </div>
</header>

<div class="page-grid">
<main>
<h1 style="margin-bottom:25px;">Study Past Questions</h1>

<input type="text" id="search" placeholder="Search subjects...">

<div class="subject-grid" id="subjectGrid">
    <div class="subject-card" onclick="alert('Open Economics Past Questions')">Economics</div>
    <div class="subject-card" onclick="alert('Open Physics Past Questions')">Physics</div>
    <div class="subject-card" onclick="alert('Open Biology Past Questions')">Biology</div>
    <div class="subject-card" onclick="alert('Open Chemistry Past Questions')">Chemistry</div>
</div>
</main>

<aside>
<div class="sidebar-card">
<h3 style="margin-bottom:15px;">Top Scholars</h3>
<div class="rank-item"><span>🥇 Musa Ibrahim</span><b>2450 pts</b></div>
<div class="rank-item"><span>🥈 Olawale Johnson</span><b>2120 pts</b></div>
<div class="rank-item"><span>🥉 Chidi Azu</span><b>1980 pts</b></div>
</div>
</aside>
</div>

<script>
function logout(){ alert('Logging out...'); }
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', ()=>{
    const filter = searchInput.value.toLowerCase();
    document.querySelectorAll('.subject-card').forEach(card=>{
        card.style.display = card.textContent.toLowerCase().includes(filter)?'block':'none';
    });
});
// Hamburger toggle
const hamburger = document.getElementById('hamburger');
const navLinks = document.querySelector('.nav-links');

hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    hamburger.classList.toggle('open');
});

// Logout function
function logout(){
    if(firebase && firebase.auth){
        firebase.auth().signOut();
    }
    window.location.href="landing.html";
}
</script>

</body>
</html>
