<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Subjects | IJMBPRO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { 
    --bg: #020617; 
    --card: #0f172a;
    --glass: rgba(15, 23, 42, 0.8); 
    --border: rgba(99, 102, 241, 0.2); 
    --accent: #6366f1; 
    --text: #f8fafc; 
    --text-dim: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg); color: var(--text); line-height:1.5; }
a { text-decoration:none; color:inherit; }

header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 5%; background: rgba(15,23,42,0.85);
    backdrop-filter: blur(10px); border-bottom:1px solid var(--border);
    position: sticky; top:0; z-index:1000;
}
.logo { font-weight: 800; font-size:1.4rem; color: var(--text); }
.logo span { color: var(--accent); }

.nav-links { display:flex; gap:20px; transition:0.3s; }
.nav-links a { color: var(--text-dim); font-weight:600; font-size:0.95rem; transition:0.3s; }
.nav-links a:hover { color: var(--accent); }

.hamburger { display:none; flex-direction: column; justify-content: space-around; width: 25px; height: 22px; cursor: pointer; z-index:2000; }
.hamburger div { height:3px; background: var(--text); border-radius:2px; transition: all 0.3s ease; }
.hamburger.active div:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.hamburger.active div:nth-child(2) { opacity:0; }
.hamburger.active div:nth-child(3) { transform: rotate(-45deg) translate(6px,-6px); }
.nav-links.active { display:flex; position:absolute; top:60px; right:5%; background: var(--bg); padding:20px; border-radius:10px; flex-direction:column; gap:15px; box-shadow:0 10px 20px rgba(0,0,0,0.3); }

.hero {
    padding: 80px 5px 40px;
    text-align:center;
}
.hero h1 { font-size:clamp(2rem,5vw,3rem); font-weight:800; margin-bottom:15px; }
.hero p { font-size:1rem; color: var(--text-dim); margin-bottom:25px; }

.search-bar {
    max-width:500px; margin:0 auto 40px; display:flex; gap:10px;
}
.search-bar input, .search-bar select {
    flex:1; padding:10px 15px; border-radius:12px; border:none; background:var(--card); color:var(--text);
}
.search-bar button {
    background: var(--accent); color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:700;
}

/* Subject Grid */
.subject-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
    max-width:1200px; margin:0 auto 80px; padding:0 5%;
}
.subject-card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:20px;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}
.subject-card:hover {
    border-color: var(--accent);
    transform: translateY(-6px);
    box-shadow:0 15px 40px rgba(99,102,241,0.2);
}
.subject-card i {
    font-size:2rem; color: var(--accent); margin-bottom:15px; display:block;
}
.subject-card h3 { margin-bottom:10px; font-weight:700; }
.subject-card small { color: var(--text-dim); }

.progress-bar { height:8px; background:#1e293b; border-radius:10px; overflow:hidden; margin:10px 0; }
.progress-fill { height:100%; background:var(--accent); width:0%; transition:width 1s ease; }

/* Responsive */
@media(max-width:768px){
    .hamburger { display:flex; }
    .nav-links { display:none; }
}
/* Extra responsiveness for smaller devices */

/* Large tablets and below */
@media(max-width:1024px){
    .dashboard-grid { grid-template-columns: 1fr; gap:25px; }
    .sidebar-card { position: relative; top: auto; margin-top: 30px; }
    .metrics-row { grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:15px; }
    .hero h1 { font-size:2.2rem; line-height:1.3; }
    .hero p { font-size:0.95rem; max-width:90%; margin:0 auto; }
}

/* Tablets and large phones */
@media(max-width:768px){
    .hamburger { display:flex; cursor:pointer; z-index:1100; }
    .nav-links { display:none; flex-direction: column; gap:15px; position:absolute; top:60px; right:5%; background:var(--bg); padding:20px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,0.3); transition:0.4s; }
    .nav-links.active { display:flex; }
    .subject-grid { grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:15px; }
    .dashboard-card { padding:15px; font-size:0.95rem; }
    .metrics-row { gap:10px; }
}

/* Phones */
@media(max-width:480px){
    header { padding:10px 3%; }
    .hero { flex-direction: column; padding-top:80px; gap:20px; text-align:center; }
    .hero h1 { font-size:1.8rem; }
    .hero p { font-size:0.85rem; }
    .search-bar { flex-direction: column; gap:10px; }
    .search-bar input, .search-bar select, .search-bar button { width:100%; }
    .subject-card { padding:12px; border-radius:12px; }
    .progress-bar { height:6px; }
    .progress-fill { height:100%; transition:width 1s ease; }
    .continue-card button { width:100%; padding:10px; font-size:0.9rem; }
    .metric-card { padding:15px; font-size:0.85rem; }
}

/* Extra tiny screens (<360px) */
@media(max-width:360px){
    .hero h1 { font-size:1.6rem; }
    .hero p { font-size:0.8rem; }
    .metrics-row { grid-template-columns: 1fr; gap:8px; }
    .sidebar-card { padding:15px; }
    .dashboard-card { font-size:0.9rem; padding:12px; }
}
</style>
</head>
<body>

<header>
    <a href="/Ijmbpq/index.html" class="logo">IJMB<span>PRO</span></a>
<nav class="nav-links">
  <a href="ijmbpq.html">Home</a>
  <a href="pricing.html">Upgrade</a>
  <a href="exam.html">Exam Mode</a>
  <a href="#" onclick="logout()">Logout</a>
</nav>
    <div class="hamburger" onclick="toggleHamburger(this)">
        <div></div><div></div><div></div>
    </div>
</header>

<section class="hero">
    <h1>Study Past Questions</h1>
    <p>Browse IJMB subjects, select the year, and track your progress.</p>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search Subject...">
        <select id="yearFilter">
            <option value="">All Years</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
        </select>
        <button onclick="applyFilter()">Filter</button>
    </div>
</section>

<section class="subject-grid" id="subjectGrid">
    <div class="subject-card" data-subject="Physics" data-year="2023">
        <i class="fa-solid fa-atom"></i>
        <h3>Physics</h3>
        <div class="progress-bar"><div class="progress-fill" style="width:25%"></div></div>
        <small>25% Completed</small>
    </div>

    <div class="subject-card" data-subject="Chemistry" data-year="2023">
        <i class="fa-solid fa-flask"></i>
        <h3>Chemistry</h3>
        <div class="progress-bar"><div class="progress-fill" style="width:40%"></div></div>
        <small>40% Completed</small>
    </div>

    <div class="subject-card" data-subject="Mathematics" data-year="2022">
        <i class="fa-solid fa-square-root-variable"></i>
        <h3>Mathematics</h3>
        <div class="progress-bar"><div class="progress-fill" style="width:10%"></div></div>
        <small>10% Completed</small>
    </div>

    <div class="subject-card" data-subject="Biology" data-year="2021">
        <i class="fa-solid fa-dna"></i>
        <h3>Biology</h3>
        <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
        <small>0% Completed</small>
    </div>
</section>

<script>
// Hamburger animation
function toggleHamburger(el){
    el.classList.toggle('active');
    document.querySelector('.nav-links').classList.toggle('active');
}

// Filter/Search Function
function applyFilter(){
    const search = document.getElementById('searchInput').value.toLowerCase();
    const year = document.getElementById('yearFilter').value;
    document.querySelectorAll('.subject-card').forEach(card=>{
        const subject = card.dataset.subject.toLowerCase();
        const cardYear = card.dataset.year;
        if((subject.includes(search)) && (year === "" || cardYear === year)){
            card.style.display="block";
        } else {
            card.style.display="none";
        }
    });
}
</script>

</body>
</html>
