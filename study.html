<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study | IJMB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for Study Cards to match your previous layout */
        .study-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 180px;
            gap: 15px;
        }
        .icon-circle {
            width: 50px;
            height: 50px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>
        <nav class="nav-links" id="navLinks">
            <a href="ijmbpq.html" class="nav-item">Home</a>
            <a href="study.html" class="nav-item active">Study</a>
            <a href="test.html" class="nav-item">Test</a>
            <a href="more.html" class="nav-item">More</a>
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <main>
        <div class="section-header">
            <div>
                <h1 class="section-title" style="font-size: 1.8rem;">Study Resources</h1>
                <p style="color: var(--text-dim); font-size: 0.9rem;">Select a category to begin your revision.</p>
            </div>
        </div>

        <div class="grid" style="grid-template-columns: repeat(2, 1fr);">
            <div class="card study-card" onclick="location.href='past_questions.html'">
                <div class="icon-circle"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <h3>Past Questions</h3>
            </div>
            <div class="card study-card" onclick="location.href='novels.html'">
                <div class="icon-circle"><i class="fa-solid fa-book"></i></div>
                <h3>Novels</h3>
            </div>
            <div class="card study-card" onclick="location.href='videos.html'">
                <div class="icon-circle"><i class="fa-solid fa-play"></i></div>
                <h3>Video Lessons</h3>
            </div>
            <div class="card study-card" onclick="location.href='notes.html'">
                <div class="icon-circle"><i class="fa-solid fa-file-lines"></i></div>
                <h3>Lesson Notes</h3>
            </div>
        </div>
    </main>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            hamburger.classList.toggle('active');
        });
    </script>
</body>
</html>
