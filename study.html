<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study | IJMB PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { 
    --bg: #020617; 
    --card: #0f172a;
    --glass: rgba(30, 41, 59, 0.7); 
    --border: rgba(99, 102, 241, 0.2); 
    --accent: #6366f1; 
    --text: #f8fafc; 
    --text-dim: #94a3b8; 
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
header {
    display:flex; justify-content:space-between; align-items:center;
    padding:15px 5%;
    background: rgba(15,23,42,0.8);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--border);
    position: sticky; top:0; z-index:1000;
}

.logo { font-weight:800; font-size:1.2rem; text-decoration:none; color:var(--text); }
.logo span { color: var(--accent); }

.nav-links {
    display:flex;
    gap: 25px;
}

.nav-links a {
    text-decoration:none;
    color: var(--text-dim);
    font-weight:600;
    transition:0.3s;
}

.nav-links a:hover { color: var(--accent); }

/* HAMBURGER */
.hamburger {
    display:none; flex-direction:column; justify-content:space-around;
    width:30px; height:24px; cursor:pointer; z-index:1100;
}
.hamburger div { width:100%; height:3px; background:var(--text); border-radius:2px; transition:0.4s; }
.hamburger.open div:nth-child(1){ transform: rotate(45deg) translate(5px,5px);}
.hamburger.open div:nth-child(2){ opacity:0;}
.hamburger.open div:nth-child(3){ transform: rotate(-45deg) translate(5px,-5px);}

/* MOBILE NAV */
@media(max-width:768px){
    .nav-links {
        display:none;
        flex-direction:column;
        gap:15px;
        position:absolute;
        top:60px;
        right:5%;
        background:rgba(30,41,59,0.95);
        padding:20px;
        border-radius:12px;
        box-shadow:0 10px 20px rgba(0,0,0,0.4);
        transition: all 0.4s ease;
    }
    .nav-links.active { display:flex; }
    .nav-links a {
        display:block;
        padding:12px 20px;
        background: var(--card);
        border-radius:12px;
        text-align:center;
        color:var(--text);
    }
    .nav-links a:hover {
        background: var(--accent);
        color:#fff;
        transform:translateY(-2px);
    }
    .hamburger { display:flex; }
}

/* MAIN CONTENT */
main {
    max-width:1200px;
    margin:40px auto;
    padding:0 5%;
}

h1 { margin-bottom:25px; }

.subject-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:25px;
}

.subject-card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:25px;
    cursor:pointer;
    transition:0.3s;
}

.subject-card:hover {
    border-color: var(--accent);
    box-shadow: 0 20px 40px -15px rgba(99,102,241,0.3);
}

.progress-bar {
    height:8px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    margin:15px 0;
}

.progress-fill {
    height:100%;
    background:var(--accent);
    width:0%;
    transition: width 1.2s ease;
}
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-around;
    width: 30px;
    height: 24px;
    cursor: pointer;
    z-index: 1100;
}

.hamburger div {
    width: 100%;
    height: 3px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.4s ease;
}

.hamburger.open div:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
}

.hamburger.open div:nth-child(2) {
    opacity: 0;
}

.hamburger.open div:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
}
.back-btn { margin-bottom:20px; display:inline-block; background:var(--glass); color:var(--accent); padding:10px 20px; border-radius:10px; text-decoration:none; font-weight:700; }
</style>
</head>
<body>

<header>
    <a href="dashboard.html" class="logo">IJMB<span>PRO</span></a>
    <nav class="nav-links">
        <a href="profile.html">Profile</a>
        <a href="study.html">Study</a>
        <a href="exam.html">Exam Mode</a>
        <a href="pricing.html">Upgrade</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
    <div class="hamburger" id="hamburger">
        <div></div><div></div><div></div>
    </div>
</header>

<main>
  <a href="#" class="back-btn" onclick="goBack()">
    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
</a>
<h1>Study Channels</h1>

<div class="subject-grid">
    <a href="economics.html" style="text-decoration:none; color:inherit;">
        <div class="subject-card">
            <h3>Economics</h3>
            <div class="progress-bar"><div class="progress-fill" data-progress="25"></div></div>
            <small>25% Completed</small>
        </div>
    </a>

    <a href="physics.html" style="text-decoration:none; color:inherit;">
        <div class="subject-card">
            <h3>Physics</h3>
            <div class="progress-bar"><div class="progress-fill" data-progress="40"></div></div>
            <small>40% Completed</small>
        </div>
    </a>

    <a href="biology.html" style="text-decoration:none; color:inherit;">
        <div class="subject-card">
            <h3>Biology</h3>
            <div class="progress-bar"><div class="progress-fill" data-progress="10"></div></div>
            <small>10% Completed</small>
        </div>
    </a>

    <a href="chemistry.html" style="text-decoration:none; color:inherit;">
        <div class="subject-card">
            <h3>Chemistry</h3>
            <div class="progress-bar"><div class="progress-fill" data-progress="0"></div></div>
            <small>Not Started</small>
        </div>
    </a>
</div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<!-- Study page -->
<script src="study.js"></script>
<script src="common.js"></script>
</body>
</html>
