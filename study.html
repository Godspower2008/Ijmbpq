<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study | IJMB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --bg:#020617;
    --card:#0f172a;
    --glass:rgba(30,41,59,0.8);
    --border:rgba(99,102,241,0.2);
    --accent:#6366f1;
    --text:#f8fafc;
    --text-dim:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:var(--bg);color:var(--text);}

/* HEADER */
header{
    display:flex;justify-content:space-between;align-items:center;
    padding:15px 5%;background:var(--glass);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;
}
.logo{font-weight:800;font-size:1.2rem;color:var(--text);text-decoration:none;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:20px;}
.nav-links a{color:var(--text-dim);text-decoration:none;font-weight:600;}
.nav-links a:hover{color:var(--accent);}
.hamburger{display:none;flex-direction:column;width:28px;cursor:pointer;}
.hamburger div{height:3px;background:var(--text);margin:4px 0;transition:0.3s;}

/* MAIN */
main{max-width:1200px;margin:40px auto;padding:0 5%;}
.greeting{font-size:1.6rem;margin-bottom:30px;}

/* SUBJECT CARDS */
.subjects{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.subject-card{background:var(--card);padding:20px;border-radius:15px;cursor:pointer;transition:0.3s;position:relative;}
.subject-card:hover{background:#1e293b;}
.subject-card h3{margin-bottom:10px;}
.subject-card .progress-bar{background:#1e293b;height:8px;border-radius:5px;overflow:hidden;margin-top:10px;}
.subject-card .progress-fill{height:100%;width:0%;background:var(--accent);transition:0.8s;}
.subject-card small{color:var(--text-dim);display:block;margin-top:5px;}

/* MEDIA */
@media(max-width:768px){
    .nav-links{display:none;}
    .hamburger{display:flex;}
}
</style>
</head>

<body>

<header>
<a href="ijmbpq.html" class="logo">IJMB<span>PRO</span></a>

<nav class="nav-links">
    <a href="ijmbpq.html">Dashboard</a>
    <a href="study.html">Study</a>
    <a href="exam.html">Exam Mode</a>
    <a href="pricing.html">Upgrade</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="hamburger" id="hamburger">
    <div></div>
    <div></div>
    <div></div>
</div>
</header>

<main>
<h1 id="userGreet" class="greeting">Welcome back</h1>

<h2 style="margin-bottom:20px;">Your Subjects</h2>

<div class="subjects">
    <!-- These will be populated dynamically from Firebase -->
    <div class="subject-card" data-subject="Mathematics">
        <h3>Mathematics</h3>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <small>0% Completed</small>
    </div>
    <div class="subject-card" data-subject="Physics">
        <h3>Physics</h3>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <small>0% Completed</small>
    </div>
    <div class="subject-card" data-subject="Chemistry">
        <h3>Chemistry</h3>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <small>0% Completed</small>
    </div>
    <div class="subject-card" data-subject="Biology">
        <h3>Biology</h3>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <small>0% Completed</small>
    </div>
    <div class="subject-card" data-subject="Economics">
        <h3>Economics</h3>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <small>0% Completed</small>
    </div>
</div>

</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="common.js"></script>
<script src="study.js"></script>

</body>
</html>
